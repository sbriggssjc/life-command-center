<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LCC Intake</title>
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Segoe UI", system-ui, sans-serif;
      padding: 16px;
      background: #fafafa;
      color: #333;
    }
    h2 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 12px;
    }
    .settings-group {
      margin-bottom: 16px;
    }
    .settings-group label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 4px;
      color: #555;
    }
    .settings-group input {
      width: 100%;
      padding: 6px 8px;
      font-size: 13px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
    #sendBtn {
      display: block;
      width: 100%;
      padding: 10px;
      font-size: 14px;
      font-weight: 600;
      color: #fff;
      background: #0078d4;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    #sendBtn:hover { background: #106ebe; }
    #sendBtn:disabled {
      background: #999;
      cursor: not-allowed;
    }
    #status {
      margin-top: 12px;
      padding: 10px;
      font-size: 13px;
      border-radius: 4px;
      display: none;
    }
    #status.info    { display: block; background: #e8f4fd; color: #0078d4; }
    #status.success { display: block; background: #dff6dd; color: #107c10; }
    #status.warning { display: block; background: #fff4ce; color: #797600; }
    #status.error   { display: block; background: #fde7e9; color: #d13438; }
    .email-preview {
      margin-bottom: 16px;
      padding: 10px;
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 4px;
      font-size: 13px;
    }
    .email-preview .label {
      font-weight: 600;
      color: #555;
    }
    .email-preview .value {
      margin-bottom: 6px;
      word-break: break-word;
    }
  </style>
</head>
<body>
  <h2>Send to LCC</h2>

  <div id="emailPreview" class="email-preview" style="display:none;">
    <div><span class="label">From:</span> <span id="previewFrom" class="value"></span></div>
    <div><span class="label">Subject:</span> <span id="previewSubject" class="value"></span></div>
    <div><span class="label">Attachments:</span> <span id="previewAttachments" class="value"></span></div>
  </div>

  <div class="settings-group">
    <label for="apiKey">API Key</label>
    <input type="password" id="apiKey" placeholder="LCC API Key" />
  </div>
  <div class="settings-group">
    <label for="workspaceId">Workspace ID</label>
    <input type="text" id="workspaceId" placeholder="Workspace UUID" />
  </div>

  <button id="sendBtn" disabled>Send to LCC</button>
  <div id="status"></div>

  <script src="taskpane.js"></script>
</body>
</html>
