<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LCC Assistant</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      width: 280px;
      padding: 16px;
      background: #F5F6FA;
      color: #1A1A2E;
    }
    .header {
      text-align: center;
      margin-bottom: 16px;
    }
    .logo {
      font-size: 22px;
      font-weight: 700;
      color: #1F3864;
      letter-spacing: 2px;
    }
    .subtitle {
      font-size: 11px;
      color: #6B7280;
      margin-top: 2px;
    }
    .status {
      text-align: center;
      margin-bottom: 14px;
      font-size: 12px;
    }
    .status-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-right: 4px;
      vertical-align: middle;
    }
    .status-dot.online { background: #059669; }
    .status-dot.offline { background: #DC2626; }
    .status-dot.checking { background: #D97706; }
    .btn {
      display: block;
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 8px;
      transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.85; }
    .btn-primary { background: #1F3864; color: white; }
    .btn-secondary { background: #E5E7EB; color: #1A1A2E; }
    .links {
      text-align: center;
      margin-top: 8px;
    }
    .links a {
      font-size: 11px;
      color: #4A90D9;
      text-decoration: none;
    }
    .links a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">LCC</div>
    <div class="subtitle">Life Command Center</div>
  </div>
  <div class="status">
    <span class="status-dot checking" id="statusDot"></span>
    <span id="statusText">Checking connection...</span>
  </div>
  <button class="btn btn-primary" id="openPanel">Open Side Panel</button>
  <button class="btn btn-secondary" id="openBriefing">Morning Briefing</button>
  <button class="btn btn-secondary" id="openSearch">Search</button>
  <div class="links">
    <a href="settings.html" id="openSettings">Settings</a>
  </div>
  <script src="popup.js"></script>
</body>
</html>
