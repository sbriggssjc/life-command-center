openapi: 3.0.3
info:
  title: LCC API (full read + comps surface)
  description: >
    The single OpenAPI schema for the Life Command Center MCP server's HTTP surface. Import this to
    give ChatGPT (GPT Action) and Microsoft Copilot Studio (custom connector) the SAME read + comps
    capabilities Claude gets natively over MCP — one server, one Bearer auth. Every operation here
    calls the EXACT same shared engine as the Claude MCP tool of the same name (search_entities,
    get_property_context, get_contact_context, get_daily_briefing, get_queue_summary,
    get_pipeline_health, recall_memory, query_comps, synthesize_comps), so a request resolves to the
    same data no matter which surface asks. Cap rates are decimals (0.0745 = 7.45%).

    READ-ONLY: every operation in this schema is read-only — none mutates data. The Cortex WRITE tool
    (log_memory) is intentionally NOT exposed over HTTP; it stays on the Claude / MCP surfaces only.

    Supersedes `lcc-comps-openapi.yaml` (the comps-only subset, retained for back-compat). Workbook
    generation (generateComps / generateBov) is added under the SAME server + Bearer auth by the
    companion prompt `CCP_generate_comps_action_chatgpt_copilot.md`; merge those operations into this
    file so ChatGPT/Copilot reach full parity from one import.
  version: 2.0.0
servers:
  - url: https://REPLACE-WITH-YOUR-MCP-RAILWAY-DOMAIN.up.railway.app
    description: LCC MCP server (set to the value of MCP_BASE_URL; all /api/* routes live here)
security:
  - bearerAuth: []
paths:
  # ── Read tools (Option A — full read-capability parity) ────────────────────
  /api/search-entities:
    post:
      operationId: searchEntities
      summary: Search properties, contacts, or organizations in LCC.
      description: >
        Search the LCC entity graph by name, address, or keyword. Returns matched entities
        (value-ranked, canonical buyer-parent floated to the top) plus, for org/person matches, the
        deals where the entity is the tenant or guarantor, and address-like terms also return domain
        property hits.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SearchEntitiesRequest' }
      responses:
        '200': { description: Matched entities + properties., content: { application/json: { schema: { $ref: '#/components/schemas/JsonObject' } } } }
        '401': { description: Missing or invalid Bearer token. }
  /api/property-context:
    post:
      operationId: getPropertyContext
      summary: Full context for one property.
      description: >
        Lease details, ownership history, comps, investment score, research status, related contacts,
        and the property's tenant(s) + guarantor(s). Resolve by entity_id or address. Read-only; may
        warm the shared context-packet cache exactly as the MCP tool does.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PropertyContextRequest' }
      responses:
        '200': { description: Property context packet., content: { application/json: { schema: { $ref: '#/components/schemas/JsonObject' } } } }
        '401': { description: Missing or invalid Bearer token. }
  /api/contact-context:
    post:
      operationId: getContactContext
      summary: Relationship context for a contact.
      description: >
        Touchpoint history, active deals, last interaction, days-since-contact, Salesforce id, and an
        outreach recommendation. Resolve by entity_id, name, or email.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ContactContextRequest' }
      responses:
        '200': { description: Contact relationship context., content: { application/json: { schema: { $ref: '#/components/schemas/JsonObject' } } } }
        '401': { description: Missing or invalid Bearer token. }
  /api/daily-briefing:
    post:
      operationId: getDailyBriefing
      summary: Today's strategic / important / urgent priorities.
      description: The team's daily briefing (snapshot when available, else priority-ranked action items).
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: '#/components/schemas/DailyBriefingRequest' }
      responses:
        '200': { description: Daily briefing., content: { application/json: { schema: { $ref: '#/components/schemas/JsonObject' } } } }
        '401': { description: Missing or invalid Bearer token. }
  /api/queue-summary:
    post:
      operationId: getQueueSummary
      summary: The current research / action priority queue.
      description: >
        The operator's real, value-ranked priority queue (doctrinal bands, top-N by value) plus band
        counts and the research-gap universe. Filter by domain / status.
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: '#/components/schemas/QueueSummaryRequest' }
      responses:
        '200': { description: Priority queue summary + items., content: { application/json: { schema: { $ref: '#/components/schemas/JsonObject' } } } }
        '401': { description: Missing or invalid Bearer token. }
  /api/pipeline-health:
    post:
      operationId: getPipelineHealth
      summary: Data-pipeline health across domains.
      description: Per-domain last-run / success-rate / failures + open LCC automation alerts. No body required.
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: '#/components/schemas/EmptyRequest' }
      responses:
        '200': { description: Pipeline health., content: { application/json: { schema: { $ref: '#/components/schemas/JsonObject' } } } }
        '401': { description: Missing or invalid Bearer token. }
  /api/recall-memory:
    post:
      operationId: recallMemory
      summary: Recall shared Cortex memory (read-only).
      description: >
        Recall durable decisions/facts/outcomes/preferences logged across past sessions. Filter by
        query / domain / kind. (The write counterpart, log_memory, is intentionally NOT exposed over
        HTTP — it stays Claude/MCP-only.)
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RecallMemoryRequest' }
      responses:
        '200': { description: Matching memory entries., content: { application/json: { schema: { $ref: '#/components/schemas/JsonObject' } } } }
        '401': { description: Missing or invalid Bearer token. }

  # ── Comps engine ───────────────────────────────────────────────────────────
  /api/query-comps:
    post:
      operationId: queryComps
      summary: Pull sales comps with explicit structured filters.
      description: >
        Returns comps matching the given filters, de-duplicated across dialysis, government, and
        Salesforce sources. By default only comps with a RELIABLE NOI/cap are returned; set
        include_unreliable_noi to also include modeled/estimated ones. Closed sales are gated to live
        transactions.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/QueryCompsRequest' }
      responses:
        '200': { description: Ranked, de-duplicated comp set., content: { application/json: { schema: { $ref: '#/components/schemas/CompsResponse' } } } }
        '401': { description: Missing or invalid Bearer token. }
  /api/synthesize-comps:
    post:
      operationId: synthesizeComps
      summary: Assemble a ranked comp set from a plain-language request.
      description: >
        Parses a natural-language request into structured filters, routes government-only intent away
        from the dialysis DB, scores by relevance, and returns the ranked set. Pass the raw text as
        `request`; any explicit field overrides the parsed value.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SynthesizeCompsRequest' }
      responses:
        '200': { description: Ranked, relevance-scored comp set., content: { application/json: { schema: { $ref: '#/components/schemas/CompsResponse' } } } }
        '401': { description: Missing or invalid Bearer token. }

  # NOTE: generateComps (/generate-comps) and generateBov (/generate-bov) — the
  # workbook-generation operations — are appended here by the companion prompt
  # CCP_generate_comps_action_chatgpt_copilot.md, under this same server + bearerAuth.

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: 'Send: Authorization: Bearer <LCC_API_KEY>'
  schemas:
    # Read tools return rich, nested JSON; the object shapes are permissive by design.
    JsonObject:
      type: object
      additionalProperties: true
      description: The tool's JSON output — identical to the Claude MCP tool of the same name.
    EmptyRequest:
      type: object
      additionalProperties: false
    SearchEntitiesRequest:
      type: object
      required: [query]
      properties:
        query: { type: string, description: Name, address, or keyword (min 2 chars). }
        entity_type: { type: string, enum: [person, organization, asset], description: Optional entity-type filter. }
        domain: { type: string, enum: [government, dialysis, both], description: Optional domain filter. }
        limit: { type: number, description: Max results (default 10, max 50). }
    PropertyContextRequest:
      type: object
      properties:
        entity_id: { type: string, description: LCC entity UUID. }
        address: { type: string, description: Property address (alternative to entity_id). }
      description: Provide entity_id OR address.
    ContactContextRequest:
      type: object
      properties:
        entity_id: { type: string, description: LCC entity UUID. }
        name: { type: string, description: Contact name (alternative to entity_id). }
        email: { type: string, description: Email address (alternative to entity_id). }
      description: Provide entity_id, name, OR email.
    DailyBriefingRequest:
      type: object
      properties:
        workspace_id: { type: string, description: LCC workspace UUID (defaults to the primary workspace). }
    QueueSummaryRequest:
      type: object
      properties:
        domain: { type: string, enum: [government, dialysis, all], description: Domain filter. }
        status: { type: string, enum: [pending, in_progress, all], description: Status filter. }
        limit: { type: number, description: Max items (default 25, max 100). }
    RecallMemoryRequest:
      type: object
      properties:
        query: { type: string, description: Keyword to match within the memory summary. }
        domain: { type: string, enum: [work, personal, global] }
        kind: { type: string, enum: [decision, fact, outcome, preference, note] }
        limit: { type: number, description: Max entries (default 20, max 50). }
    QueryCompsRequest:
      type: object
      properties:
        comp_type: { type: string, enum: [sale, lease, both], default: sale }
        verticals:
          type: array
          items: { type: string, enum: [government, dialysis] }
          description: Which canonical DBs to query. Omit for both.
        property_types:
          type: array
          items: { type: string }
          description: Plain terms (medical, office, retail, industrial, dialysis, government) expanded to source synonyms.
        states: { type: array, items: { type: string }, description: Two-letter state codes. }
        metros: { type: array, items: { type: string } }
        date_from: { type: string, format: date }
        date_to: { type: string, format: date }
        size_min_sf: { type: number }
        size_max_sf: { type: number }
        government_only: { type: boolean, description: Restrict to government-tenanted comps (also blocks the dialysis DB). }
        include_salesforce: { type: boolean, default: true }
        include_on_market: { type: boolean, default: false }
        include_unreliable_noi: { type: boolean, default: false, description: Include modeled/estimated NOI/cap comps (default excludes). }
        tenant: { type: string, description: Scope to an operator/tenant (e.g. DaVita, Fresenius, US Renal). }
        limit: { type: number, default: 200 }
    SynthesizeCompsRequest:
      type: object
      required: [request]
      properties:
        request: { type: string, description: Plain-language comp request. }
        comp_type: { type: string, enum: [sale, lease, both] }
        property_types: { type: array, items: { type: string } }
        states: { type: array, items: { type: string } }
        metros: { type: array, items: { type: string } }
        date_from: { type: string, format: date }
        date_to: { type: string, format: date }
        size_min_sf: { type: number }
        size_max_sf: { type: number }
        government_only: { type: boolean }
        include_on_market: { type: boolean }
        include_unreliable_noi: { type: boolean }
        limit: { type: number }
    CompsResponse:
      type: object
      properties:
        comps: { type: array, items: { $ref: '#/components/schemas/Comp' } }
        meta:
          type: object
          properties:
            returned: { type: integer }
            total_before_cap: { type: integer }
            flagged_for_review: { type: integer, description: Count of comps whose cap/rent tripped a reconciliation flag. }
            review_flags: { type: array, items: { type: object, additionalProperties: true } }
            excluded_unreliable_noi: { type: integer }
            by_source: { type: object, additionalProperties: { type: integer } }
            warnings: { type: array, items: { type: object, additionalProperties: true } }
            interpreted_params: { type: object, additionalProperties: true }
        markdown: { type: string, description: Ready-to-render comps table (the shared format every surface shows). }
    Comp:
      type: object
      description: One normalized comp. Cap rates are decimals. Extra fields may be present.
      additionalProperties: true
      properties:
        comp_id: { type: string }
        source: { type: string, description: dialysis_db | government_db | salesforce }
        vertical: { type: string, enum: [government, dialysis] }
        tenant: { type: string, description: Display name (multi-tenant rendered as "MOB (VA)" / "MT (SSA)"). }
        agency: { type: string }
        address: { type: string }
        city: { type: string }
        state: { type: string }
        building_sf: { type: number }
        sale_price: { type: number }
        price_withheld: { type: boolean }
        cap_rate: { type: number, description: Decimal (0.0745 = 7.45%). }
        noi: { type: number }
        annual_rent: { type: number }
        rent_is_imputed: { type: boolean }
        sale_date: { type: string, format: date }
        chairs: { type: number, description: Dialysis only. }
        patient_count: { type: number, description: Dialysis only. }
        review_flags:
          type: array
          items: { type: string }
          description: e.g. cap_mismatch, rent_disagreement, price_over_ask (present only when flagged).
