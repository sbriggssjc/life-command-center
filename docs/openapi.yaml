openapi: 3.0.3
info:
  title: LCC Deal Intelligence API
  description: >-
    Investment sales intelligence API for Team Briggs at Northmarq. Covers
    government-leased, dialysis, and net lease asset classes.
  version: 1.0.0
servers:
  - url: https://life-command-center-nine.vercel.app
    description: Production
security:
  - ApiKeyAuth: []
tags:
  - name: Briefing
    description: Daily briefing and email digest endpoints
  - name: Queue
    description: Work queue and pipeline health
  - name: Market
    description: Market data (treasury rates, yield curve)
  - name: Entities
    description: Property, contact, and cross-domain entity lookups
paths:
  /api/daily-briefing:
    get:
      operationId: getDailyBriefing
      tags:
        - Briefing
      summary: Daily briefing snapshot
      description: >-
        Returns the assembled daily briefing packet for the authenticated user,
        including global market intelligence, user priorities, team production
        signals, sync health, and domain-specific alerts across government and
        dialysis asset classes.
      security:
        - ApiKeyAuth: []
      parameters:
        - name: action
          in: query
          required: true
          description: Must be "snapshot" to return the briefing packet.
          schema:
            type: string
            enum:
              - snapshot
            example: snapshot
        - name: role_view
          in: query
          required: false
          description: >-
            Audience lens applied to the briefing. Defaults to a value derived
            from the caller's workspace role.
          schema:
            type: string
            enum:
              - analyst_ops
              - broker
              - manager
            example: broker
      responses:
        '200':
          description: Briefing snapshot
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DailyBriefingSnapshot'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/queue-v2:
    get:
      operationId: getQueueSummary
      tags:
        - Queue
      summary: Unified work queue (v2)
      description: >-
        Returns paginated queue results for a given view. Supports my_work,
        team_queue, inbox, research, work_counts, and entity_timeline views.
      security:
        - ApiKeyAuth: []
      parameters:
        - name: view
          in: query
          required: true
          description: Which queue projection to return.
          schema:
            type: string
            enum:
              - my_work
              - team_queue
              - inbox
              - research
              - work_counts
              - entity_timeline
            example: my_work
        - name: page
          in: query
          required: false
          description: 1-based page number for paginated views.
          schema:
            type: integer
            minimum: 1
            default: 1
            example: 1
        - name: per_page
          in: query
          required: false
          description: Items per page for paginated views.
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 25
            example: 25
        - name: sort
          in: query
          required: false
          description: Sort key for paginated views.
          schema:
            type: string
            enum:
              - due_date
              - created_at
              - updated_at
              - priority
              - title
            example: due_date
        - name: status
          in: query
          required: false
          description: Filter by task status. Use "overdue" in my_work for overdue tasks.
          schema:
            type: string
            example: open
        - name: domain
          in: query
          required: false
          description: Filter by domain.
          schema:
            type: string
            enum:
              - government
              - dialysis
            example: government
        - name: priority
          in: query
          required: false
          description: Filter by priority level (my_work view).
          schema:
            type: string
            example: high
        - name: assigned_to
          in: query
          required: false
          description: >-
            Filter team_queue by assignee UUID. Use the literal value "none" to
            return unassigned work only.
          schema:
            type: string
            example: 00000000-0000-0000-0000-000000000000
        - name: source_type
          in: query
          required: false
          description: Filter inbox view by source type.
          schema:
            type: string
            example: outlook
        - name: research_type
          in: query
          required: false
          description: Filter research view by research task type.
          schema:
            type: string
            example: ownership
        - name: entity_id
          in: query
          required: false
          description: Required when view=entity_timeline. UUID of the entity.
          schema:
            type: string
            format: uuid
            example: 7b8b9f1e-3c2a-4d5e-9f1a-2b3c4d5e6f7a
        - name: cursor
          in: query
          required: false
          description: >-
            ISO-8601 timestamp cursor for entity_timeline pagination. Omit for
            the first page.
          schema:
            type: string
            format: date-time
            example: '2026-04-10T18:00:00Z'
      responses:
        '200':
          description: Queue results for the requested view
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/QueueListResponse'
                  - $ref: '#/components/schemas/WorkCountsResponse'
                  - $ref: '#/components/schemas/EntityTimelineResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/treasury:
    get:
      operationId: getTreasury
      tags:
        - Market
      summary: US Treasury rates
      description: >-
        Returns the latest 10-year (and optional 30-year) US Treasury constant
        maturity rates, or a historical time series when requested. Used for
        cap-rate spread analysis and pricing guidance.
      security:
        - ApiKeyAuth: []
      parameters:
        - name: history
          in: query
          required: false
          description: When "true", returns a time series instead of the latest quote.
          schema:
            type: string
            enum:
              - 'true'
              - 'false'
            default: 'false'
            example: 'false'
        - name: years
          in: query
          required: false
          description: Number of trailing years to include when history=true.
          schema:
            type: integer
            minimum: 1
            maximum: 5
            default: 1
            example: 1
      responses:
        '200':
          description: Treasury rates
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/TreasuryLatest'
                  - $ref: '#/components/schemas/TreasuryHistory'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/property:
    get:
      operationId: getPropertyContext
      tags:
        - Entities
      summary: Property context packet
      description: >-
        Returns the full context packet for a property asset, including the
        canonical entity record, active deal tasks, the most recent enrichment
        packet, and domain-specific data (e.g., GSA lease records, ownership
        history).
      security:
        - ApiKeyAuth: []
      parameters:
        - name: address
          in: query
          required: false
          description: >-
            Property street address (partial match supported). Provide either
            address or entity_id.
          schema:
            type: string
            example: 1234 Main St
        - name: entity_id
          in: query
          required: false
          description: Canonical LCC entity UUID for exact match.
          schema:
            type: string
            format: uuid
            example: 7b8b9f1e-3c2a-4d5e-9f1a-2b3c4d5e6f7a
      responses:
        '200':
          description: Property context
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PropertyContext'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/contact:
    get:
      operationId: getContactContext
      tags:
        - Entities
      summary: Contact context packet
      description: >-
        Returns the contact record with touchpoint history, active deals,
        recent events, and a heuristic "recommended next action" based on
        days-since-contact.
      security:
        - ApiKeyAuth: []
      parameters:
        - name: entity_id
          in: query
          required: false
          description: Canonical LCC entity UUID for exact match.
          schema:
            type: string
            format: uuid
            example: 7b8b9f1e-3c2a-4d5e-9f1a-2b3c4d5e6f7a
        - name: email
          in: query
          required: false
          description: Exact email address lookup.
          schema:
            type: string
            format: email
            example: jane.smith@example.com
        - name: name
          in: query
          required: false
          description: Contact name (partial match supported).
          schema:
            type: string
            example: Jane Smith
      responses:
        '200':
          description: Contact context
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContactContext'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/search:
    get:
      operationId: searchEntities
      tags:
        - Entities
      summary: Cross-domain entity search
      description: >-
        Fuzzy search across properties, contacts, leads, transactions, and
        organizations in the government and dialysis domains. Results are
        ranked by a relevance score (100 exact, 80 startsWith, 60 contains,
        30 fallback).
      security:
        - ApiKeyAuth: []
      parameters:
        - name: q
          in: query
          required: true
          description: Search term (minimum 2 characters after wildcard stripping).
          schema:
            type: string
            minLength: 2
            example: Dialysis Center
        - name: domain
          in: query
          required: false
          description: Restrict results to a specific domain.
          schema:
            type: string
            enum:
              - all
              - government
              - dialysis
            default: all
            example: all
        - name: type
          in: query
          required: false
          description: Restrict results to a specific entity type.
          schema:
            type: string
            enum:
              - all
              - asset
              - contact
              - lead
              - transaction
            default: all
            example: all
        - name: limit
          in: query
          required: false
          description: Maximum number of results to return.
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 20
            example: 20
      responses:
        '200':
          description: Search results ordered by relevance score
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SearchResult'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/briefing-email:
    get:
      operationId: getBriefingEmail
      tags:
        - Briefing
      summary: Daily briefing email digest
      description: >-
        Returns the daily briefing rendered as an HTML email digest suitable
        for direct delivery via Outlook / Power Automate. Mirrors the
        /api/daily-briefing content but formatted for inbox consumption.
      security:
        - ApiKeyAuth: []
      parameters:
        - name: role_view
          in: query
          required: false
          description: Audience lens applied to the briefing content.
          schema:
            type: string
            enum:
              - analyst_ops
              - broker
              - manager
            example: broker
        - name: format
          in: query
          required: false
          description: Output format. "html" returns a full HTML document.
          schema:
            type: string
            enum:
              - html
              - json
            default: html
            example: html
      responses:
        '200':
          description: Rendered briefing email
          content:
            text/html:
              schema:
                type: string
                example: '<!DOCTYPE html><html><body><h1>Daily Briefing</h1>...</body></html>'
            application/json:
              schema:
                $ref: '#/components/schemas/BriefingEmail'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-LCC-Key
      description: >-
        Static integration API key validated against the LCC_API_KEY
        environment variable. Required for Power Automate, Outlook add-in,
        and programmatic consumers.
  responses:
    BadRequest:
      description: Invalid or missing query parameters
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: Either address or entity_id query parameter is required
    Unauthorized:
      description: Missing or invalid X-LCC-Key header
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: 'Unauthorized: missing or invalid X-LCC-Key header'
    NotFound:
      description: Requested resource was not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: Property not found
            entity_id: null
            address: 1234 Main St
  schemas:
    Error:
      type: object
      required:
        - error
      properties:
        error:
          type: string
          description: Human-readable error message
          example: Invalid action. Use action=snapshot
      additionalProperties: true
    DailyBriefingSnapshot:
      type: object
      required:
        - briefing_id
        - as_of
        - workspace_id
        - role_view
      properties:
        briefing_id:
          type: string
          example: briefing_2026-04-11T13:00:00Z_ws_abc_user_123_broker
        as_of:
          type: string
          format: date-time
          example: '2026-04-11T13:00:00Z'
        timezone:
          type: string
          example: America/Chicago
        workspace_id:
          type: string
          format: uuid
          example: 11111111-1111-1111-1111-111111111111
        audience:
          type: string
          enum:
            - analyst_ops
            - broker
            - manager
          example: broker
        role_view:
          type: string
          enum:
            - analyst_ops
            - broker
            - manager
          example: broker
        status:
          type: object
          properties:
            completeness:
              type: string
              enum:
                - full
                - degraded
                - failed
              example: full
            missing_sections:
              type: array
              items:
                type: string
              example: []
        global_market_intelligence:
          type: object
          properties:
            source_system:
              type: string
              nullable: true
              example: morning_briefing
            summary:
              type: string
              nullable: true
              example: 'Dialysis M&A activity accelerating; DaVita reports Q1 in-center volume +2.1%.'
            highlights:
              type: array
              items:
                type: object
                properties:
                  title:
                    type: string
                    example: Fresenius closes 12-clinic portfolio sale
                  category:
                    type: string
                    example: dialysis
            sector_signals:
              type: array
              items:
                type: object
            watchlist:
              type: array
              items:
                type: object
            html_fragment:
              type: string
              nullable: true
              example: '<p>10-year opened at 4.23%, +3bps week over week.</p>'
            source_links:
              type: array
              items:
                type: object
        global_signals:
          type: object
          properties:
            team:
              type: object
              properties:
                open:
                  type: integer
                  example: 42
                overdue:
                  type: integer
                  example: 5
                due_today:
                  type: integer
                  example: 8
                refreshed_at:
                  type: string
                  format: date-time
                  nullable: true
                  example: '2026-04-11T12:55:00Z'
        daily_briefing_packet:
          type: object
          properties:
            packet_type:
              type: string
              example: daily_briefing
            generated_at:
              type: string
              format: date-time
              example: '2026-04-11T13:00:00Z'
            date:
              type: string
              format: date
              example: '2026-04-11'
            user_id:
              type: string
              format: uuid
              example: 22222222-2222-2222-2222-222222222222
            strategic_items:
              type: array
              items:
                $ref: '#/components/schemas/BriefingItem'
            important_items:
              type: array
              items:
                $ref: '#/components/schemas/BriefingItem'
            urgent_items:
              type: array
              items:
                $ref: '#/components/schemas/BriefingItem'
            production_score:
              type: object
              properties:
                calls_this_week:
                  type: integer
                  example: 17
                emails_sent:
                  type: integer
                  example: 34
                meetings_this_week:
                  type: integer
                  example: 6
            overnight_signals:
              type: array
              items:
                type: object
                properties:
                  type:
                    type: string
                    example: market_move
                  content:
                    type: string
                    example: '10-year rallied 4bps overnight on soft CPI print.'
            carry_forward_from_yesterday:
              type: array
              items:
                type: object
                properties:
                  item:
                    type: string
                    example: Follow up on Tulsa VA lease extension
                  days_carried:
                    type: integer
                    example: 2
        user_specific_priorities:
          type: object
          properties:
            my_actions:
              type: integer
              example: 9
            my_inbox:
              type: integer
              example: 4
            my_research:
              type: integer
              example: 2
            my_overdue:
              type: array
              items:
                type: object
        team_level_production_signals:
          type: object
          properties:
            work_counts:
              $ref: '#/components/schemas/WorkCounts'
            inbox_summary:
              type: object
              properties:
                total_new:
                  type: integer
                  example: 12
                total_triaged:
                  type: integer
                  example: 30
                items:
                  type: array
                  items:
                    type: object
            unassigned_work:
              type: array
              items:
                type: object
            sync_health:
              type: object
              properties:
                summary:
                  type: object
                  properties:
                    total_connectors:
                      type: integer
                      example: 6
                    healthy:
                      type: integer
                      example: 5
                    degraded:
                      type: integer
                      example: 1
                    error:
                      type: integer
                      example: 0
                    disconnected:
                      type: integer
                      example: 0
                    pending:
                      type: integer
                      example: 0
                    outbound_success_rate_24h:
                      type: number
                      nullable: true
                      example: 0.987
                unresolved_errors:
                  type: array
                  items:
                    type: object
                queue_drift:
                  type: object
                  properties:
                    source:
                      type: string
                      example: salesforce
                    salesforce_open_task_count:
                      type: integer
                      example: 112
                    last_sf_records_processed:
                      type: integer
                      example: 109
                    estimated_gap:
                      type: integer
                      example: 3
                    drift_flag:
                      type: boolean
                      example: false
                    last_inbound_completed_at:
                      type: string
                      format: date-time
                      nullable: true
                      example: '2026-04-11T12:45:00Z'
        domain_specific_alerts_highlights:
          type: object
          properties:
            government:
              type: object
              nullable: true
            dialysis:
              type: object
              nullable: true
        cross_domain_highlights:
          type: array
          items:
            type: object
        actions:
          type: array
          items:
            type: object
            properties:
              label:
                type: string
                example: Open inbox
              type:
                type: string
                enum:
                  - nav
                  - action
                example: nav
              target:
                type: string
                example: pageInbox
    BriefingItem:
      type: object
      properties:
        rank:
          type: integer
          example: 1
        title:
          type: string
          example: Call Tulsa VA on lease renewal
        type:
          type: string
          enum:
            - deal_action
            - touchpoint_due
            - inbox_triage
          example: deal_action
        metadata:
          type: object
          additionalProperties: true
    WorkCounts:
      type: object
      properties:
        open:
          type: integer
          example: 42
        open_actions:
          type: integer
          example: 38
        inbox_new:
          type: integer
          example: 12
        inbox_triaged:
          type: integer
          example: 30
        research_active:
          type: integer
          example: 7
        sync_errors:
          type: integer
          example: 0
        overdue:
          type: integer
          example: 5
        due_today:
          type: integer
          example: 8
        due_this_week:
          type: integer
          example: 21
        completed_week:
          type: integer
          example: 54
        open_escalations:
          type: integer
          example: 1
        refreshed_at:
          type: string
          format: date-time
          nullable: true
          example: '2026-04-11T12:55:00Z'
    QueueListResponse:
      type: object
      required:
        - view
        - items
        - pagination
      properties:
        view:
          type: string
          enum:
            - my_work
            - team_queue
            - inbox
            - research
          example: my_work
        items:
          type: array
          items:
            $ref: '#/components/schemas/QueueItem'
        pagination:
          $ref: '#/components/schemas/Pagination'
    QueueItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
          example: 7b8b9f1e-3c2a-4d5e-9f1a-2b3c4d5e6f7a
        title:
          type: string
          example: Follow up on Tulsa VA lease extension
        status:
          type: string
          example: open
        priority:
          type: string
          example: high
        due_date:
          type: string
          format: date
          nullable: true
          example: '2026-04-14'
        created_at:
          type: string
          format: date-time
          example: '2026-04-09T15:23:00Z'
        entity_id:
          type: string
          format: uuid
          nullable: true
          example: 11111111-2222-3333-4444-555555555555
        domain:
          type: string
          nullable: true
          example: government
        assigned_to:
          type: string
          format: uuid
          nullable: true
          example: 22222222-2222-2222-2222-222222222222
        source_type:
          type: string
          nullable: true
          example: outlook
        received_at:
          type: string
          format: date-time
          nullable: true
          example: '2026-04-11T06:03:00Z'
        entity_name:
          type: string
          nullable: true
          example: 'Tulsa VA Outpatient Clinic'
        assignee_name:
          type: string
          nullable: true
          example: Shelby Briggs
        creator_name:
          type: string
          nullable: true
          example: Power Automate
    Pagination:
      type: object
      required:
        - page
        - per_page
        - total
        - total_pages
        - has_next
        - has_prev
      properties:
        page:
          type: integer
          example: 1
        per_page:
          type: integer
          example: 25
        total:
          type: integer
          example: 137
        total_pages:
          type: integer
          example: 6
        has_next:
          type: boolean
          example: true
        has_prev:
          type: boolean
          example: false
    WorkCountsResponse:
      allOf:
        - type: object
          required:
            - view
          properties:
            view:
              type: string
              enum:
                - work_counts
              example: work_counts
            my_actions:
              type: integer
              example: 9
            my_overdue:
              type: integer
              example: 2
            my_inbox:
              type: integer
              example: 4
            my_research:
              type: integer
              example: 2
            my_completed_week:
              type: integer
              example: 11
            team_actions:
              type: integer
              example: 42
            in_progress:
              type: integer
              example: 14
            total_entities:
              type: integer
              example: 1284
        - $ref: '#/components/schemas/WorkCounts'
    EntityTimelineResponse:
      type: object
      required:
        - view
        - events
      properties:
        view:
          type: string
          enum:
            - entity_timeline
          example: entity_timeline
        events:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
                format: uuid
                example: 9a8b7c6d-5e4f-3a2b-1c0d-9e8f7a6b5c4d
              title:
                type: string
                example: Salesforce task completed
              category:
                type: string
                example: task
              source_type:
                type: string
                example: salesforce
              occurred_at:
                type: string
                format: date-time
