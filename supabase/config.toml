# Supabase project config (CLI-managed).
#
# This file is intentionally minimal — it exists to lock per-function deploy
# settings that would otherwise pick up CLI defaults.
#
# Why: `supabase functions deploy <name>` defaults `verify_jwt = true` for new
# deployments, which puts the Supabase gateway's JWT check in front of the
# function. Our availability-checker authenticates with `LCC_API_KEY` (an
# opaque string, not a Supabase-issued JWT), so the gateway rejects every
# request with `UNAUTHORIZED_NO_AUTH_HEADER` before the function ever runs.
# Locking verify_jwt = false here makes the setting reproducible across
# redeploys (and across operators who don't remember the --no-verify-jwt
# flag). See issue #560 for the discovery write-up.
#
# Do not add other sections here without checking the Supabase CLI docs
# first — empty/missing fields fall back to safe defaults, but populated
# fields override remote project settings on the next sync.
#
# Functions whose default is also overridden (already deployed with
# verify_jwt = false; listed for documentation):
#   - daily-briefing (deployed pre-config.toml)
#   - data-query     (deployed pre-config.toml)

[functions.data-query]
# Dual-source gov/dia read/write proxy; self-authenticates via x-lcc-key and is
# called by pg_net/cron without a Supabase JWT — must stay verify_jwt = false
# or the gateway 401s every call. (Was deployed pre-config.toml; pinned here
# 2026-05-21 so redeploys do not silently re-enable JWT verification.)
verify_jwt = false

[functions.availability-checker]
verify_jwt = false

# intake-salesforce-files authenticates via X-PA-Webhook-Secret (authenticateWebhook),
# not a Supabase JWT — must stay verify_jwt = false or the gateway 401s the hourly
# sf-files-extract-queued cron + the PA SF→LCC file flows with UNAUTHORIZED_NO_AUTH_HEADER.
# (Pinned 2026-05-20 after a bare `functions deploy` re-enabled the CLI default and broke it.)
[functions.intake-salesforce-files]
verify_jwt = false
