name: Address Normalizer Drift Check

# Compares the dia.dia_normalize_address and gov.normalize_address_txt
# function bodies via the get_address_normalize_signature() RPC on each
# DB. Same MD5 = identical normalization rules; mismatch = silent
# match-quality regression risk.
#
# See docs/architecture/address_normalization_spec.md for the canonical
# rules. When you intentionally update one normalizer, update both and
# this check passes again.
#
# Required secrets (Settings → Secrets and variables → Actions):
#   DIA_SUPABASE_URL  e.g. https://zqzrriwuavgrquhisnoa.supabase.co
#   DIA_SUPABASE_KEY  anon key (RPC is SECURITY DEFINER, anon is fine)
#   GOV_SUPABASE_URL  e.g. https://scknotsqkcheojiaewwh.supabase.co
#   GOV_SUPABASE_KEY  anon key

on:
  schedule:
    - cron: '0 13 * * *'   # 13:00 UTC daily — well after any nightly migration window
  workflow_dispatch:

concurrency:
  group: address-normalize-drift-check
  cancel-in-progress: false

permissions:
  issues: write

jobs:
  check:
    name: Compare normalizer signatures
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Fetch dia signature
        id: dia
        env:
          URL: ${{ secrets.DIA_SUPABASE_URL }}
          KEY: ${{ secrets.DIA_SUPABASE_KEY }}
        run: |
          set -euo pipefail
          if [[ -z "$URL" || -z "$KEY" ]]; then
            echo "::error::DIA_SUPABASE_URL or DIA_SUPABASE_KEY secret not set"
            exit 1
          fi
          MD5=$(curl -fsS -X POST "$URL/rest/v1/rpc/get_address_normalize_signature" \
            -H "apikey: $KEY" \
            -H "Authorization: Bearer $KEY" \
            -H "Content-Type: application/json" \
            -d '{}' | tr -d '"')
          echo "Dia signature: $MD5"
          echo "md5=$MD5" >> "$GITHUB_OUTPUT"

      - name: Fetch gov signature
        id: gov
        env:
          URL: ${{ secrets.GOV_SUPABASE_URL }}
          KEY: ${{ secrets.GOV_SUPABASE_KEY }}
        run: |
          set -euo pipefail
          if [[ -z "$URL" || -z "$KEY" ]]; then
            echo "::error::GOV_SUPABASE_URL or GOV_SUPABASE_KEY secret not set"
            exit 1
          fi
          MD5=$(curl -fsS -X POST "$URL/rest/v1/rpc/get_address_normalize_signature" \
            -H "apikey: $KEY" \
            -H "Authorization: Bearer $KEY" \
            -H "Content-Type: application/json" \
            -d '{}' | tr -d '"')
          echo "Gov signature: $MD5"
          echo "md5=$MD5" >> "$GITHUB_OUTPUT"

      - name: Compare
        id: compare
        run: |
          DIA="${{ steps.dia.outputs.md5 }}"
          GOV="${{ steps.gov.outputs.md5 }}"
          echo "Dia: $DIA"
          echo "Gov: $GOV"
          echo "dia_md5=$DIA" >> "$GITHUB_OUTPUT"
          echo "gov_md5=$GOV" >> "$GITHUB_OUTPUT"
          if [[ "$DIA" != "$GOV" ]]; then
            echo "drift=true" >> "$GITHUB_OUTPUT"
            echo "::error::Address normalizer DRIFT detected!"
            echo "::error::dia.dia_normalize_address       md5=$DIA"
            echo "::error::gov.normalize_address_txt       md5=$GOV"
            echo "::error::Fix: align both function bodies. See docs/architecture/address_normalization_spec.md"
          else
            echo "drift=false" >> "$GITHUB_OUTPUT"
            echo "OK — both DBs report identical normalizer signature ($DIA)."
          fi

      # On drift, ensure there's a tracking issue. If one is already open with
      # the `address-normalizer-drift` label, add a follow-up comment with
      # today's md5s so we have a timeline. Otherwise open a fresh issue.
      # Either way we still fail the job at the end so the run shows red.
      - name: Open / update drift issue
        if: steps.compare.outputs.drift == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DIA: ${{ steps.compare.outputs.dia_md5 }}
          GOV: ${{ steps.compare.outputs.gov_md5 }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          BODY=$(cat <<EOF
          The daily Address Normalizer Drift Check detected a mismatch between the
          two address-normalizer functions. Cross-domain matching depends on
          byte-equivalent normalization rules, so this is a silent match-quality
          regression risk until resolved.

          - \`dia.dia_normalize_address\`   md5: \`$DIA\`
          - \`gov.normalize_address_txt\`   md5: \`$GOV\`

          Spec: [\`docs/architecture/address_normalization_spec.md\`](../blob/main/docs/architecture/address_normalization_spec.md)
          Run: $RUN_URL

          To resolve: align both function bodies and confirm the next scheduled
          run (or a manual \`workflow_dispatch\`) reports a single matching md5,
          then close this issue.
          EOF
          )

          # Ensure the label exists (idempotent — first run creates it).
          if ! gh label list --search address-normalizer-drift --json name --jq '.[].name' | grep -qx address-normalizer-drift; then
            gh label create address-normalizer-drift \
              --color B60205 \
              --description "Auto-opened by drift-check workflow"
          fi

          EXISTING=$(gh issue list \
            --label address-normalizer-drift \
            --state open \
            --json number,title \
            --jq '.[0].number // empty')

          if [[ -n "$EXISTING" ]]; then
            echo "Found existing drift issue #$EXISTING; appending comment."
            gh issue comment "$EXISTING" --body "$BODY"
          else
            echo "Opening new drift issue."
            gh issue create \
              --title "Address normalizer drift detected ($(date -u +%Y-%m-%d))" \
              --label address-normalizer-drift \
              --body "$BODY"
          fi

      - name: Fail job on drift
        if: steps.compare.outputs.drift == 'true'
        run: exit 1
