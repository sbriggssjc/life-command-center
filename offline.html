<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0f1117">
<title>Life Command Center — Offline</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Outfit', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0f1117; color: #e2e8f0;
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; min-height: 100dvh;
    padding: 24px; text-align: center;
  }
  .offline-card {
    max-width: 380px; width: 100%;
    background: #1a1d27; border-radius: 16px;
    padding: 40px 28px; border: 1px solid #2d3348;
  }
  .offline-icon {
    width: 64px; height: 64px; margin: 0 auto 20px;
    color: #64748b;
  }
  h1 { font-size: 20px; font-weight: 600; margin-bottom: 8px; }
  p { font-size: 14px; color: #94a3b8; line-height: 1.5; margin-bottom: 24px; }
  .retry-btn {
    display: inline-block; padding: 10px 28px;
    background: #6366f1; color: #fff; border: none;
    border-radius: 8px; font-size: 14px; font-weight: 600;
    cursor: pointer; font-family: inherit;
    transition: background 0.15s;
  }
  .retry-btn:hover { background: #4f46e5; }
  .retry-btn:active { transform: scale(0.97); }
</style>
</head>
<body>
<div class="offline-card">
  <svg class="offline-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
    <path d="M1 1l22 22"/>
    <path d="M16.72 11.06A10.94 10.94 0 0119 12.55"/>
    <path d="M5 12.55a10.94 10.94 0 015.17-2.39"/>
    <path d="M10.71 5.05A16 16 0 0122.56 9"/>
    <path d="M1.42 9a15.91 15.91 0 014.7-2.88"/>
    <path d="M8.53 16.11a6 6 0 016.95 0"/>
    <line x1="12" y1="20" x2="12.01" y2="20"/>
  </svg>
  <h1>You're offline</h1>
  <p>LCC can't reach the network right now. Check your connection and try again.</p>
  <button class="retry-btn" onclick="location.reload()">Retry</button>
</div>
</body>
</html>
