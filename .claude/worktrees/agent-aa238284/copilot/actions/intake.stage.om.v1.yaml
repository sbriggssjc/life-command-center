action_id: intake.stage.om.v1
display_name: "Stage OM Intake"
description: >
  Stages a property Offering Memorandum (PDF) for downstream extraction
  and matching. This action performs ingestion ONLY and returns immediately.
category: intake
risk_tier: read_only
confirmation_required: false

owner:
  orchestrator: lcc
  systems_of_record:
    - lcc

inputs:
  schema:
    type: object
    required:
      - intake_source
      - intake_channel
      - artifacts
    properties:
      intake_source:
        type: string
        enum: [copilot]
      intake_channel:
        type: string
        enum: [outlook, copilot_chat, teams]
      intent:
        type: string

      artifacts:
        type: object
        required: [primary_document]
        properties:
          primary_document:
            type: object
            required:
              - file_id
              - file_name
              - storage_path
            properties:
              file_id:
                type: string
              file_name:
                type: string
              storage_path:
                type: string
              sha256:
                type: string

      seed_data:
        type: object
        properties:
          property:
            type: object
            properties:
              name:
                type: string
              address:
                type: object
                properties:
                  line1: { type: string }
                  city: { type: string }
                  state: { type: string }
                  postal_code: { type: string }
          tags:
            type: array
            items: { type: string }

      copilot_metadata:
        type: object
        properties:
          conversation_id: { type: string }
          message_id: { type: string }
          model: { type: string }
          run_id: { type: string }

outputs:
  schema:
    type: object
    properties:
      ok: { type: boolean }
      status: { type: string }
      staged_intake_item_id: { type: string }
