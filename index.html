      task ? h(LogToSFPanel, { task }) : null,
      // Email Composer Panel (only for tasks with sf_property smart tag)
      task ? h(EmailComposerPanel, { task, authUser, showToast: showToast || (() => {}) }) : null,
      h("div", { style: { display: "flex", justifyContent: "flex-end", gap: 8, marginTop: 18 }},
        h("button", { onClick: onClose, style: { border: "1px solid #e2e8f0", background: "white", borderRadius: 8, padding: "9px 18px", cursor: "pointer", fontSize: 13, color: "#64748b", minHeight: 44 }}, "Cancel"),
        h("button", { onClick: handleSave, style: { border: "none", background: "#1e293b", color: "white", borderRadius: 8, padding: "9px 22px", cursor: "pointer", fontSize: 13, fontWeight: 600, minHeight: 44 }}, task ? "Save" : "Add Task"),
      ),
    )
  );
}

// ═══════════════════════════════════════════════════════════════════════════════
// MAIN APP
// ═══════════════════════════════════════════════════════════════════════════════
function App() {
  const saved = useMemo(() => loadSaved(), []);
  const [tasks, setTasks] = useState(saved ? saved.tasks : makeSamples);
  const [kids, setKids] = useState(saved ? saved.kids : DEFAULT_KIDS);
  const [view, setView] = useState("today");
  const [filterCat, setFilterCat] = useState("all");
  const [filterPri, setFilterPri] = useState("all");
  const [filterSource, setFilterSource] = useState("all");
  const [showDone, setShowDone] = useState(false);
  const [groupCollapseState, setGroupCollapseState] = useState(() => loadGroupCollapseState());
  const [modalTask, setModalTask] = useState(null);
  const [search, setSearch] = useState("");
  const [settingsOpen, setSettingsOpen] = useState(false);
  const [weekOffset, setWeekOffset] = useState(0);
  const [dayOffset, setDayOffset] = useState(0);
  const [selectedDay, setSelectedDay] = useState(todayStr());
  const [isMobile, setIsMobile] = useState(window.innerWidth <= 600);
  const [quickAdd, setQuickAdd] = useState("");
  const [authUser, setAuthUser] = useState(null);
  const [syncStatus, setSyncStatus] = useState("signed-out"); // signed-out, syncing, synced, offline
  const [toastMsg, setToastMsg] = useState("");
  const [calendarEvents, setCalendarEvents] = useState(() => loadCalendarEvents());
  const [syncResult, setSyncResult] = useState(null); // { added, skipped } or null
  const [calSyncResult, setCalSyncResult] = useState(null);
  const [copilotOpen, setCopilotOpen] = useState(false);
  const [bdFilter, setBdFilter] = useState("all");
  const [bdConfig, setBdConfig] = useState(() => loadBDConfig());
  const [bdProgress, setBdProgress] = useState(() => loadBDProgress());
  const [rescheduleTask, setRescheduleTask] = useState(null);
  const [rescheduleBdCat, setRescheduleBdCat] = useState(null);
  const [aiConfig, setAiConfig] = useState(() => loadAIConfig());
  const updateAIConfig = useCallback((patch) => {
    setAiConfig(prev => { const next = { ...prev, ...patch }; saveAIConfig(next); return next; });
  }, []);
  const fileRef = useRef(null);
  const syncRef = useRef(null);
  const calSyncRef = useRef(null);
  const toastTimer = useRef(null);

  // Persist calendar events to localStorage + IndexedDB (survives page reload on mobile)
  useEffect(() => { if (calendarEvents.length) saveCalendarEvents(calendarEvents); }, [calendarEvents]);

  // On load: restore calendar from IndexedDB if localStorage was cleared (iOS PWA fix)
  useEffect(() => {
    if (calendarEvents.length > 0) return; // Already have data from localStorage
    (async () => {
      try {
        const cached = await loadCalendarFromIDB();
        if (cached && cached.events && cached.events.length > 0) {
          setCalendarEvents(cached.events);
          setCalSyncResult({ count: cached.events.length, auto: true });
          setTimeout(() => setCalSyncResult(null), 5000);
        }
      } catch {}
    })();
  }, []);

  // Track mobile viewport
  useEffect(() => {
    const mql = window.matchMedia("(max-width: 600px)");
    const handler = (e) => setIsMobile(e.matches);
    mql.addEventListener("change", handler);
    return () => mql.removeEventListener("change", handler);
  }, []);

  // Keep selectedDay in sync when weekOffset changes
  useEffect(() => {
    const ref = new Date();
    ref.setDate(ref.getDate() + weekOffset * 7);
    const dates = getWeekDates(toLocalDate(ref));
    if (!dates.includes(selectedDay)) setSelectedDay(dates[0]);
  }, [weekOffset]);

  const showToast = useCallback((msg) => {
    setToastMsg(msg);
    if (toastTimer.current) clearTimeout(toastTimer.current);
    toastTimer.current = setTimeout(() => setToastMsg(""), 3000);
  }, []);

  // ─── BD Config + Progress Fetch ─────────────────────────────────────────────
  const fetchBDData = useCallback(async () => {
    const base = getAIBaseURL();
    if (!base) return;
    const config = loadAIConfig();
    const headers = { "Content-Type": "application/json", "apikey": config.anonKey || "", "Authorization": "Bearer " + (config.anonKey || "") };
    try {
      const [cfgResp, progResp] = await Promise.all([
        fetch(base + "/bd/config", { headers }).then(r => r.ok ? r.json() : null).catch(() => null),
        fetch(base + "/bd/daily-progress", { headers }).then(r => r.ok ? r.json() : null).catch(() => null),
      ]);
      if (cfgResp?.categories) {
        const cfgMap = {};
        cfgResp.categories.forEach(c => { cfgMap[c.category] = c.daily_target; });
        setBdConfig(cfgMap);
        saveBDConfig(cfgMap);
      }
      if (progResp?.categories) {
        const progMap = {};
        progResp.categories.forEach(c => { progMap[c.name] = c.completed; });
        setBdProgress(progMap);
        saveBDProgress(progMap);
      }
    } catch (e) { console.warn("BD data fetch:", e); }
  }, []);

  // Fetch BD data on mount if AI configured
  useEffect(() => { if (getAIBaseURL()) fetchBDData(); }, []);

  // BD log completion helper
  const logBDCompletion = useCallback(async (task, bdCategory) => {
    try {
      await aiCall("/bd/log-completion", {
        task_title: task.title,
        bd_category: bdCategory,
        action_type: "completed",
        details: { task_id: task.id, due: task.due },
      });
      // Refresh progress
      fetchBDData();
    } catch (e) { console.warn("BD log:", e); }
  }, [fetchBDData]);

  // Handle reschedule: create follow-up task in Microsoft To Do
  const handleReschedule = useCallback(async (task, followUpDate) => {
    try {
      const config = loadMsConfig();
      const listId = config.listMapping?.["work"];
      if (!listId) { showToast("No Work list mapped — cannot create follow-up"); setRescheduleTask(null); return; }
      const followUpTitle = "Follow-up: " + task.title.replace(/^Follow-up:\s*/i, "");
      const body = {
        title: followUpTitle,
        importance: "normal",
        status: "notStarted",
        body: { content: "Auto-scheduled follow-up from LCC BD Engine", contentType: "text" },
        dueDateTime: { dateTime: followUpDate + "T00:00:00.0000000", timeZone: "UTC" },
      };
      await graphFetch("/me/todo/lists/" + listId + "/tasks", { method: "POST", body: JSON.stringify(body) });
      showToast("Follow-up scheduled for " + new Date(followUpDate + "T12:00:00").toLocaleDateString("en-US", { month: "short", day: "numeric" }));
    } catch (e) {
      console.error("Reschedule error:", e);
      showToast("Could not create follow-up task");
    }
    setRescheduleTask(null);
    setRescheduleBdCat(null);
  }, [showToast]);

  // Auto-save to localStorage
  const setTasksAndSave = useCallback((updater) => {
    setTasks(prev => {
      const next = typeof updater === "function" ? updater(prev) : updater;
      setTimeout(() => saveToStorage(next, kids), 0);
      return next;
    });
  }, [kids]);

  const setKidsAndSave = useCallback((newKids) => {
    setKids(newKids);
    setTimeout(() => saveToStorage(tasks, newKids), 0);
  }, [tasks]);

  // ─── Microsoft Auth (redirect flow for PWA compatibility) ─────────────────
  // Helper: after sign-in, sync tasks AND fetch calendar
  const runPostSignInSync = useCallback(async (account) => {
    setAuthUser(account);
    setSyncStatus("syncing");
    try {
      const merged = await fullSync(tasks, setTasksAndSave);
      setTasksAndSave(merged);
      setSyncStatus("synced");
      // Also fetch calendar events for this week
      const ref = new Date();
      const wd = getWeekDates(toLocalDate(ref));
      try {
        const events = await fetchCalendarEvents(wd[0], wd[6]);
        setCalendarEvents(prev => {
          const newEvts = events.filter(e => !prev.find(pe => pe.id === e.id));
          return [...prev, ...newEvts];
        });
      } catch(ce) { console.warn("Calendar fetch:", ce); }
    } catch(e) {
      console.error("Sync error:", e);
      setSyncStatus("offline");
    }
  }, [tasks, setTasksAndSave]);

  // Wait for handleRedirectPromise, THEN check for accounts
  useEffect(() => {
    if (!msalInstance) return;
    const init = async () => {
      try {
        const resp = msalRedirectResult ? await msalRedirectResult : null;
        if (resp && resp.account) {
          runPostSignInSync(resp.account);
          return;
        }
        // Check for existing cached accounts
        const accounts = msalInstance.getAllAccounts();
        if (accounts.length > 0) {
          runPostSignInSync(accounts[0]);
        }
      } catch(e) {
        console.warn("MSAL init:", e);
        const accounts = msalInstance.getAllAccounts();
        if (accounts.length > 0) {
          runPostSignInSync(accounts[0]);
        }
      }
    };
    init();
  }, []);

  const handleSignIn = useCallback(async () => {
    if (!msalInstance) {
      showToast("Set your Client ID in index.html first");
      return;
    }
    try {
      await msalInstance.loginRedirect({ scopes: GRAPH_SCOPES });
    } catch(e) {
      console.error("Sign in error:", e);
      showToast("Sign in failed");
    }
  }, [showToast]);

  const handleSignOut = useCallback(async () => {
    if (msalInstance) {
      try { await msalInstance.logoutRedirect({ postLogoutRedirectUri: MSAL_CONFIG.auth.redirectUri }); } catch(e) {}
    }
    setAuthUser(null);
    setSyncStatus("signed-out");
    showToast("Signed out");
  }, [showToast]);

  const handleSync = useCallback(async () => {
    if (!authUser) return;
    setSyncStatus("syncing");
    try {
      const merged = await fullSync(tasks, setTasksAndSave);
      setTasksAndSave(merged);
      // Also refresh calendar events
      try {
        const today = todayStr();
        const twoWeeksOut = new Date();
        twoWeeksOut.setDate(twoWeeksOut.getDate() + 14);
        const endDate = toLocalDate(twoWeeksOut);
        const events = await fetchCalendarEvents(today, endDate);
        setCalendarEvents(prev => {
          const existingIds = new Set(prev.map(e => e.id));
          const newEvts = events.filter(e => !existingIds.has(e.id));
          return newEvts.length ? [...prev, ...newEvts] : prev;
        });
      } catch(ce) { console.warn("Calendar fetch during sync:", ce); }
      setSyncStatus("synced");
      showToast("Synced successfully");
    } catch(e) {
      console.error("Sync error:", e);
      setSyncStatus("offline");
      showToast("Sync failed \u2014 working offline");
    }
  }, [authUser, tasks, setTasksAndSave, showToast]);

  // ─── Power Automate Data Processing ────────────────────────────────────────
  const processSyncData = useCallback((jsonText, source) => {
    try {
      const data = JSON.parse(jsonText);
      const items = Array.isArray(data) ? data : (data.tasks || data.value || []);
      if (!items.length) { if (source === "manual") alert("No tasks found in the file."); return; }
      setTasksAndSave(prev => {
        const result = mergeToDoTasks(prev, items);
        setTimeout(() => saveToStorage(result.merged, kids), 0);
        setSyncResult({ added: result.added, skipped: result.skipped, auto: source === "auto" });
        setTimeout(() => setSyncResult(null), 8000);
        return result.merged;
      });
    } catch(err) {
      if (source === "manual") alert("Could not read the To Do sync file. Make sure it's the JSON file from Power Automate.");
    }
  }, [kids, setTasksAndSave]);

  const processCalendarData = useCallback((jsonText, source) => {
    try {
      const data = JSON.parse(jsonText);
      const items = Array.isArray(data) ? data : (data.value || []);
      setCalendarEvents(items.map(ev => ({
        id: ev.id || uid(),
        title: ev.title || ev.subject || "",
        start: ev.start || "",
        end: ev.end || "",
        location: ev.location || "",
        isAllDay: ev.isAllDay || false,
        organizer: (typeof ev.organizer === "object" && ev.organizer?.EmailAddress) ? (ev.organizer.EmailAddress.Name || ev.organizer.EmailAddress.Address || "") : (ev.organizer === "[object Object]" ? "" : (ev.organizer || "")),
        body: ev.body || ev.bodyPreview || "",
      })));
      setCalSyncResult({ count: items.length, auto: source === "auto" });
      setTimeout(() => setCalSyncResult(null), 8000);
    } catch(err) {
      if (source === "manual") alert("Could not read the calendar sync file.");
    }
  }, []);

  // Manual file picker sync
  const syncFromToDo = async (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    // Try to save the file handle for future auto-sync
    if (window.showOpenFilePicker) {
      try {
        const [handle] = await window.showOpenFilePicker({
          types: [{ description: "JSON", accept: { "application/json": [".json"] } }],
          startIn: "documents",
        });
        await saveSyncHandle(handle);
        const f = await handle.getFile();
        processSyncData(await f.text(), "manual");
        e.target.value = "";
        return;
      } catch(err) { /* User cancelled or API not supported — fall through to FileReader */ }
    }
    const reader = new FileReader();
    reader.onload = (ev) => processSyncData(ev.target.result, "manual");
    reader.readAsText(file);
    e.target.value = "";
  };

  // Auto-sync on app load — reads from saved file handles
  useEffect(() => {
    (async () => {
      try {
        const handle = await getSyncHandle();
        if (!handle) return;
        let perm = await handle.queryPermission({ mode: "read" });
        if (perm !== "granted") perm = await handle.requestPermission({ mode: "read" });
        if (perm === "granted") {
          const file = await handle.getFile();
          processSyncData(await file.text(), "auto");
        }
      } catch(err) { /* Silently fail */ }
    })();
  }, [processSyncData]);

  // Auto-sync calendar on app load
  useEffect(() => {
    (async () => {
      try {
        const handle = await getSyncHandle(IDB_KEY_CALENDAR);
        if (!handle) return;
        let perm = await handle.queryPermission({ mode: "read" });
        if (perm !== "granted") perm = await handle.requestPermission({ mode: "read" });
        if (perm === "granted") {
          const file = await handle.getFile();
          processCalendarData(await file.text(), "auto");
        }
      } catch(err) {}
    })();
  }, [processCalendarData]);

  // Fetch calendar from Graph API on app load (covers mobile where file handles don't work)
  // Fires when authUser changes OR on initial load via silent token acquisition
  useEffect(() => {
    if (!authUser) return;
    (async () => {
      try {
        const today = todayStr();
        const twoWeeksOut = new Date();
        twoWeeksOut.setDate(twoWeeksOut.getDate() + 14);
        const endDate = toLocalDate(twoWeeksOut);
        const events = await fetchCalendarEvents(today, endDate);
        setCalendarEvents(prev => {
          const existingIds = new Set(prev.map(e => e.id));
          const newEvts = events.filter(e => !existingIds.has(e.id));
          return newEvts.length ? [...prev, ...newEvts] : prev;
        });
      } catch(e) { console.warn("Graph calendar auto-fetch:", e); }
    })();
  }, [authUser]);

  // Aggressive silent calendar fetch on load — works even if authUser state hasn't been set yet
  // This is the key fix for iPhone: tries to get a silent token and fetch calendar immediately
  useEffect(() => {
    const timer = setTimeout(async () => {
      // Only run if we don't already have fresh calendar data
      if (calendarEvents.length > 0) return;
      try {
        const events = await trySilentCalendarFetch();
        if (events && events.length > 0) {
          setCalendarEvents(events);
          setCalSyncResult({ count: events.length, auto: true });
          setTimeout(() => setCalSyncResult(null), 5000);
        }
      } catch {}
    }, 1500); // Small delay to let MSAL init complete
    return () => clearTimeout(timer);
  }, []);

  // Browser Notifications
  useEffect(() => {
    if (!("Notification" in window)) return;
    if (Notification.permission === "default") Notification.requestPermission();

    const check = () => {
      if (Notification.permission !== "granted") return;
      const now = new Date();
      const today = todayStr();

      // Notify for tasks due today (once per session)
      const notifiedTasks = JSON.parse(sessionStorage.getItem("notifiedTasks") || "[]");
      tasks.filter(t => !t.done && (t.horizon === "today" || t.due === today)).forEach(t => {
        if (!notifiedTasks.includes(t.id)) {
          new Notification("Task Due Today", { body: t.title, icon: "\u{1F4CB}" });
          notifiedTasks.push(t.id);
        }
      });
      sessionStorage.setItem("notifiedTasks", JSON.stringify(notifiedTasks));

      // Notify for calendar events starting in next 15 minutes
      const notifiedEvents = JSON.parse(sessionStorage.getItem("notifiedEvents") || "[]");
      calendarEvents.forEach(ev => {
        if (ev.isAllDay || notifiedEvents.includes(ev.id)) return;
        const start = new Date(ev.start);
        const diff = (start - now) / 60000; // minutes
        if (diff > 0 && diff <= 15) {
          const fmtTime = start.toLocaleTimeString("en-US", { hour: "numeric", minute: "2-digit" });
          new Notification("Upcoming: " + ev.title, { body: "Starts at " + fmtTime + (ev.location ? " \u{1F4CD} " + (typeof ev.location === "string" ? ev.location : ev.location.displayName || "") : "") });
          notifiedEvents.push(ev.id);
          sessionStorage.setItem("notifiedEvents", JSON.stringify(notifiedEvents));
        }
      });
    };

    check();
    const interval = setInterval(check, 60000);
    return () => clearInterval(interval);
  }, [tasks, calendarEvents]);

  // ─── Fetch calendar events for week view ──────────────────────────────────
  const weekDates = useMemo(() => {
    const ref = new Date();
    ref.setDate(ref.getDate() + weekOffset * 7);
    return getWeekDates(toLocalDate(ref));
  }, [weekOffset]);

  useEffect(() => {
    if (authUser && view === "week_cal") {
      fetchCalendarEvents(weekDates[0], weekDates[6]).then(events => {
        setCalendarEvents(prev => [...prev, ...events.filter(e => !prev.find(pe => pe.id === e.id))]);
      }).catch(e => {
        console.warn("Calendar fetch error:", e);
      });
    }
  }, [authUser, view, weekDates]);

  // ─── Task Actions (with sync) ─────────────────────────────────────────────
  const priWeight = { urgent: 0, high: 1, medium: 2, low: 3 };

  const toggle = useCallback(async (id) => {
    let toggled = null;
    setTasksAndSave(p => p.map(t => {
      if (t.id === id) {
        toggled = { ...t, done: !t.done };
        return toggled;
      }
      return t;
    }));
    // Sync toggle to Microsoft
    setTimeout(async () => {
      if (toggled && toggled.msId && authUser) {
        const config = loadMsConfig();
        const listId = config.listMapping?.[toggled.category];
        if (listId) {
          try {
            await updateMsTask(toggled.msId, toggled, listId);
          } catch(e) {
            // Queue for later
            const queue = loadSyncQueue();
            queue.push({ type: "update", msId: toggled.msId, task: toggled });
            saveSyncQueue(queue);
          }
        }
      }
    }, 0);
  }, [setTasksAndSave, authUser]);

  const remove = useCallback(async (id) => {
    let removed = null;
    setTasksAndSave(p => {
      removed = p.find(t => t.id === id);
      return p.filter(t => t.id !== id);
    });
    // Sync delete to Microsoft
    setTimeout(async () => {
      if (removed && removed.msId && authUser) {
        const config = loadMsConfig();
        const listId = config.listMapping?.[removed.category];
        if (listId) {
          try {
            await deleteMsTask(removed.msId, listId);
          } catch(e) {
            const queue = loadSyncQueue();
            queue.push({ type: "delete", msId: removed.msId, category: removed.category });
            saveSyncQueue(queue);
          }
        }
      }
    }, 0);
  }, [setTasksAndSave, authUser]);

  const save = useCallback(async (task) => {
    // Apply smart tags on save
    applySmartTags(task);
    const isNew = !tasks.find(t => t.id === task.id);
    setTasksAndSave(p => {
      const idx = p.findIndex(t => t.id === task.id);
      return idx >= 0 ? p.map(t => t.id === task.id ? task : t) : [...p, task];
    });
    setModalTask(null);

    // Sync to Microsoft
    if (authUser) {
      const config = loadMsConfig();
      const listId = config.listMapping?.[task.category];
      if (listId) {
        try {
          if (isNew || !task.msId) {
            const result = await createMsTask(task, listId);
            if (result) {
              setTasksAndSave(p => p.map(t => t.id === task.id ? { ...t, msId: result.id } : t));
              showToast("Task synced to Microsoft To Do");
            }
          } else {
            await updateMsTask(task.msId, task, listId);
            showToast("Task updated in Microsoft To Do");
          }
        } catch(e) {
          const queue = loadSyncQueue();
          queue.push({ type: "update", msId: task.msId, task });
          saveSyncQueue(queue);
          showToast("Saved locally \u2014 will sync later");
        }
      }
    }
  }, [tasks, setTasksAndSave, authUser, showToast]);

  const handleQuickAdd = useCallback(() => {
    if (!quickAdd.trim()) return;
    save({ id: uid(), title: quickAdd.trim(), category: "personal", priority: "medium", horizon: "today", due: todayStr(), done: false, notes: "", source: "manual", recurrence: "none", kid: "", created: todayStr() });
    setQuickAdd("");
  }, [quickAdd, save]);

  // ─── Export/Import ─────────────────────────────────────────────────────────
  const exportData = () => {
    const blob = new Blob([JSON.stringify({ tasks, kids }, null, 2)], { type: "application/json" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "life-tasks-" + todayStr() + ".json";
    a.click();
  };
  const importData = (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const data = JSON.parse(ev.target.result);
        if (Array.isArray(data)) { setTasksAndSave(data); }
        else if (data.tasks) { setTasksAndSave(data.tasks); if (data.kids) setKidsAndSave(data.kids); }
        setSettingsOpen(false);
        showToast("Data imported successfully");
      } catch { alert("Invalid file format"); }
    };
    reader.readAsText(file);
    e.target.value = "";
  };

  // ─── Filtered Data ─────────────────────────────────────────────────────────
  // Lazy-apply smart tags to all tasks on first render
  useEffect(() => {
    let changed = false;
    const updated = tasks.map(t => {
      if (!t.smartTags || !t.smartTags.length) {
        changed = true;
        return { ...t, ...(() => { const tags = detectSmartTags(t); return { smartTags: tags, smartGroup: determineSmartGroup(t, tags) }; })() };
      }
      return t;
    });
    if (changed) setTasksAndSave(updated);
  }, []); // Run once on mount

  const toggleGroupCollapse = useCallback((groupId) => {
    setGroupCollapseState(prev => {
      const next = { ...prev, [groupId]: !prev[groupId] };
      saveGroupCollapseState(next);
      return next;
    });
  }, []);

  const filtered = useMemo(() => {
    let list = [...tasks];
    if (!showDone) list = list.filter(t => !t.done);
    if (filterCat !== "all") list = list.filter(t => t.category === filterCat);
    if (filterPri !== "all") list = list.filter(t => t.priority === filterPri);
    if (filterSource !== "all") list = list.filter(t => t.source === filterSource);
    if (search.trim()) {
      const q = search.toLowerCase();
      list = list.filter(t => t.title.toLowerCase().includes(q) || (t.notes || "").toLowerCase().includes(q) || (t.kid || "").toLowerCase().includes(q));
    }
    if (view === "today") list = list.filter(t => t.horizon === "today" || t.due === todayStr() || (!t.done && t.due && t.due < todayStr()));
    list.sort((a, b) => {

            key: "past-due",
            tasks: pastDueTasks,
            toggle, remove, edit: setModalTask,
          }));
        }
        // BD category groups — use BDTaskRow with quick-action buttons
        Object.entries(BD_CATEGORY_META).forEach(([key, meta]) => {
          if (groups[key].length > 0) {
            sections.push(h("div", { key, style: { marginBottom: 22 } },
              h("h3", { style: hdrStyle(meta.color) },
                meta.icon + " " + meta.label, " ", h("span", { style: { fontWeight: 400, fontSize: 12, color: "#94a3b8" } }, "(" + groups[key].length + ")"),
              ),
              groups[key].map(t => h(BDTaskRow, {
                key: t.id, task: t, bdCategory: key,
                onBrief: () => setModalTask(t),
                onEmail: () => setModalTask(t),
                onLog: () => setModalTask(t),
                onDone: () => {
                  const route = routeTaskToBD(t);
                  toggle(t.id);
                  if (route && getAIBaseURL()) {
                    logBDCompletion(t, route.category);
                    if (!t.done) { setRescheduleTask(t); setRescheduleBdCat(route.category); }
                  }
                },
                onEdit: () => setModalTask(t),
              })),
            ));
          }
        });
        // Other work tasks — basic TaskRow
        if (groups.other_work.length > 0) {
          sections.push(h(TaskGroup, {
            key: "other_work", label: "\uD83D\uDCBC Other Work", count: groups.other_work.length,
            color: "#64748b", tasks: groups.other_work, toggle, remove, edit: setModalTask,
          }));
        }
        // Personal tasks — basic TaskRow
        if (groups.personal.length > 0) {
          sections.push(h(TaskGroup, {
            key: "personal", label: "\uD83C\uDFE0 Personal & Family", count: groups.personal.length,
            color: "#16a34a", tasks: groups.personal, toggle, remove, edit: setModalTask,
          }));
        }
        return h("div", null, ...sections);
      })() : null,
    ),

    // Modal
    modalTask !== null ? h(TaskModal, { task: modalTask.id ? modalTask : null, kids, onSave: save, onClose: () => setModalTask(null), authUser, showToast }) : null,

    // Reschedule Dialog (after BD task completion)
    rescheduleTask ? h(RescheduleDialog, {
      task: rescheduleTask,
      bdCategory: rescheduleBdCat,
      onSchedule: handleReschedule,
      onSkip: () => { setRescheduleTask(null); setRescheduleBdCat(null); },
    }) : null,

    // AI Chat Copilot Sidebar
    h(AIChatCopilot, { open: copilotOpen, onClose: () => setCopilotOpen(false), currentTask: modalTask && modalTask.id ? modalTask : null }),

    // Copilot overlay (dim background when open)
    copilotOpen ? h("div", { onClick: () => setCopilotOpen(false), style: { position: "fixed", inset: 0, background: "rgba(0,0,0,0.2)", zIndex: 1000 } }) : null,

    // Toast
    h(Toast, { message: toastMsg }),
  );
}

ReactDOM.createRoot(document.getElementById("app")).render(h(App));

// ═══════════════════════════════════════════════════════════════════════════════
// SERVICE WORKER REGISTRATION
// ═══════════════════════════════════════════════════════════════════════════════
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("sw.js").catch(err => {
      console.warn("SW registration failed:", err);
    });
  });
}
</script>
</body>
