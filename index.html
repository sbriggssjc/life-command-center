  /* Mobile day strip for week calendar */
  .day-strip { display: flex; overflow-x: auto; gap: 0; -webkit-overflow-scrolling: touch; scrollbar-width: none; padding: 0 4px; }

  .day-strip-item.active .day-strip-dot { background: white; }

    .filter-bar { flex-direction: column; }

    .task-row { padding: 10px 10px !important; }
    .task-badges { gap: 3px !important; }

    .sync-badge { font-size: 10px !important; }

<script>
const { useState, useEffect, useMemo, useRef, useCallback, createElement: h } = React;

// ═══════════════════════════════════════════════════════════════════════════════
// FILE HANDLE PERSISTENCE (IndexedDB)
// ═══════════════════════════════════════════════════════════════════════════════
const IDB_NAME = "LifeCommandCenter";
const IDB_STORE = "fileHandles";
const IDB_KEY = "todoSyncHandle";
const IDB_KEY_CALENDAR = "calendarSyncHandle";

function openIDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(IDB_NAME, 1);
    req.onupgradeneeded = () => req.result.createObjectStore(IDB_STORE);
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

async function saveSyncHandle(handle, key = IDB_KEY) {
  const db = await openIDB();
  const tx = db.transaction(IDB_STORE, "readwrite");
  tx.objectStore(IDB_STORE).put(handle, key);
  return new Promise((resolve, reject) => { tx.oncomplete = resolve; tx.onerror = reject; });
}

async function getSyncHandle(key = IDB_KEY) {
  const db = await openIDB();
  const tx = db.transaction(IDB_STORE, "readonly");
  const req = tx.objectStore(IDB_STORE).get(key);
  return new Promise((resolve) => { req.onsuccess = () => resolve(req.result || null); req.onerror = () => resolve(null); });
}

async function clearSyncHandle(key = IDB_KEY) {
  const db = await openIDB();
  const tx = db.transaction(IDB_STORE, "readwrite");
  tx.objectStore(IDB_STORE).delete(key);
}

// ═══════════════════════════════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════════════════════════════
const uid = () => Math.random().toString(36).slice(2, 10) + Date.now().toString(36);
const todayStr = () => { const d = new Date(); return d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0") + "-" + String(d.getDate()).padStart(2,"0"); };
const toLocalDate = (iso) => { try { const d = new Date(iso); return d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0") + "-" + String(d.getDate()).padStart(2,"0"); } catch { return ""; } };

function getWeekDates(refDate) {
  const d = new Date(refDate + "T12:00:00");
  const day = d.getDay();
  const mon = new Date(d);
  mon.setDate(d.getDate() - ((day + 6) % 7));
  return Array.from({ length: 7 }, (_, i) => {
    const x = new Date(mon);
    x.setDate(mon.getDate() + i);
    return x.getFullYear() + "-" + String(x.getMonth()+1).padStart(2,"0") + "-" + String(x.getDate()).padStart(2,"0");
  });
}

const dayLabel = (d) => {
  if (!d) return "";
  const t = new Date(d + "T12:00:00");
  const now = new Date();
  const diff = Math.round((t - new Date(now.getFullYear(), now.getMonth(), now.getDate())) / 86400000);
  if (diff === 0) return "Today";
  if (diff === 1) return "Tomorrow";
  if (diff === -1) return "Yesterday";
  if (diff > 1 && diff <= 7) return t.toLocaleDateString("en-US", { weekday: "short" });
  return t.toLocaleDateString("en-US", { month: "short", day: "numeric" });
};

const shortDay = (d) => new Date(d + "T12:00:00").toLocaleDateString("en-US", { weekday: "short" });
const shortDate = (d) => new Date(d + "T12:00:00").toLocaleDateString("en-US", { month: "short", day: "numeric" });

const formatTime = (iso) => {
  if (!iso) return "";
  const d = new Date(iso);
  return d.toLocaleTimeString("en-US", { hour: "numeric", minute: "2-digit" });
};

// ═══════════════════════════════════════════════════════════════════════════════

const CATEGORIES = [

const RECURRENCE = [

const SOURCES = [

];

const DEFAULT_KIDS = ["Child 1", "Child 2", "Child 3"];

// ─── SMART TAGGING & GROUPING ENGINE ────────────────────────────────────────
// Detect patterns in task titles for intelligent sub-grouping

function detectSmartTags(task) {
  const tags = [];
  const title = (task.title || "").trim();

  // Pattern 1: Salesforce property — "Property Name - City, ST"
  const propMatch = title.match(/^(.+?)\s+-\s+([A-Za-z\s.]+),\s+([A-Z]{2})$/);
  if (propMatch) {
    tags.push({ type: "sf_property", value: propMatch[1].trim(), city: propMatch[2].trim(), state: propMatch[3], confidence: 0.95 });
  }

  // Pattern 2: Action type keywords in title
  const actionPatterns = [
    [/\b(?:follow[\s-]?up|touch[\s-]?point|check[\s-]?in)\b/i, "follow_up"],
    [/\b(?:schedule|book|arrange|set up)\b/i, "schedule"],
    [/\b(?:review|audit|check|inspect)\b/i, "review"],
    [/\b(?:call|phone|dial)\b/i, "call"],
    [/\b(?:email|send|reply|respond)\b/i, "email"],
    [/\b(?:prepare|draft|write|create)\b/i, "prepare"],
    [/\b(?:approve|sign|authorize)\b/i, "approve"],
  ];
  for (const [rx, actionType] of actionPatterns) {
    if (rx.test(title)) {
      tags.push({ type: "action", value: actionType, confidence: 0.8 });
      break;
    }
  }

  // Pattern 3: Source-based tagging
  if (task.source === "flagged-email") {
    tags.push({ type: "source_tag", value: "email", confidence: 1.0 });
  }

  // Pattern 4: Daily touchpoint detection
  if ((task.recurrence === "daily" || task.recurrence === "weekdays") && task.category === "work" && task.source !== "manual") {
    tags.push({ type: "rhythm", value: "daily_touchpoint", confidence: 0.85 });
  }

  // Pattern 5: SF Task categorization by what_type (Opportunity = Seller Prospect)
  if (task.sf_what_type === "Opportunity") {
    tags.push({ type: "sf_category", value: "seller_prospect", confidence: 1.0 });
  } else if (task.source === "salesforce" && task.sf_what_type !== "Opportunity") {
    tags.push({ type: "sf_category", value: "listing_followup", confidence: 0.8 });
  }

  // Pattern 6: SF Task type (from Salesforce Type field)
  if (task.sf_task_type) {
    tags.push({ type: "sf_task_type", value: task.sf_task_type.toLowerCase(), confidence: 1.0 });
  }

  return tags;
}

function determineSmartGroup(task, tags) {
  if (!tags || tags.length === 0) return "other";
  // SF task categorization: Seller Prospect vs Listing Follow-up
  const sfCatTag = tags.find(t => t.type === "sf_category");
  if (sfCatTag) {
    if (sfCatTag.value === "seller_prospect") return "seller_prospects";
    if (sfCatTag.value === "listing_followup" && tags.some(t => t.type === "sf_property")) return "sf_properties";
  }
  if (tags.some(t => t.type === "sf_property")) return "sf_properties";
  if (task.source === "flagged-email" || tags.some(t => t.type === "source_tag" && t.value === "email")) return "email_tasks";
  if (task.source === "salesforce") return "sf_tasks";
  return "other";
}

// Smart group definitions per category
const SMART_GROUPS = {
  work: [

};

// ─── BD ROUTING ENGINE (Client-Side) ─────────────────────────────────────────
// Pattern matching for routing tasks into BD categories
const BD_ROUTING_PATTERNS = {
  government: /government|gsa|\bva\b|usps|usda|\bssa\b|\birs\b|\bdea\b|\bfbi\b|\batf\b|\bice\b|\bcbp\b|\bblm\b|\bnps\b|\bfws\b|f&ws|\bfs\b|fema|federal|agency|veterans|us\s*(bankruptcy|courthouse|post\s*office|marshal|forest)|bureau|cboc|opm|hud|corps\s*of\s*engineers|customs|border|postal|military|army|navy|air\s*force|coast\s*guard|nasa|noaa|doe\b|dot\b|epa\b|fda\b|faa\b|tsa\b|sec\b/i,
  dialysis: /medical\s*(buyer|developer|owner)|dialysis|fmc|davita|fresenius|renal|kidney|\basc\b|surgery\s*center|ambulatory|endoscopy|gastroenterology|neurospine|ortho|eye\s*center|pain\s*(management|center)|imaging|radiology|urgent\s*care|med\s*(office|center)|mob\b/i,
  blue_suit: /net\s*lease\s*(portfolio|developer|buyer)|portfolio\s*(buyer|owner)|blue\s*suit|investor\s*(group|fund)/i,
  listing_followup: /follow\s*up|callback|emailed|website|om\s*download|offering\s*memorandum|brochure|inquiry/i,
};

const BD_CATEGORY_META = {
  dialysis: { label: "Dialysis Area Ownership", icon: "\uD83C\uDFE5", color: "#2563eb", shortLabel: "Dialysis" },
  government: { label: "Government Area Ownership", icon: "\uD83C\uDFDB\uFE0F", color: "#7c3aed", shortLabel: "Government" },
  blue_suit: { label: "Blue Suit Ownership", icon: "\uD83D\uDC54", color: "#0891b2", shortLabel: "Blue Suit" },
  listing_followup: { label: "Listing Follow-up", icon: "\uD83D\uDCE5", color: "#ea580c", shortLabel: "Listings" },
};

function routeTaskToBD(task) {
  const title = (task.title || "").trim();
  const notes = (task.notes || task.body || "").trim();
  const combined = title + " " + notes;

  // Only route work tasks
  if (task.category !== "work") return null;

  // Priority 1: Check title against patterns
  for (const [cat, rx] of Object.entries(BD_ROUTING_PATTERNS)) {
    if (rx.test(title)) return { category: cat, confidence: 0.90, source: "title" };
  }

  // Priority 2: Check notes/body against patterns
  for (const [cat, rx] of Object.entries(BD_ROUTING_PATTERNS)) {
    if (rx.test(notes)) return { category: cat, confidence: 0.75, source: "notes" };
  }

  // Priority 3: SF property tasks with no other match — default to dialysis (primary territory)
  const sfTag = task.smartTags?.find(t => t.type === "sf_property");
  if (sfTag) return { category: "dialysis", confidence: 0.60, source: "sf_property_default" };

  // Priority 4: SF tasks linked to Opportunities are seller prospects — route by subject
  if (task.sf_what_type === "Opportunity") {
    return { category: "listing_followup", confidence: 0.70, source: "opportunity_link" };
  }

  return null;
}

// Deep link URL builders
function buildOutlookDeepLink(emailId) {
  if (!emailId) return "";
  return "https://outlook.office365.com/owa/?ItemID=" + encodeURIComponent(emailId) + "&exvsurl=1&viewmodel=ReadMessageItem";
}
function buildSalesforceDeepLink(sfTaskId) {
  if (!sfTaskId) return "";
  const instance = getSFInstanceUrl();
  if (!instance) return "";
  const cleanInstance = instance.replace(/\/$/, "").replace(/^https?:\/\//, "");
  return "https://" + cleanInstance + "/lightning/r/Task/" + sfTaskId + "/view";
}
function getTaskDeepLink(task) {
  if (task.source === "flagged-email" && task.emailId) return { url: buildOutlookDeepLink(task.emailId), label: "Open in Outlook", icon: "\u2709\uFE0F", color: "#0078d4", bg: "#e8f4fd" };
  if (task.source === "salesforce" && task.id && task.id.startsWith("sf-")) {
    const sfId = task.id.replace(/^sf-/, "");
    const url = buildSalesforceDeepLink(sfId);
    if (url) return { url, label: "Open in Salesforce", icon: "\u2601\uFE0F", color: "#00a1e0", bg: "#e6f7ff" };
  }
  return null;
}

// Enrichment cache

// Apply smart tags to a task (mutates & returns)
function applySmartTags(task) {
  if (task.smartTags && task.smartTags.length > 0) return task; // already tagged
  task.smartTags = detectSmartTags(task);
  task.smartGroup = determineSmartGroup(task, task.smartTags);
  return task;
}

const PRIORITY_MAP_TO_MS = { urgent: "high", high: "high", medium: "normal", low: "low" };
const PRIORITY_MAP_FROM_MS = { high: "high", normal: "medium", low: "low" };

// ─── Power Automate Task Merge ──────────────────────────────────────────────
// Maps To Do list names to our category IDs
const TODO_LIST_MAP = {
  // Direct category matches
  "work": "work", "personal": "personal", "house": "house",
  "kids": "kids", "family": "family", "health": "health", "finance": "finance",
  // Actual Microsoft To Do list names → categories
  "tasks": "personal",
  "business development": "work",
  "cooking": "house",
  "exercise": "health",
  "flagged email": "work", "flagged emails": "work",
  "marketing": "work",
  "salesforce tasks": "work",
  "sf tasks": "work",
  "yardwork": "house",
  // Microsoft To Do default lists
  "to do": "personal",
  "my tasks": "personal",
};

function mapToDoImportance(importance) {
  // Power Automate returns: "low", "normal", "high"
  if (importance === "high") return "urgent";
  if (importance === "normal") return "medium";
  return "low";
}

function mapToDoStatus(status) {
  // Power Automate returns: "notStarted", "completed"
  return status === "completed";
}

function mergeToDoTasks(existingTasks, todoItems) {
  // todoItems is the array from Power Automate's JSON output
  // Each item has: title, listName, importance, status, dueDateTime, body, createdDateTime
  const merged = [...existingTasks];
  const existingTitles = new Set(existingTasks.map(t => t.title.toLowerCase().trim()));
  let added = 0;
  let skipped = 0;

  for (const item of todoItems) {
    const title = (item.title || item.subject || "").trim();
    if (!title) continue;

    // Skip if we already have a task with this exact title
    if (existingTitles.has(title.toLowerCase())) {
      skipped++;
      continue;
    }

    const listName = (item.listName || item.list || "personal").toLowerCase().trim();
    const category = TODO_LIST_MAP[listName] || "personal";
    const due = item.dueDateTime ? item.dueDateTime.split("T")[0] : "";
    const isDone = item.status ? mapToDoStatus(item.status) : (item.isCompleted || false);
    const importance = item.importance || "normal";
    const body = item.body?.content || item.body || item.notes || "";
    // Detect email-linked tasks
    const emailIdMatch = body.match(/\[EmailID:([^\]]+)\]/);
    const emailLinkMatch = body.match(/\[EmailLink:(https?:\/\/[^\]]+)\]/);
    const isFromEmail = !!emailIdMatch;

    // Determine horizon based on due date
    let horizon = "this_week";
    if (due) {
      const t = todayStr();
      if (due <= t) horizon = "today";
      else if (due <= getWeekDates(t)[6]) horizon = "this_week";
      else horizon = "this_month";
    }

    const newTask = {
      id: uid(),
      title,
      category,
      priority: mapToDoImportance(importance),
      horizon,
      due,
      done: isDone,
      notes: body,
      body: body,
      source: isFromEmail ? "flagged-email" : "microsoft",
      emailId: emailIdMatch ? emailIdMatch[1] : "",
      emailLink: emailLinkMatch ? emailLinkMatch[1] : "",
      recurrence: "none",
      kid: "",
      created: item.createdDateTime ? item.createdDateTime.split("T")[0] : todayStr(),
    };
    applySmartTags(newTask);
    merged.push(newTask);
    existingTitles.add(title.toLowerCase());
    added++;
  }

  return { merged, added, skipped };
}

async function saveCalendarToIDB(events) {
  try {
    const db = await openIDB();
    const tx = db.transaction(IDB_STORE, "readwrite");
    tx.objectStore(IDB_STORE).put({ events, ts: Date.now() }, IDB_CAL_KEY);
    return new Promise(r => { tx.oncomplete = r; tx.onerror = r; });
  } catch {}
}

  try {
    const db = await openIDB();
    const tx = db.transaction(IDB_STORE, "readonly");
    const req = tx.objectStore(IDB_STORE).get(IDB_CAL_KEY);
    return new Promise(r => { req.onsuccess = () => r(req.result || null); req.onerror = () => r(null); });
  } catch { return null; }
}

// Try silent Graph API calendar fetch without waiting for authUser state
async function trySilentCalendarFetch() {
  if (!msalInstance) return null;
  const accounts = msalInstance.getAllAccounts();
  if (accounts.length === 0) return null;
  try {
    const resp = await msalInstance.acquireTokenSilent({ scopes: GRAPH_SCOPES, account: accounts[0] });
    if (!resp?.accessToken) return null;
    const today = todayStr();
    const twoWeeksOut = new Date();
    twoWeeksOut.setDate(twoWeeksOut.getDate() + 14);
    const endDate = toLocalDate(twoWeeksOut);
    const start = today + "T00:00:00.000Z";
    const end = endDate + "T23:59:59.999Z";
    const url = GRAPH_BASE + "/me/calendarView?startDateTime=" + encodeURIComponent(start) +
      "&endDateTime=" + encodeURIComponent(end) + "&$top=100&$select=subject,start,end,location,isAllDay,organizer";
    const r = await fetch(url, { headers: { Authorization: "Bearer " + resp.accessToken } });
    if (!r.ok) return null;
    const data = await r.json();
    return (data.value || []).map(ev => ({
      id: ev.id,
      title: ev.subject || "No title",
      start: ev.start?.dateTime,
      end: ev.end?.dateTime,
      isAllDay: ev.isAllDay || false,
      location: ev.location?.displayName || "",
    }));
  } catch(e) { console.warn("Silent calendar fetch:", e); return null; }
}

// Direct Graph API fetch for ALL flagged emails (bypasses PA flow KQL search limitation)
async function trySilentFlaggedEmailFetch() {
  if (!msalInstance) return null;
  const accounts = msalInstance.getAllAccounts();
  if (accounts.length === 0) return null;
  try {
    const resp = await msalInstance.acquireTokenSilent({ scopes: GRAPH_SCOPES, account: accounts[0] });
    if (!resp?.accessToken) return null;
    const allEmails = [];
    // Use OData $filter (exhaustive) instead of $search (KQL, relevance-limited)
    let url = GRAPH_BASE + "/me/mailFolders/inbox/messages?$filter=flag/flagStatus eq 'flagged'&$top=250&$select=id,subject,from,toRecipients,receivedDateTime,hasAttachments,importance,bodyPreview,conversationId,isRead,categories,internetMessageId,flag&$orderby=receivedDateTime desc";
    while (url && allEmails.length < 5000) {
      const r = await fetch(url, { headers: { Authorization: "Bearer " + resp.accessToken } });
      if (!r.ok) { console.warn("Flagged email fetch failed:", r.status); break; }
      const data = await r.json();
      const batch = (data.value || []).map(m => ({
        id: m.id,
        subject: m.subject || "",
        sender_name: m.from?.emailAddress?.name || "",
        sender_email: m.from?.emailAddress?.address || "",
        received_date: m.receivedDateTime || "",
        flag_status: m.flag?.flagStatus || "flagged",
        flag_due_date: m.flag?.dueDateTime?.dateTime?.split("T")[0] || "",
        importance: m.importance || "normal",
        has_attachments: m.hasAttachments || false,
        preview: m.bodyPreview || "",
        categories: m.categories || [],
        web_link: null,
      }));
      allEmails.push(...batch);
      url = data["@odata.nextLink"] || null; // Follow pagination
    }
    console.log("Graph API flagged emails: " + allEmails.length + " fetched directly");
    return allEmails;
  } catch(e) { console.warn("Silent flagged email fetch:", e); return null; }
}

// MICROSOFT GRAPH API HELPERS
// ═══════════════════════════════════════════════════════════════════════════════
// Token cache + request deduplication + redirect gate
let _cachedToken = null;
let _tokenExpiry = 0;
let _tokenAcquirePromise = null;
let _msalReady = false;

// Gate: wait for handleRedirectPromise to complete before any token calls
async function ensureMsalReady() {
  if (_msalReady) return;
  if (msalRedirectResult) {
    try { await msalRedirectResult; } catch(e) { /* already handled */ }
  }
  _msalReady = true;
}

async function getAccessToken() {
  if (!msalInstance) return null;

  // CRITICAL: wait for handleRedirectPromise to finish first
  // This prevents block_iframe_reload errors from acquireTokenSilent
  await ensureMsalReady();

  const accounts = msalInstance.getAllAccounts();
  if (accounts.length === 0) return null;

  // Return cached token if still valid (5 min TTL)
  if (_cachedToken && Date.now() < _tokenExpiry) return _cachedToken;

  // If a token request is already in flight, wait for it
  if (_tokenAcquirePromise) return _tokenAcquirePromise;

  _tokenAcquirePromise = (async () => {
    try {
      const resp = await msalInstance.acquireTokenSilent({
        scopes: GRAPH_SCOPES,
        account: accounts[0],
      });
      _cachedToken = resp.accessToken;
      _tokenExpiry = Date.now() + 5 * 60 * 1000;
      return resp.accessToken;
    } catch (e) {
      console.warn("Silent token failed:", e.errorCode || e.message);
      // Don't redirect automatically — return null and let UI prompt re-sign-in
      // acquireTokenRedirect navigates away which is terrible UX for background sync
      return null;
    } finally {
      _tokenAcquirePromise = null;
    }
  })();

  return _tokenAcquirePromise;
}

async function graphFetch(path, options = {}) {
  const token = await getAccessToken();
  if (!token) throw new Error("Not authenticated");
  const tz = Intl.DateTimeFormat().resolvedOptions().timeZone || "America/Los_Angeles";
  const resp = await fetch(GRAPH_BASE + path, {
    ...options,
    headers: {
      Authorization: "Bearer " + token,
      "Content-Type": "application/json",
      "Prefer": 'outlook.timezone="' + tz + '"',
      ...(options.headers || {}),
    },
  });
  if (!resp.ok) {
    const text = await resp.text().catch(() => "");
    throw new Error("Graph API error " + resp.status + ": " + text);
  }
  if (resp.status === 204) return null;
  return resp.json();
}

async function fetchAllPages(path) {
  // Paginate through all @odata.nextLink pages
  const all = [];
  let url = path;
  let pages = 0;
  const MAX_PAGES = 20; // Safety limit: 20 pages × 200 = up to 4,000 tasks
  while (url && pages < MAX_PAGES) {
    const data = url.startsWith("http")
      ? await fetch(url, { headers: { Authorization: "Bearer " + (await getAccessToken()), "Content-Type": "application/json" }}).then(r => r.json())
      : await graphFetch(url);
    all.push(...(data.value || []));
    url = data["@odata.nextLink"] || null;
    pages++;
  }
  return all;
}

async function fetchTasksFromList(listId) {
  // Fetch both incomplete and completed tasks with full pagination
  const [active, completed] = await Promise.all([
    fetchAllPages("/me/todo/lists/" + listId + "/tasks?$top=200"),
    fetchAllPages("/me/todo/lists/" + listId + "/tasks?$filter=status eq 'completed'&$top=200").catch(() => []),
  ]);
  const all = [...active];
  // Add completed that aren't already in active
  const activeIds = new Set(all.map(t => t.id));
  for (const t of completed) {
    if (!activeIds.has(t.id)) all.push(t);
  }
  return all;
}

function parseAppMetadata(body) {
  // Extract our metadata from the task body/notes
  const text = body?.content || "";
  const meta = {};
  const metaMatch = text.match(/\[LCC-META\](.*?)\[\/LCC-META\]/s);
  if (metaMatch) {
    try { Object.assign(meta, JSON.parse(metaMatch[1])); } catch(e) {}
  }
  // Clean notes (everything before the metadata tag)
  meta._cleanNotes = text.replace(/\s*\[LCC-META\].*?\[\/LCC-META\]\s*/s, "").trim();
  return meta;
}

function buildTaskBody(task) {
  const meta = {
    appId: task.id,
    priority: task.priority,
    horizon: task.horizon,
    kid: task.kid || "",
    source: task.source || "manual",
    recurrence: task.recurrence || "none",
    created: task.created || todayStr(),
    smartTags: task.smartTags || [],
    smartGroup: task.smartGroup || null,
  };
  const notes = task.notes || "";
  return notes + (notes ? "\n\n" : "") + "[LCC-META]" + JSON.stringify(meta) + "[/LCC-META]";
}

function msTaskToAppTask(msTask, category) {
  const meta = parseAppMetadata(msTask.body);
  const dueDate = msTask.dueDateTime?.dateTime ? msTask.dueDateTime.dateTime.split("T")[0] : "";

  // Detect if this task came from a flagged email
  const bodyText = meta._cleanNotes || "";
  const emailIdMatch = bodyText.match(/\[EmailID:([^\]]+)\]/);
  const emailLinkMatch = bodyText.match(/\[EmailLink:(https?:\/\/[^\]]+)\]/);

  const task = {
    id: meta.appId || ("ms-" + msTask.id),
    msId: msTask.id,
    title: msTask.title || "",
    category: category,
    priority: meta.priority || PRIORITY_MAP_FROM_MS[msTask.importance] || "medium",
    horizon: meta.horizon || "today",
    due: dueDate,
    done: msTask.status === "completed",
    notes: meta._cleanNotes || "",
    body: meta._cleanNotes || "",
    source: emailIdMatch ? "flagged-email" : (meta.source || "microsoft"),
    emailId: emailIdMatch ? emailIdMatch[1] : "",
    emailLink: emailLinkMatch ? emailLinkMatch[1] : "",
    recurrence: meta.recurrence || "none",
    kid: meta.kid || "",
    created: meta.created || todayStr(),
    lastModified: msTask.lastModifiedDateTime || "",
    smartTags: meta.smartTags || [],
    smartGroup: meta.smartGroup || null,
  };
  // Re-detect smart tags if not stored in metadata
  if (!task.smartTags.length) applySmartTags(task);
  return task;
}

async function createMsTask(task, listId) {
  const body = {
    title: task.title,
    importance: PRIORITY_MAP_TO_MS[task.priority] || "normal",
    status: task.done ? "completed" : "notStarted",
    body: { content: buildTaskBody(task), contentType: "text" },
  };
  if (task.due) {
    body.dueDateTime = { dateTime: task.due + "T00:00:00.0000000", timeZone: "UTC" };
  }
  const result = await graphFetch("/me/todo/lists/" + listId + "/tasks", {
    method: "POST",
    body: JSON.stringify(body),
  });
  return result;
}

  return graphFetch("/me/todo/lists/" + listId + "/tasks/" + msTaskId, {
    method: "DELETE",
  });
}

// ─── Calendar Operations ────────────────────────────────────────────────────
async function fetchCalendarEvents(startDate, endDate) {
  const start = startDate + "T00:00:00.000Z";
  const end = endDate + "T23:59:59.999Z";
  const data = await graphFetch(
    "/me/calendarView?startDateTime=" + encodeURIComponent(start) +
    "&endDateTime=" + encodeURIComponent(end) +
    "&$top=100&$select=subject,start,end,location,isAllDay,organizer"
  );
  return (data.value || []).map(ev => ({
    id: ev.id,
    title: ev.subject || "No title",
    start: ev.start?.dateTime,
    end: ev.end?.dateTime,
    isAllDay: ev.isAllDay || false,
    location: ev.location?.displayName || "",
  }));
}

// ═══════════════════════════════════════════════════════════════════════════════
// FULL SYNC ENGINE
// ═══════════════════════════════════════════════════════════════════════════════
async function fullSync(currentTasks, setTasks) {
  const config = loadMsConfig();
  let listMapping = config.listMapping;
  if (!listMapping) {
    listMapping = await ensureCategoryLists();
  }

  // Also discover all To Do lists to catch Salesforce Tasks, Business Development, etc.
  let allToDoLists = [];
  try { allToDoLists = await fetchTodoLists(); } catch(e) { console.warn("Failed to fetch all lists:", e); }

  const remoteTasks = [];
  const fetchedListIds = new Set();

  // First: fetch from our primary CATEGORIES lists
  for (const cat of CATEGORIES) {
    const listId = listMapping[cat.id];
    if (!listId) continue;
    fetchedListIds.add(listId);
    try {
      const msTasks = await fetchTasksFromList(listId);
      for (const ms of msTasks) {
        remoteTasks.push(msTaskToAppTask(ms, cat.id));
      }
    } catch(e) {
      console.warn("Failed to fetch list " + cat.label + ":", e);
    }
  }

  // Second: fetch from additional lists that map to categories via TODO_LIST_MAP
  // This catches "Salesforce Tasks", "Business Development", "Flagged Emails", etc.
  for (const tdList of allToDoLists) {
    if (fetchedListIds.has(tdList.id)) continue; // Already fetched above
    const mappedCat = TODO_LIST_MAP[(tdList.displayName || "").toLowerCase().trim()];
    if (!mappedCat) continue; // Unknown list, skip
    fetchedListIds.add(tdList.id);
    try {
      const msTasks = await fetchTasksFromList(tdList.id);
      console.log("Extra list sync: " + tdList.displayName + " → " + mappedCat + " (" + msTasks.length + " tasks)");
      for (const ms of msTasks) {
        remoteTasks.push(msTaskToAppTask(ms, mappedCat));
      }
    } catch(e) {
      console.warn("Failed to fetch extra list " + tdList.displayName + ":", e);
    }
  }

  // Merge: remote tasks + local-only tasks
  const mergedMap = new Map();

  // First add all local tasks
  for (const t of currentTasks) {
    mergedMap.set(t.id, { ...t });
  }

  // Then merge remote tasks
  for (const rt of remoteTasks) {
    const existing = mergedMap.get(rt.id);
    if (existing) {
      // Update with remote data but keep local-only fields
      mergedMap.set(rt.id, {
        ...existing,
        msId: rt.msId,
        title: rt.title,
        done: rt.done,
        lastModified: rt.lastModified,
      });
    } else {
      // New from Microsoft — add it
      mergedMap.set(rt.id, rt);
    }
  }

  // Push local tasks that don't have msId to Microsoft
  const pushPromises = [];
  for (const [id, task] of mergedMap) {
    if (!task.msId && !task.id.startsWith("ms-") && !task.id.startsWith("sf-") && !task.id.startsWith("email-")) {
      const listId = listMapping[task.category];
      if (listId) {
        pushPromises.push(
          createMsTask(task, listId).then(result => {
            if (result) {
              mergedMap.set(id, { ...mergedMap.get(id), msId: result.id });
            }
          }).catch(e => console.warn("Failed to push task:", e))
        );
      }
    }
  }
  await Promise.all(pushPromises);

  // Process offline queue
  const queue = loadSyncQueue();
  if (queue.length > 0) {
    for (const action of queue) {
      try {
        if (action.type === "update" && action.msId) {
          await updateMsTask(action.msId, action.task, listMapping[action.task.category]);
        } else if (action.type === "delete" && action.msId) {
          await deleteMsTask(action.msId, listMapping[action.category]);
        }
      } catch(e) {
        console.warn("Failed to process queue item:", e);
      }
    }
    saveSyncQueue([]);
  }

  // ─── Supabase Direct Pipeline (bypasses To Do bottleneck) ────────────────
  // Fetch SF Tasks + Flagged Emails directly from Supabase
  try {
    const aiConfig = loadAIConfig();
    if (aiConfig && aiConfig.supabaseUrl && aiConfig.anonKey) {
      const sbData = await fetchSupabaseTasks();
      let sbAdded = 0;
      // Merge Supabase SF Tasks — these use "sf-{id}" keys so no collision with ms-{id}
      // NOTE: No title-based dedup for SF tasks — many share generic subjects like "Call"
      // (4,800+ tasks can be titled "Call"). Each has a unique sf-{id} key which is sufficient.
      for (const sbt of sbData.sfTasks) {
        if (!mergedMap.has(sbt.id)) {
          mergedMap.set(sbt.id, sbt);
          sbAdded++;
        }
      }
      // Merge Supabase Flagged Emails — these use "email-{id}" keys
      for (const em of sbData.flaggedEmails) {
        if (!mergedMap.has(em.id)) {
          const titleLower = em.title.toLowerCase().trim();
          let isDuplicate = false;
          for (const [, existing] of mergedMap) {
            if (existing.title.toLowerCase().trim() === titleLower && existing.source === "flagged-email") {
              isDuplicate = true;
              break;
            }
          }
          if (!isDuplicate) {
            mergedMap.set(em.id, em);
            sbAdded++;
          }
        }
      }
      console.log("Supabase merge: added " + sbAdded + " tasks (" + sbData.sfTasks.length + " SF + " + sbData.flaggedEmails.length + " emails fetched)");
    }
  } catch (e) {
    console.warn("Supabase direct fetch failed (non-blocking):", e);
  }

  // ─── Direct Graph API Flagged Email Fetch (bypasses PA flow limitation) ──
  // PA flow uses KQL $search which is relevance-limited; Graph API $filter is exhaustive
  try {
    const graphEmails = await trySilentFlaggedEmailFetch();
    if (graphEmails && graphEmails.length > 0) {
      let graphAdded = 0;
      for (const ge of graphEmails) {
        const appTask = flaggedEmailToAppTask(ge);
        if (!mergedMap.has(appTask.id)) {
          mergedMap.set(appTask.id, appTask);
          graphAdded++;
        }
      }
      console.log("Graph API flagged emails: " + graphAdded + " new added (" + graphEmails.length + " total from Graph, " + (graphEmails.length - graphAdded) + " already in Supabase)");
    }
  } catch (e) {
    console.warn("Graph API flagged email fetch failed (non-blocking):", e);
  }

  const merged = Array.from(mergedMap.values());
  saveMsConfig({ ...loadMsConfig(), listMapping, lastSync: new Date().toISOString() });
  return merged;
}

// ═══════════════════════════════════════════════════════════════════════════════
// PAST DUE SECTION — collapsible section for overdue tasks
// ═══════════════════════════════════════════════════════════════════════════════
function PastDueSection({ tasks, toggle, remove, edit }) {
  const [collapsed, setCollapsed] = useState(true);
  const today = todayStr();

  // Sort past-due tasks: most recently overdue first
  const sorted = [...tasks].sort((a, b) => (b.due || "").localeCompare(a.due || ""));

  // Group by how overdue they are
  const thisWeek = sorted.filter(t => {
    const diff = Math.floor((new Date(today) - new Date(t.due)) / 86400000);
    return diff <= 7;
  });
  const older = sorted.filter(t => {
    const diff = Math.floor((new Date(today) - new Date(t.due)) / 86400000);
    return diff > 7;
  });

  return h("div", { style: { marginBottom: 22, background: "#fef2f2", borderRadius: 12, border: "1px solid #fecaca", overflow: "hidden" }},
    // Header — always visible, clickable to toggle
    h("div", {
      onClick: () => setCollapsed(!collapsed),
      style: { display: "flex", alignItems: "center", justifyContent: "space-between", padding: "12px 16px", cursor: "pointer", userSelect: "none" }
    },
      h("div", { style: { display: "flex", alignItems: "center", gap: 8 }},
        h("span", { style: { fontSize: 11, color: "#dc2626", transition: "transform 0.2s", transform: collapsed ? "rotate(-90deg)" : "rotate(0deg)", display: "inline-block" } }, "\u25BC"),
        h("span", { style: { fontSize: 16 }}, "\u26A0\uFE0F"),
        h("span", { style: { fontSize: 14, fontWeight: 700, color: "#dc2626" }}, "Past Due"),
        h("span", { style: { fontSize: 12, fontWeight: 500, color: "#ef4444", background: "#fee2e2", padding: "2px 8px", borderRadius: 999 }}, tasks.length + " task" + (tasks.length !== 1 ? "s" : "")),
      ),
      // Quick summary when collapsed
      collapsed ? h("div", { style: { fontSize: 11, color: "#94a3b8", maxWidth: "50%", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }},
        sorted.slice(0, 2).map(t => t.title.split(" - ")[0] || t.title.slice(0, 20)).join(", ") + (sorted.length > 2 ? "..." : ""),
      ) : null,
    ),
    // Task list — shown when expanded
    !collapsed ? h("div", { style: { padding: "0 12px 12px" }},
      thisWeek.length > 0 ? h("div", { style: { marginBottom: older.length ? 12 : 0 }},
        h("div", { style: { fontSize: 11, fontWeight: 600, color: "#b91c1c", textTransform: "uppercase", letterSpacing: "0.05em", marginBottom: 6, paddingLeft: 4 }}, "Past 7 Days"),
        thisWeek.map(t => h(TaskRow, { key: t.id, task: t, toggle, remove, onEdit: () => edit(t) })),
      ) : null,
      older.length > 0 ? h("div", null,
        h("div", { style: { fontSize: 11, fontWeight: 600, color: "#b91c1c", textTransform: "uppercase", letterSpacing: "0.05em", marginBottom: 6, paddingLeft: 4 }}, "Older"),
        older.map(t => h(TaskRow, { key: t.id, task: t, toggle, remove, onEdit: () => edit(t) })),
      ) : null,
    ) : null,
  );
}

  const isCollapsed = collapseState[groupDef.id] !== undefined ? collapseState[groupDef.id] : (tasks.length >= (groupDef.threshold || 5) && groupDef.defaultCollapsed);

  return h("div", { style: { marginBottom: 16 } },
    h("div", {
      style: {
        display: "flex", alignItems: "center", gap: 8, padding: "7px 10px", cursor: showCollapse ? "pointer" : "default",

    },
      showCollapse ? h("span", { style: { fontSize: 11, color: "#94a3b8", transition: "transform 0.2s", transform: isCollapsed ? "rotate(-90deg)" : "rotate(0deg)", display: "inline-block" } }, "\u25BC") : null,

      h("span", { style: { fontSize: 11, color: "#94a3b8", marginLeft: 4 } }, "(" + tasks.length + ")"),
      isCollapsed && showCollapse ? h("span", { style: { fontSize: 11, color: "#cbd5e1", marginLeft: "auto", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap", maxWidth: 250 } }, preview) : null,
    ),
    !isCollapsed ? tasks.map(t => h(TaskRow, { key: t.id, task: t, toggle, remove, onEdit: () => edit(t) })) : null,
  );
}

function BDDashboard({ tasks, bdConfig, bdProgress, bdFilter, setBdFilter, onEditTask, onToggle, showToast, onBrief, onLogSF }) {
  // Route all work tasks into BD categories
  const routedTasks = useMemo(() => {
    const result = { dialysis: [], government: [], blue_suit: [], listing_followup: [], unrouted: [] };
    const workTasks = tasks.filter(t => t.category === "work" && !t.done);
    for (const t of workTasks) {
      const route = routeTaskToBD(t);
      if (route && result[route.category]) {
        result[route.category].push({ ...t, _bdRoute: route });
      } else {
        result.unrouted.push(t);
      }
    }
    return result;
  }, [tasks]);

  // Default config if not loaded from API yet
  const config = bdConfig || { dialysis: 8, government: 4, blue_suit: 3, listing_followup: 2 };
  const progress = bdProgress || { dialysis: 0, government: 0, blue_suit: 0, listing_followup: 0 };

  const categories = ["dialysis", "government", "blue_suit", "listing_followup"];
  const totalTarget = categories.reduce((s, c) => s + (config[c] || 0), 0);
  const totalCompleted = categories.reduce((s, c) => s + (progress[c] || 0), 0);

  // Determine which tasks to show
  const displayTasks = bdFilter === "all"
    ? categories.flatMap(c => routedTasks[c].map(t => ({ ...t, _bdCat: t._bdRoute?.category || c })))
    : (routedTasks[bdFilter] || []).map(t => ({ ...t, _bdCat: bdFilter }));

  // Sort: overdue first, then by due date
  displayTasks.sort((a, b) => {
    const today = todayStr();
    const aOver = a.due && a.due < today ? 0 : 1;
    const bOver = b.due && b.due < today ? 0 : 1;
    if (aOver !== bOver) return aOver - bOver;
    if (a.due && b.due) return a.due.localeCompare(b.due);
    return a.due ? -1 : b.due ? 1 : 0;
  });

  return h("div", null,
    // Daily Progress Header
    h("div", { style: { marginBottom: 16 } },
      h("div", { style: { display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 } },
        h("div", { style: { fontSize: 15, fontWeight: 800, color: "#1e293b" } }, "\uD83C\uDFAF BD Execution — " + new Date().toLocaleDateString("en-US", { weekday: "long", month: "short", day: "numeric" })),
        h("div", { style: { fontSize: 13, fontWeight: 700, color: totalCompleted >= totalTarget ? "#16a34a" : "#64748b" } },
          totalCompleted + "/" + totalTarget + " total",
        ),
      ),
      // Progress cards
      h("div", { style: { display: "flex", gap: 8, flexWrap: "wrap" } },
        categories.map(cat => {
          const m = BD_CATEGORY_META[cat];
          return h(BDProgressCard, {
            key: cat, cat, target: config[cat] || 0, completed: progress[cat] || 0,
            color: m.color, icon: m.icon, label: m.label, shortLabel: m.shortLabel,
            active: bdFilter === cat,
            onClick: () => setBdFilter(bdFilter === cat ? "all" : cat),
          });
        }),
      ),
    ),

    // Queue count + filter indicator
    h("div", { style: { display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 } },
      h("div", { style: { fontSize: 13, fontWeight: 700, color: "#475569" } },
        bdFilter === "all" ? "\uD83D\uDCCB All BD Tasks" : (BD_CATEGORY_META[bdFilter]?.icon || "") + " " + (BD_CATEGORY_META[bdFilter]?.label || ""),
        " ", h("span", { style: { fontWeight: 400, fontSize: 12, color: "#94a3b8" } }, "(" + displayTasks.length + ")"),
      ),
      bdFilter !== "all" ? h("button", {
        onClick: () => setBdFilter("all"),
        style: { border: "1px solid #e2e8f0", background: "white", borderRadius: 6, padding: "4px 10px", cursor: "pointer", fontSize: 11, color: "#64748b" },
      }, "\u2716 Clear Filter") : null,
    ),

    // Task Queue
    displayTasks.length > 0
      ? displayTasks.map(t => h(BDTaskRow, {
          key: t.id,
          task: t,
          bdCategory: t._bdCat,
          onBrief: () => onBrief(t),
          onEmail: () => { onEditTask(t); showToast("Open task → use Email tab"); },
          onLog: () => { onEditTask(t); showToast("Open task → use Log to SF"); },
          onDone: () => onToggle(t.id),
          onEdit: () => onEditTask(t),
        }))
      : h("div", { style: { textAlign: "center", padding: 40, color: "#94a3b8" } },
          h("div", { style: { fontSize: 32, marginBottom: 8 } }, "\uD83C\uDF1F"),
          h("div", { style: { fontSize: 14, fontWeight: 600 } }, bdFilter === "all" ? "No BD tasks in queue" : "No " + (BD_CATEGORY_META[bdFilter]?.shortLabel || "") + " tasks"),
          h("div", { style: { fontSize: 12, marginTop: 4 } }, "Tasks from Microsoft To Do will appear here when synced"),
        ),

    // Unrouted tasks (only in "all" view)
    bdFilter === "all" && routedTasks.unrouted.length > 0 ? h("div", { style: { marginTop: 16 } },
      h("div", { style: { fontSize: 12, fontWeight: 700, color: "#94a3b8", marginBottom: 6, borderTop: "1px solid #f1f5f9", paddingTop: 10 } },
        "\uD83D\uDCCB Uncategorized Work Tasks (" + routedTasks.unrouted.length + ")",
      ),
      routedTasks.unrouted.slice(0, 10).map(t => h(BDTaskRow, {
        key: t.id,
        task: t,
        bdCategory: "unrouted",
        onBrief: () => onBrief(t),
        onEmail: () => { onEditTask(t); showToast("Open task → use Email tab"); },
        onLog: () => { onEditTask(t); showToast("Open task → use Log to SF"); },
        onDone: () => onToggle(t.id),
        onEdit: () => onEditTask(t),
      })),
      routedTasks.unrouted.length > 10 ? h("div", { style: { fontSize: 11, color: "#94a3b8", textAlign: "center", padding: 8 } }, "+" + (routedTasks.unrouted.length - 10) + " more...") : null,
    ) : null,
  );
}

          return card(h("div", { key: i },
            h("div", { style: { fontWeight: 600, fontSize: 12 } }, p.tenant || p.building_name || p.address),
            h("div", { style: { fontSize: 11, color: "#64748b" } }, (p.city || "") + ", " + (p.state || "") + (p.building_size ? " \u2022 " + Number(p.building_size).toLocaleString() + " SF" : "")),
            owRec ? h("div", { style: { fontSize: 11, color: "#64748b", marginTop: 2 } },
              owRec.sold_price ? "Sold: " + fmtPrice(owRec.sold_price) : null,
              owRec.cap_rate ? " \u2022 Cap: " + Number(owRec.cap_rate).toFixed(2) + "%" : null,
              owRec.ownership_start ? " \u2022 Since: " + fmtDate(owRec.ownership_start) : owRec.start_date ? " \u2022 Since: " + fmtDate(owRec.start_date) : null,
            ) : null,
          ));
        })
      ) : null,
    );
  };

  // ---- TAB: Leases ----
  const renderLeases = () => {
    const leases = data.leases || [];
    const gsaLeases = data.gsa_leases || [];
    if (leases.length === 0 && gsaLeases.length === 0) return h("div", { style: { color: "#94a3b8", padding: 12 } }, "No lease data available");
    return h("div", null,
      leases.length > 0 ? h("div", null,
        sec("Dialysis Leases (" + leases.length + ")", "\uD83D\uDCC4"),
        leases.map((l, i) => card(h("div", { key: i },
          h("div", { style: { display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 4 } },
            h("span", { style: { fontWeight: 700, fontSize: 12 } }, l.tenant || "Lease #" + (i + 1)),
            l.is_active ? badge("Active", "#dcfce7", "#16a34a") : l.status ? badge(l.status, "#f1f5f9", "#475569") : null,
          ),
          row("Lease Start", fmtDate(l.lease_start)),
          row("Lease Expiration", fmtDate(l.lease_expiration)),
          l.lease_expiration_risk ? h("div", { style: { margin: "2px 0" } }, row("Expiration Risk", l.lease_expiration_risk)) : null,
          row("Rent", l.rent ? fmtPrice(l.rent) + "/yr" : null),
          row("Rent/SF", l.rent_per_sf ? "$" + Number(l.rent_per_sf).toFixed(2) : null),
          row("Leased Area", l.leased_area || l.sqft ? Number(l.leased_area || l.sqft).toLocaleString() + " SF" : null),
          row("Cap Rate", l.current_cap_rate || l.cap_rate ? (Number(l.current_cap_rate || l.cap_rate)).toFixed(2) + "%" : null),
          row("Escalation", l.escalation_direction),
          row("Expense Structure", l.expense_structure),
          row("Guarantor", l.guarantor),
          row("Operator", l.operator),
          row("Renewal Options", l.renewal_option_text || l.renewal_options),
          row("Extension", l.extension_option),
          (l.roof_responsibility || l.hvac_responsibility) ? h("div", { style: { marginTop: 4, fontSize: 11, color: "#64748b" } },
            "Responsibilities: ",
            [l.roof_responsibility ? "Roof:" + l.roof_responsibility : null, l.hvac_responsibility ? "HVAC:" + l.hvac_responsibility : null, l.structure_responsibility ? "Structure:" + l.structure_responsibility : null, l.parking_responsibility ? "Parking:" + l.parking_responsibility : null].filter(Boolean).join(" \u2022 ")
          ) : null,
          l.repositioning_suggestion ? h("div", { style: { fontSize: 11, color: "#7c3aed", marginTop: 4, fontStyle: "italic" } }, "\uD83D\uDCA1 " + l.repositioning_suggestion) : null,
        )))
      ) : null,

      gsaLeases.length > 0 ? h("div", null,
        sec("GSA Leases (" + gsaLeases.length + ")", "\uD83C\uDFDB\uFE0F"),
        gsaLeases.map((g, i) => card(h("div", { key: i },
          row("Agency", g.agency || g.tenant_agency),
          row("Lease #", g.lease_number),
          row("Expiration", fmtDate(g.lease_expiration_date || g.expiration_date)),
          row("Annual Rent", g.annual_rent ? fmtPrice(g.annual_rent) : null),
          row("SF Leased", g.sf_leased ? Number(g.sf_leased).toLocaleString() : null),
        ), "#f0fdf4"))
      ) : null,
    );
  };

  // ---- TAB: Sales ----
  const renderSales = () => {
    const sales = data.sales_transactions || [];
    const ownershipHist = data.ownership_history || [];
    const listings = data.available_listings || [];
    return h("div", null,
      sales.length > 0 ? h("div", null,
        sec("Sales Transactions (" + sales.length + ")", "\uD83D\uDCB0"),
        sales.map((s, i) => card(h("div", { key: i },
          h("div", { style: { display: "flex", justifyContent: "space-between", marginBottom: 4 } },
            h("span", { style: { fontWeight: 700, fontSize: 12 } }, fmtDate(s.sale_date) || "Unknown date"),
            s.sold_price ? h("span", { style: { fontWeight: 700, fontSize: 13, color: "#16a34a" } }, fmtPrice(s.sold_price)) : null,
          ),
          row("Buyer", s.buyer_name),
          row("Buyer Type", s.buyer_type),
          row("Seller", s.seller_name),
          row("Cap Rate", s.cap_rate ? Number(s.cap_rate).toFixed(2) + "%" : null),
          row("Cap Rate Method", s.cap_rate_method),
          s.notes ? h("div", { style: { fontSize: 11, color: "#64748b", marginTop: 4, fontStyle: "italic" } }, s.notes) : null,
        )))
      ) : h("div", { style: { color: "#94a3b8", padding: 12 } }, "No sales transactions"),

      ownershipHist.length > 0 ? h("div", null,
        sec("Ownership History (" + ownershipHist.length + ")", "\uD83D\uDD04"),
        ownershipHist.map((o, i) => card(h("div", { key: i },
          row("Period", (fmtDate(o.ownership_start || o.start_date) || "?") + " \u2192 " + (fmtDate(o.ownership_end || o.end_date) || "Present")),
          row("Type", o.ownership_type || o.owner_type),
          row("Sold Price", fmtPrice(o.sold_price)),
          row("Cap Rate", o.cap_rate ? Number(o.cap_rate).toFixed(2) + "%" : null),
          row("Rent", o.rent ? fmtPrice(o.rent) + "/yr" : null),
          o.notes ? h("div", { style: { fontSize: 11, color: "#64748b", fontStyle: "italic" } }, o.notes) : null,
        )))
      ) : null,

      listings.length > 0 ? h("div", null,
        sec("Listings", "\uD83D\uDCE3"),
        listings.map((l, i) => card(h("div", { key: i },
          h("div", { style: { display: "flex", justifyContent: "space-between", marginBottom: 4 } },
            h("span", { style: { fontWeight: 600, fontSize: 12 } }, l.listing_broker || "Unknown broker"),
            l.is_active ? badge("Active", "#dcfce7", "#16a34a") : badge(l.status || "Off-market", "#fee2e2", "#991b1b"),
          ),
          row("List Date", fmtDate(l.listing_date)),
          row("Initial Price", fmtPrice(l.initial_price)),
          row("Current Price", fmtPrice(l.last_price)),
          row("Price/SF", l.price_per_sf ? "$" + Number(l.price_per_sf).toFixed(2) : null),
          row("Cap Rate", l.cap_rate || l.current_cap_rate ? Number(l.cap_rate || l.current_cap_rate).toFixed(2) + "%" : null),
          row("Seller", l.seller_name),
          l.broker_email ? row("Broker Email", l.broker_email) : null,
          l.listing_url ? h("a", { href: l.listing_url, target: "_blank", rel: "noopener", style: { fontSize: 11, color: "#3b82f6" } }, "View listing \u2192") : null,
        )))
      ) : null,
    );
  };

  // ---- TAB: Market ----
  const renderMarket = () => {
    const capHist = data.cap_rate_history || [];
    const clinics = data.nearby_clinics || [];
    const invScores = data.investment_scores;
    const govProps = data.government_city_properties || [];
    const cityProps = data.dialysis_city_properties || [];
    return h("div", null,
      capHist.length > 0 ? h("div", null,
        sec("Cap Rate History (" + capHist.length + " events)", "\uD83D\uDCC9"),
        capHist.map((c, i) => card(h("div", { key: i },
          row("Date", fmtDate(c.event_date)),
          row("Event", c.event_type),
          row("Cap Rate", c.cap_rate ? Number(c.cap_rate).toFixed(2) + "%" : null),
          row("Initial Cap Rate", c.initial_cap_rate ? Number(c.initial_cap_rate).toFixed(2) + "%" : null),
          row("Rent", c.rent_at_event ? fmtPrice(c.rent_at_event) : null),
          row("Price", c.price_at_event ? fmtPrice(c.price_at_event) : null),
        )))
      ) : null,

      invScores ? h("div", null,
        sec("Investment Scores", "\uD83C\uDFC6"),
        card(h("div", null,
          row("Overall Score", invScores.overall_score || invScores.total_score),
          row("Market Score", invScores.market_score),
          row("Lease Score", invScores.lease_score),
          row("Location Score", invScores.location_score),
        ))
      ) : null,

      clinics.length > 0 ? h("div", null,
        sec("Nearby Medicare Clinics (" + clinics.length + ")", "\uD83C\uDFE5"),
        clinics.map((c, i) => h("div", { key: i, style: { padding: "3px 0", fontSize: 11, display: "flex", justifyContent: "space-between" } },
          h("span", { style: { fontWeight: 500 } }, c.clinic_name),
          h("span", { style: { color: "#64748b" } }, c.chain_organization || c.ownership_type || ""),
        ))
      ) : null,

      cityProps.length > 0 ? h("div", null,
        sec("Other Dialysis Properties in Area (" + cityProps.length + ")", "\uD83C\uDFE2"),
        cityProps.map((p, i) => h("div", { key: i, style: { padding: "3px 0", fontSize: 11 } },
          h("span", { style: { fontWeight: 500 } }, p.tenant || p.building_name),
          h("span", { style: { color: "#64748b", marginLeft: 6 } }, p.address),
        ))
      ) : null,

      govProps.length > 0 ? h("div", null,
        sec("Government Properties in Area (" + govProps.length + ")", "\uD83C\uDFDB\uFE0F"),
        govProps.map((p, i) => h("div", { key: i, style: { padding: "3px 0", fontSize: 11 } },
          h("span", { style: { fontWeight: 500 } }, p.address),
          h("span", { style: { color: "#64748b", marginLeft: 6 } }, (p.agency_full_name || p.agency || "") + (p.sf_leased ? " \u2022 " + Number(p.sf_leased).toLocaleString() + " SF" : "")),
        ))
      ) : null,
    );
  };

  return h("div", { style: { marginTop: 14, border: "1px solid #e0e7ff", borderRadius: 10, overflow: "hidden" } },
    h("div", {
      onClick: () => setExpanded(!expanded),
      style: { display: "flex", alignItems: "center", gap: 8, padding: "10px 14px", background: expanded ? "#eef2ff" : "#f8fafc", cursor: "pointer", userSelect: "none" },
    },
      h("span", { style: { fontSize: 11, color: "#6366f1", transition: "transform 0.2s", transform: expanded ? "rotate(0deg)" : "rotate(-90deg)", display: "inline-block" } }, "\u25BC"),
      h("span", { style: { fontSize: 13 } }, "\uD83C\uDFE2"),
      h("span", { style: { fontWeight: 600, fontSize: 13, color: "#4338ca" } }, "Pre-Call Briefing"),
      h("span", { style: { fontSize: 11, color: "#818cf8" } }, propName + (propCity ? ", " + propCity : "")),
    ),
    expanded ? h("div", { style: { padding: "10px 14px", background: "white", fontSize: 12, maxHeight: 500, overflowY: "auto" } },
      loading ? h("div", { style: { padding: 16, textAlign: "center", color: "#94a3b8" } },
        h("div", { style: { fontSize: 18, marginBottom: 6 } }, "\u23F3"),
        "Loading property intelligence\u2026"
      ) : error ? h("div", { style: { padding: 12, background: "#fef2f2", borderRadius: 8, color: "#dc2626", fontSize: 12 } }, "\u26A0\uFE0F " + error) :
      data ? h("div", null,
        tabBar,
        activeTab === "briefing" ? renderBriefing() : null,
        activeTab === "owner" ? renderOwner() : null,
        activeTab === "leases" ? renderLeases() : null,
        activeTab === "sales" ? renderSales() : null,
        activeTab === "market" ? renderMarket() : null,
      ) : null,
    ) : null,
  );
}

// AI CHAT COPILOT SIDEBAR
// ═══════════════════════════════════════════════════════════════════════════════
function AIChatCopilot({ open, onClose, currentTask }) {
  const [messages, setMessages] = useState(() => loadAIChatHistory());
  const [input, setInput] = useState("");
  const [sending, setSending] = useState(false);
  const scrollRef = useRef(null);

  useEffect(() => { if (scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight; }, [messages]);

  const send = async (text) => {
    if (!text.trim() || sending) return;
    const userMsg = { role: "user", content: text.trim() };
    const newMsgs = [...messages, userMsg];
    setMessages(newMsgs);
    saveAIChatHistory(newMsgs);
    setInput("");
    setSending(true);

    // Build context from current task
    const context = {};
    if (currentTask) {
      context.task = { title: currentTask.title, category: currentTask.category, priority: currentTask.priority, due: currentTask.due, notes: currentTask.notes, source: currentTask.source, recurrence: currentTask.recurrence };
      const sfTag = currentTask.smartTags?.find(t => t.type === "sf_property");
      if (sfTag) {
        context.property = { name: sfTag.value, city: sfTag.city, state: sfTag.state };
        // Try to include cached enrichment
        const cacheKey = getEnrichCacheKey(sfTag.value, sfTag.city, sfTag.state);
        const cached = getCachedEnrichment(cacheKey);
        if (cached) context.enrichment = cached;
      }
    }

    try {
      const result = await aiCall("/chat", {
        message: text.trim(),
        context,
        history: messages.slice(-10).map(m => ({ role: m.role, content: m.content })),
      });
      const aiMsg = { role: "assistant", content: result.response || "No response received." };
      const updated = [...newMsgs, aiMsg];
      setMessages(updated);
      saveAIChatHistory(updated);
    } catch (e) {
      const errMsg = { role: "assistant", content: "\u26A0\uFE0F " + e.message };
      const updated = [...newMsgs, errMsg];
      setMessages(updated);
      saveAIChatHistory(updated);
    }
    setSending(false);
  };

  const quickPrompts = [
    { label: "\uD83C\uDFAF Best approach", text: "What's the best approach for this touchpoint?" },
    { label: "\u2709\uFE0F Draft email", text: "Draft a follow-up email for this property contact." },
    { label: "\uD83D\uDD0D Compare", text: "Compare this property to similar investment targets." },
    { label: "\uD83D\uDCAC Strategy", text: "Suggest a negotiation strategy for this property." },
  ];

  if (!open) return null;

  return h("div", {
    style: {
      position: "fixed", top: 0, right: 0, bottom: 0, width: Math.min(420, window.innerWidth - 20),
      background: "white", boxShadow: "-4px 0 30px rgba(0,0,0,0.15)", zIndex: 1001,
      display: "flex", flexDirection: "column", borderLeft: "1px solid #e2e8f0",
    },
  },
    // Header
    h("div", { style: { padding: "14px 16px", background: "#1e293b", color: "white", display: "flex", alignItems: "center", justifyContent: "space-between" } },
      h("div", { style: { display: "flex", alignItems: "center", gap: 8 } },
        h("span", { style: { fontSize: 18 } }, "\uD83E\uDD16"),
        h("span", { style: { fontWeight: 700, fontSize: 14 } }, "AI Sales Copilot"),
      ),
      h("button", { onClick: onClose, style: { background: "rgba(255,255,255,0.15)", border: "none", color: "white", borderRadius: 6, width: 32, height: 32, cursor: "pointer", fontSize: 16 } }, "\u2716"),
    ),

    // Context badge
    currentTask ? h("div", { style: { padding: "8px 16px", background: "#f0f9ff", borderBottom: "1px solid #e0f2fe", fontSize: 11, color: "#0369a1", display: "flex", alignItems: "center", gap: 6 } },
      h("span", null, "\uD83D\uDD17"),
      h("span", null, "Context: "),
      h("strong", null, currentTask.title.length > 40 ? currentTask.title.slice(0, 40) + "\u2026" : currentTask.title),
    ) : null,

    // Quick prompts
    currentTask ? h("div", { style: { padding: "8px 12px", display: "flex", gap: 6, flexWrap: "wrap", borderBottom: "1px solid #f1f5f9" } },
      quickPrompts.map((qp, i) => h("button", {
        key: i, onClick: () => send(qp.text),
        style: { border: "1px solid #e2e8f0", background: "#f8fafc", borderRadius: 16, padding: "4px 10px", fontSize: 11, color: "#475569", cursor: "pointer", whiteSpace: "nowrap" },
      }, qp.label))
    ) : null,

    // Messages
    h("div", { ref: scrollRef, style: { flex: 1, overflowY: "auto", padding: "12px 16px", display: "flex", flexDirection: "column", gap: 10 } },
      messages.length === 0 ? h("div", { style: { textAlign: "center", color: "#94a3b8", padding: 32, fontSize: 13 } },
        h("div", { style: { fontSize: 32, marginBottom: 8 } }, "\uD83E\uDD16"),
        h("div", { style: { fontWeight: 600, marginBottom: 4 } }, "AI Sales Copilot"),
        "Ask me about any property, contact strategy, or sales approach. " + (currentTask ? "I can see your current task context." : "Select a task for contextual advice."),
      ) : null,
      messages.map((m, i) => h("div", { key: i, style: { alignSelf: m.role === "user" ? "flex-end" : "flex-start", maxWidth: "85%" } },
        h("div", {
          style: {
            padding: "10px 14px", borderRadius: m.role === "user" ? "14px 14px 4px 14px" : "14px 14px 14px 4px",
            background: m.role === "user" ? "#1e293b" : "#f1f5f9",
            color: m.role === "user" ? "white" : "#334155",
            fontSize: 13, lineHeight: 1.5, whiteSpace: "pre-wrap", wordBreak: "break-word",
          },
        }, m.content),
      )),
      sending ? h("div", { style: { alignSelf: "flex-start", padding: "10px 14px", background: "#f1f5f9", borderRadius: "14px 14px 14px 4px", fontSize: 13, color: "#94a3b8" } }, "\u2728 Thinking\u2026") : null,
    ),

    // Input area
    h("div", { style: { padding: "10px 12px", borderTop: "1px solid #e2e8f0", display: "flex", gap: 8 } },
      h("input", {
        value: input, onChange: e => setInput(e.target.value),
        onKeyDown: e => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(input); } },
        placeholder: "Ask about strategy, properties\u2026",
        style: { flex: 1, border: "1px solid #e2e8f0", borderRadius: 10, padding: "10px 14px", fontSize: 14, outline: "none", minHeight: 44 },
        disabled: sending,
      }),
      h("button", {
        onClick: () => send(input), disabled: sending || !input.trim(),
        style: { background: sending || !input.trim() ? "#94a3b8" : "#1e293b", border: "none", color: "white", borderRadius: 10, padding: "10px 16px", cursor: sending || !input.trim() ? "default" : "pointer", fontSize: 14, fontWeight: 600, minHeight: 44 },
      }, sending ? "\u2026" : "\u27A4"),
    ),

    // Clear chat
    messages.length > 0 ? h("div", { style: { padding: "6px 12px 10px", textAlign: "center" } },
      h("button", {
        onClick: () => { setMessages([]); saveAIChatHistory([]); },
        style: { background: "transparent", border: "none", color: "#94a3b8", fontSize: 11, cursor: "pointer" },
      }, "Clear conversation"),
    ) : null,
  );
}

// LOG TO SALESFORCE PANEL
// ═══════════════════════════════════════════════════════════════════════════════
function LogToSFPanel({ task }) {
  const [searchQ, setSearchQ] = useState("");
  const [results, setResults] = useState(null);
  const [searching, setSearching] = useState(false);
  const [selectedContact, setSelectedContact] = useState(null);
  const [selectedAccount, setSelectedAccount] = useState(null);
  const [actType, setActType] = useState("Client Outreach");
  const [actDate, setActDate] = useState(todayStr());
  const [logging, setLogging] = useState(false);
  const [logResult, setLogResult] = useState(null);
  const [warning, setWarning] = useState(null);
  const [expanded, setExpanded] = useState(true);
  const searchTimer = useRef(null);

  const sfTag = task?.smartTags?.find(t => t.type === "sf_property");
  if (!getAIBaseURL()) return h("div", { style: { marginTop: 14, borderTop: "1px solid #e2e8f0", paddingTop: 10 } },
    h("div", { style: { display: "flex", alignItems: "center", gap: 6, opacity: 0.5 } },
      h("span", { style: { fontSize: 14 } }, "\uD83D\uDCE4"),
      h("span", { style: { fontWeight: 700, fontSize: 12.5, color: "#1e293b" } }, "Log to Salesforce"),
      h("span", { style: { fontSize: 10, color: "#94a3b8", marginLeft: "auto" } }, "Configure AI in Settings"),
    ),
  );
  if (!sfTag) return null;

  const actTypes = ["Client Outreach", "Market Update", "Follow-up", "Introduction Call", "Property Discussion", "Email Correspondence"];
  const sty = { fontSize: 12, color: "#334155" };
  const inp = { width: "100%", border: "1px solid #e2e8f0", borderRadius: 6, padding: "7px 9px", fontSize: 12.5, outline: "none", boxSizing: "border-box", background: "white", minHeight: 36 };
  const lbl = { display: "block", fontSize: 10.5, fontWeight: 600, color: "#64748b", marginBottom: 2 };

  const doSearch = useCallback(async (q) => {
    if (!q || q.length < 2) { setResults(null); return; }
    setSearching(true);
    try {
      const data = await aiCall("/sync/contact-lookup", { query: q, limit: 8 });
      setResults(data);
    } catch (e) { console.error("Contact lookup:", e); }
    setSearching(false);
  }, []);

  const onSearchInput = (val) => {
    setSearchQ(val);
    if (searchTimer.current) clearTimeout(searchTimer.current);
    searchTimer.current = setTimeout(() => doSearch(val), 400);
  };

  // Auto-seed search with property company name
  useEffect(() => {
    if (sfTag && !searchQ && !results) {
      const seed = sfTag.value || "";
      if (seed) { setSearchQ(seed); doSearch(seed); }
    }
  }, []);

  const doLog = async (force = false) => {
    if (!selectedContact && !selectedAccount) return;
    setLogging(true); setLogResult(null); setWarning(null);
    try {
      const config = loadAIConfig();
      const base = getAIBaseURL();
      const headers = { "Content-Type": "application/json", "apikey": config.anonKey || "", "Authorization": "Bearer " + (config.anonKey || "") };
      const payload = {
        sf_contact_id: selectedContact?.sf_contact_id || "",
        sf_company_id: selectedAccount?.sf_account_id || "",
        activity_type: actType,
        activity_date: actDate,
        force: force,
      };
      const resp = await fetch(base + "/sync/log-to-sf", { method: "POST", headers, body: JSON.stringify(payload) });
      const data = await resp.json();
      if (resp.status === 409 && data.warning) {
        setWarning(data);
      } else if (resp.ok && data.success) {
        setLogResult(data);
      } else {
        setLogResult({ error: data.error || "Failed to log activity" });
      }
    } catch (e) { setLogResult({ error: e.message }); }
    setLogging(false);
  };

  const pickStyle = (selected) => ({
    padding: "5px 8px", fontSize: 11.5, borderRadius: 5, cursor: "pointer", border: selected ? "2px solid #4338ca" : "1px solid #e2e8f0",
    background: selected ? "#eef2ff" : "white", marginBottom: 3, transition: "all 0.15s",
  });

// RESCHEDULE DIALOG
// ═══════════════════════════════════════════════════════════════════════════════
function RescheduleDialog({ task, bdCategory, onSchedule, onSkip }) {
  const [suggestedDate, setSuggestedDate] = useState("");
  const [customDate, setCustomDate] = useState("");
  const [reasoning, setReasoning] = useState("");
  const [loading, setLoading] = useState(true);
  const [creating, setCreating] = useState(false);
  const [useCustom, setUseCustom] = useState(false);

  useEffect(() => {
    (async () => {
      try {
        const data = await aiCall("/bd/auto-reschedule", {
          bd_category: bdCategory || "dialysis",
          activity_type: "completed",
          completion_date: todayStr(),
        });
        setSuggestedDate(data.suggested_date || "");
        setCustomDate(data.suggested_date || "");
        setReasoning(data.reasoning || "");
      } catch (e) {
        // Fallback: 14 days out
        const d = new Date();
        d.setDate(d.getDate() + 14);
        const fallback = d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0") + "-" + String(d.getDate()).padStart(2,"0");
        setSuggestedDate(fallback);
        setCustomDate(fallback);
        setReasoning("Default 14-day follow-up");
      }
      setLoading(false);
    })();
  }, [bdCategory]);

  const scheduleDate = useCustom ? customDate : suggestedDate;

  const handleSchedule = async () => {
    setCreating(true);
    onSchedule(task, scheduleDate);
  };

  if (loading) return h("div", { className: "modal-overlay" },
    h("div", { className: "modal-box", style: { maxWidth: 380, textAlign: "center", padding: 30 } },
      h("div", { style: { fontSize: 28, marginBottom: 8 } }, "\uD83D\uDD04"),
      h("div", { style: { fontSize: 14, color: "#64748b" } }, "Calculating follow-up\u2026"),
    )
  );

  return h("div", { className: "modal-overlay", onClick: onSkip },
    h("div", { className: "modal-box", style: { maxWidth: 400 }, onClick: e => e.stopPropagation() },
      h("div", { style: { textAlign: "center", marginBottom: 16 } },
        h("div", { style: { fontSize: 28, marginBottom: 4 } }, "\u2705"),
        h("div", { style: { fontSize: 16, fontWeight: 700, color: "#1e293b" } }, "Task Completed!"),
        h("div", { style: { fontSize: 12, color: "#64748b", marginTop: 4 } }, task.title),
      ),
      h("div", { style: { background: "#f0fdf4", borderRadius: 8, padding: 12, marginBottom: 14, border: "1px solid #dcfce7" } },
        h("div", { style: { fontSize: 12, fontWeight: 700, color: "#166534", marginBottom: 4 } }, "\uD83D\uDCC5 Suggested Follow-up"),
        h("div", { style: { fontSize: 18, fontWeight: 800, color: "#1e293b" } }, new Date(suggestedDate + "T12:00:00").toLocaleDateString("en-US", { weekday: "long", month: "long", day: "numeric" })),
        h("div", { style: { fontSize: 11, color: "#64748b", marginTop: 2 } }, reasoning),
      ),
      // Custom date option
      h("div", { style: { marginBottom: 14 } },
        h("label", { style: { display: "flex", alignItems: "center", gap: 6, fontSize: 12, color: "#475569", cursor: "pointer", marginBottom: 6 } },
          h("input", { type: "checkbox", checked: useCustom, onChange: () => setUseCustom(!useCustom) }), "Use custom date"
        ),
        useCustom ? h("input", { type: "date", value: customDate, onChange: e => setCustomDate(e.target.value), style: { width: "100%", border: "1px solid #e2e8f0", borderRadius: 6, padding: "8px 10px", fontSize: 13, outline: "none", minHeight: 36 } }) : null,
      ),
      // Action buttons
      h("div", { style: { display: "flex", gap: 8 } },
        h("button", { onClick: onSkip, style: { flex: 1, padding: "10px 0", fontSize: 13, border: "1px solid #e2e8f0", background: "white", borderRadius: 8, cursor: "pointer", color: "#64748b", minHeight: 44 } }, "Skip"),
        h("button", {
          onClick: handleSchedule,
          disabled: creating,
          style: { flex: 2, padding: "10px 0", fontSize: 13, fontWeight: 700, border: "none", background: "#2563eb", color: "white", borderRadius: 8, cursor: "pointer", opacity: creating ? 0.6 : 1, minHeight: 44 },
        }, creating ? "Creating\u2026" : "\uD83D\uDCC5 Schedule Follow-up"),
      ),
    )
  );
}

// EMAIL COMPOSER PANEL
// ═══════════════════════════════════════════════════════════════════════════════
function EmailComposerPanel({ task, authUser, showToast }) {
  const [expanded, setExpanded] = useState(true);
  const [templateType, setTemplateType] = useState("cold_outreach");
  const [toEmail, setToEmail] = useState("");
  const [subject, setSubject] = useState("");
  const [bodyHtml, setBodyHtml] = useState("");
  const [loading, setLoading] = useState(false);
  const [sending, setSending] = useState(false);
  const [generated, setGenerated] = useState(false);

  const sfTag = task?.smartTags?.find(t => t.type === "sf_property");
  if (!getAIBaseURL()) return h("div", { style: { marginTop: 14, borderTop: "1px solid #e2e8f0", paddingTop: 10 } },
    h("div", { style: { display: "flex", alignItems: "center", gap: 6, opacity: 0.5 } },
      h("span", { style: { fontSize: 14 } }, "\u2709\uFE0F"),
      h("span", { style: { fontWeight: 700, fontSize: 12.5, color: "#1e293b" } }, "Email Composer"),
      h("span", { style: { fontSize: 10, color: "#94a3b8", marginLeft: "auto" } }, "Configure AI in Settings"),
    ),
  );
  if (!sfTag) return null;

  const templateTypes = [
    { id: "cold_outreach", label: "Cold Outreach" },
    { id: "website_followup", label: "Website Follow-up" },
    { id: "om_download", label: "OM Download Follow-up" },
    { id: "post_call", label: "Post-Call Summary" },
  ];

  const inp = { width: "100%", border: "1px solid #e2e8f0", borderRadius: 6, padding: "7px 9px", fontSize: 12.5, outline: "none", boxSizing: "border-box", background: "white", minHeight: 36 };
  const lbl = { display: "block", fontSize: 10.5, fontWeight: 600, color: "#64748b", marginBottom: 2 };

  const generateEmail = async () => {
    setLoading(true);
    try {
      const data = await aiCall("/bd/generate-email", {
        template_type: templateType,
        contact_name: "",
        company_name: sfTag.value || "",
        property_name: sfTag.value || "",
        city_state: (sfTag.city || "") + (sfTag.state ? ", " + sfTag.state : ""),
        custom_context: task.title + (task.notes ? " — " + task.notes : ""),
      });
      setSubject(data.subject || "");
      setBodyHtml(data.html_body || data.plain_text || "");
      setGenerated(true);
    } catch (e) {
      showToast("Email generation failed: " + e.message);
    }
    setLoading(false);
  };

  const sendEmail = async () => {
    if (!toEmail || !subject) { showToast("Email and subject required"); return; }
    if (!authUser) { showToast("Sign in with Microsoft to send email"); return; }
    setSending(true);
    try {
      const token = await getAccessToken();
      if (!token) throw new Error("Not authenticated");
      const mailPayload = {
        message: {
          subject: subject,
          body: { contentType: "HTML", content: bodyHtml },
          toRecipients: [{ emailAddress: { address: toEmail } }],
        },
        saveToSentItems: true,
      };
      const resp = await fetch(GRAPH_BASE + "/me/sendMail", {
        method: "POST",
        headers: { Authorization: "Bearer " + token, "Content-Type": "application/json" },
        body: JSON.stringify(mailPayload),
      });
      if (!resp.ok && resp.status !== 202) {
        const errText = await resp.text().catch(() => "");
        throw new Error("Send failed: " + resp.status + " " + errText);
      }
      showToast("\u2709\uFE0F Email sent to " + toEmail);
      // Log to BD execution
      try {
        await aiCall("/bd/log-completion", {
          task_title: task.title,
          bd_category: routeTaskToBD(task)?.category || "unknown",
          action_type: "email_sent",
          details: { to: toEmail, subject, template: templateType },
        });
      } catch (_) {}
    } catch (e) {
      showToast("Send failed: " + e.message);
    }
    setSending(false);
  };

  const openInOutlook = () => {
    const mailtoUrl = "mailto:" + encodeURIComponent(toEmail) + "?subject=" + encodeURIComponent(subject) + "&body=" + encodeURIComponent(bodyHtml.replace(/<[^>]*>/g, ""));
    window.open(mailtoUrl, "_blank");
    // Log as drafted
    try {
      aiCall("/bd/log-completion", {
        task_title: task.title,
        bd_category: routeTaskToBD(task)?.category || "unknown",
        action_type: "email_drafted",
        details: { to: toEmail, subject, template: templateType },
      });
    } catch (_) {}
  };

  return h("div", { style: { marginTop: 14, borderTop: "1px solid #e2e8f0", paddingTop: 10 } },
    h("div", { onClick: () => setExpanded(!expanded), style: { cursor: "pointer", display: "flex", alignItems: "center", gap: 6, marginBottom: expanded ? 10 : 0 } },
      h("span", { style: { fontSize: 14 } }, "\u2709\uFE0F"),
      h("span", { style: { fontWeight: 700, fontSize: 12.5, color: "#1e293b" } }, "Email Composer"),
      h("span", { style: { fontSize: 10, color: "#94a3b8", marginLeft: "auto" } }, expanded ? "\u25B2" : "\u25BC"),
    ),
    expanded ? h("div", null,
      // Template selector
      h("div", { style: { marginBottom: 8 } },
        h("label", { style: lbl }, "Template"),
        h("select", { value: templateType, onChange: e => setTemplateType(e.target.value), style: inp },
          templateTypes.map(t => h("option", { key: t.id, value: t.id }, t.label)),
        ),
      ),
      // Generate button
      !generated ? h("button", {
        onClick: generateEmail,
        disabled: loading,
        style: { width: "100%", padding: "8px 0", fontSize: 12.5, fontWeight: 700, border: "none", borderRadius: 6, cursor: "pointer", color: "white", background: "#6366f1", opacity: loading ? 0.6 : 1, marginBottom: 10, minHeight: 36 },
      }, loading ? "Generating\u2026" : "\uD83E\uDD16 Generate Email from Template") : null,
      // Email form (shown after generation)
      generated ? h("div", null,
        h("div", { style: { marginBottom: 8 } },
          h("label", { style: lbl }, "To"),
          h("input", { value: toEmail, onChange: e => setToEmail(e.target.value), placeholder: "recipient@example.com", style: inp }),
        ),
        h("div", { style: { marginBottom: 8 } },
          h("label", { style: lbl }, "Subject"),
          h("input", { value: subject, onChange: e => setSubject(e.target.value), style: inp }),
        ),
        h("div", { style: { marginBottom: 8 } },
          h("label", { style: lbl }, "Body"),
          h("textarea", { value: bodyHtml.replace(/<[^>]*>/g, ""), onChange: e => setBodyHtml(e.target.value), rows: 6, style: { ...inp, resize: "vertical", minHeight: 120, fontSize: 12, lineHeight: 1.5 } }),
        ),
        // Re-generate
        h("button", {
          onClick: generateEmail,
          disabled: loading,
          style: { width: "100%", padding: "6px 0", fontSize: 11, fontWeight: 600, border: "1px solid #e2e8f0", borderRadius: 6, cursor: "pointer", color: "#6366f1", background: "white", marginBottom: 8, minHeight: 32 },
        }, loading ? "Regenerating\u2026" : "\uD83D\uDD04 Regenerate"),
        // Action buttons
        h("div", { style: { display: "flex", gap: 6 } },
          h("button", {
            onClick: sendEmail,
            disabled: sending || !toEmail,
            style: { flex: 1, padding: "8px 0", fontSize: 12.5, fontWeight: 700, border: "none", borderRadius: 6, cursor: "pointer", color: "white", background: (!toEmail) ? "#cbd5e1" : "#2563eb", opacity: sending ? 0.6 : 1, minHeight: 36 },
          }, sending ? "Sending\u2026" : "\uD83D\uDCE8 Send Email"),
          h("button", {
            onClick: openInOutlook,
            style: { flex: 1, padding: "8px 0", fontSize: 12.5, fontWeight: 700, border: "1px solid #e2e8f0", borderRadius: 6, cursor: "pointer", color: "#475569", background: "white", minHeight: 36 },
          }, "\uD83D\uDCE7 Open in Outlook"),
        ),
      ) : null,
    ) : null,
  );
}
