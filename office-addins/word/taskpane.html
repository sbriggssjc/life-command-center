<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LCC Document Assistant</title>
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 13px;
      color: #323130;
      background: #faf9f8;
      padding: 12px;
      line-height: 1.4;
    }
    h2 {
      font-size: 16px;
      font-weight: 600;
      color: #201f1e;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .section {
      background: #fff;
      border: 1px solid #edebe9;
      border-radius: 6px;
      padding: 14px;
      margin-bottom: 12px;
    }
    .section-title {
      font-size: 11px;
      font-weight: 600;
      color: #605e5c;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .section-title .arrow { font-size: 10px; transition: transform 0.2s; }
    .section-title .arrow.open { transform: rotate(90deg); }
    .section-body { display: block; }
    .section-body.collapsed { display: none; }
    .search-row {
      display: flex;
      gap: 6px;
      margin-bottom: 8px;
    }
    .search-row input {
      flex: 1;
      padding: 7px 10px;
      border: 1px solid #8a8886;
      border-radius: 4px;
      font-size: 12px;
      font-family: inherit;
    }
    .search-row input:focus { outline: none; border-color: #0078d4; box-shadow: 0 0 0 1px #0078d4; }
    select {
      padding: 7px 10px;
      border: 1px solid #8a8886;
      border-radius: 4px;
      font-size: 12px;
      font-family: inherit;
      background: #fff;
      width: 100%;
      margin-bottom: 8px;
    }
    .btn {
      padding: 6px 14px;
      border: 1px solid #8a8886;
      border-radius: 4px;
      background: #fff;
      color: #323130;
      font-size: 12px;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s;
      white-space: nowrap;
    }
    .btn:hover { background: #f3f2f1; }
    .btn-primary { background: #0078d4; color: #fff; border-color: #0078d4; }
    .btn-primary:hover { background: #106ebe; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-row {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-top: 8px;
    }

    .prop-card {
      background: #f3f2f1;
      border-radius: 4px;
      padding: 10px;
      margin-top: 8px;
      font-size: 12px;
    }
    .prop-card .prop-field {
      display: flex;
      justify-content: space-between;
      padding: 2px 0;
    }
    .prop-card .prop-label { color: #605e5c; }
    .prop-card .prop-value { font-weight: 600; }

    .preview-area {
      margin-top: 8px;
      background: #fff;
      border: 1px solid #edebe9;
      border-radius: 4px;
      padding: 10px;
      font-size: 12px;
      line-height: 1.6;
      max-height: 300px;
      overflow-y: auto;
      white-space: pre-wrap;
      color: #323130;
    }

    .status-msg {
      text-align: center;
      padding: 20px;
      color: #605e5c;
      font-size: 12px;
    }
    .spinner {
      width: 20px;
      height: 20px;
      border: 2px solid #edebe9;
      border-top: 2px solid #0078d4;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .toast {
      position: fixed;
      bottom: 50px;
      left: 12px;
      right: 12px;
      padding: 8px 12px;
      border-radius: 4px;
      font-size: 12px;
      color: #fff;
      z-index: 20;
      display: none;
    }
    .toast.success { background: #107c10; }
    .toast.error { background: #a4262c; }
    .toast.visible { display: block; }

    .settings-toggle {
      position: fixed;
      bottom: 12px;
      right: 12px;
      width: 32px; height: 32px;
      border-radius: 50%;
      border: 1px solid #8a8886;
      background: #fff;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; color: #605e5c; z-index: 10;
    }
    .settings-toggle:hover { background: #f3f2f1; }
    .settings-panel {
      display: none; background: #fff;
      border: 1px solid #edebe9; border-radius: 6px;
      padding: 14px; margin-bottom: 10px;
    }
    .settings-panel.visible { display: block; }
    .settings-panel label {
      display: block; font-size: 12px; font-weight: 600;
      color: #323130; margin-bottom: 4px; margin-top: 10px;
    }
    .settings-panel label:first-child { margin-top: 0; }
    .settings-panel input[type="url"],
    .settings-panel input[type="password"] {
      width: 100%; padding: 6px 8px;
      border: 1px solid #8a8886; border-radius: 4px;
      font-size: 12px; font-family: inherit;
    }
  </style>
</head>
<body>

<h2>&#128196; LCC Document Assistant</h2>

<div id="settingsPanel" class="settings-panel">
  <label for="settingsUrl">LCC Railway URL</label>
  <input type="url" id="settingsUrl" placeholder="https://your-lcc.railway.app"/>
  <label for="settingsKey">LCC API Key</label>
  <input type="password" id="settingsKey" placeholder="Enter API key"/>
  <div style="margin-top:10px;display:flex;gap:6px;">
    <button class="btn btn-primary" id="btnSaveSettings">Save</button>
    <button class="btn" id="btnTestConnection">Test Connection</button>
  </div>
  <div id="settingsStatus" style="margin-top:6px;font-size:11px;"></div>
</div>

<!-- SECTION 1: Property Context Insert -->
<div class="section">
  <div class="section-title" onclick="toggleSection('propSection')">
    Property Context Insert <span class="arrow open" id="propSectionArrow">&#9654;</span>
  </div>
  <div class="section-body" id="propSection">
    <div class="search-row">
      <input type="text" id="propSearch" placeholder="Property address..."/>
      <button class="btn btn-primary" id="btnSearchProp">Search</button>
    </div>
    <div id="propResults"></div>
    <div id="propActions" style="display:none;">
      <div class="btn-row">
        <button class="btn btn-primary" id="btnInsertSummary">Insert Property Summary</button>
        <button class="btn" id="btnInsertTenant">Insert Tenant Section</button>
        <button class="btn" id="btnInsertCompTable">Insert Comp Table</button>
      </div>
    </div>
  </div>
</div>

<!-- SECTION 2: AI Draft Assist -->
<div class="section">
  <div class="section-title" onclick="toggleSection('draftSection')">
    AI Draft Assist <span class="arrow" id="draftSectionArrow">&#9654;</span>
  </div>
  <div class="section-body collapsed" id="draftSection">
    <label style="font-size:12px;font-weight:600;color:#323130;margin-bottom:4px;display:block;">What to draft?</label>
    <select id="draftType">
      <option value="executive_summary">Executive Summary</option>
      <option value="investment_highlights">Investment Highlights</option>
      <option value="market_overview">Market Overview</option>
      <option value="lease_abstract">Lease Abstract</option>
      <option value="tenant_background">Tenant Background</option>
      <option value="pricing_rationale">Pricing Rationale</option>
    </select>
    <button class="btn btn-primary" id="btnGenerate">Generate</button>
    <div id="draftPreview" style="display:none;">
      <div class="preview-area" id="draftText"></div>
      <div class="btn-row">
        <button class="btn btn-primary" id="btnInsertAtCursor">Insert at Cursor</button>
        <button class="btn" id="btnReplaceSelection">Replace Selection</button>
      </div>
    </div>
    <div id="draftStatus"></div>
  </div>
</div>

<div id="toast" class="toast"></div>
<button class="settings-toggle" id="btnSettings" title="Settings">&#9881;</button>

<script>
// ── LCC API Client (inlined) ──────────────────────────────────────────────
class LCCApi {
  constructor() {
    this.baseUrl = localStorage.getItem('lcc_railway_url') || '';
    this.apiKey = localStorage.getItem('lcc_api_key') || '';
  }
  async call(action, params) {
    if (!this.baseUrl || !this.apiKey) throw new Error('LCC not configured — click the gear icon to set up.');
    var p = params || {};
    var controller = new AbortController();
    var timeout = setTimeout(function() { controller.abort(); }, 10000);
    try {
      var res = await fetch(this.baseUrl + '/api/chat', {
        method: 'POST',
        headers: {
          'Authorization': 'Bearer ' + this.apiKey,
          'Content-Type': 'application/json',
          'X-LCC-Surface': 'office_addin'
        },
        body: JSON.stringify({ copilot_action: action, params: p, surface: 'office_addin' }),
        signal: controller.signal
      });
      if (!res.ok) throw new Error('LCC API error ' + res.status);
      return res.json();
    } finally { clearTimeout(timeout); }
  }
  async assembleContext(packetType, params) {
    if (!this.baseUrl || !this.apiKey) throw new Error('LCC not configured');
    var p = params || {};
    var controller = new AbortController();
    var timeout = setTimeout(function() { controller.abort(); }, 10000);
    try {
      var res = await fetch(this.baseUrl + '/api/context', {
        method: 'POST',
        headers: {
          'Authorization': 'Bearer ' + this.apiKey,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify(Object.assign({ action: 'assemble', packet_type: packetType, surface_hint: 'office_addin' }, p)),
        signal: controller.signal
      });
      if (!res.ok) throw new Error('Context error ' + res.status);
      return res.json();
    } finally { clearTimeout(timeout); }
  }
  isConfigured() { return !!(this.baseUrl && this.apiKey); }
  saveConfig(url, key) {
    localStorage.setItem('lcc_railway_url', url.replace(/\/+$/, ''));
    localStorage.setItem('lcc_api_key', key);
    this.baseUrl = url.replace(/\/+$/, '');
    this.apiKey = key;
  }
}

// ── Globals ────────────────────────────────────────────────────────────────
var lcc = new LCCApi();
var propertyContextData = null;
var generatedDraftText = '';

function $(id) { return document.getElementById(id); }
function escHtml(s) { var d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }

function showToast(msg, type) {
  var t = $('toast');
  t.textContent = msg;
  t.className = 'toast ' + type + ' visible';
  setTimeout(function() { t.className = 'toast'; }, 3000);
}

function toggleSection(id) {
  var body = $(id);
  var arrow = $(id + 'Arrow');
  body.classList.toggle('collapsed');
  arrow.classList.toggle('open');
}

function formatCurrency(val) {
  if (!val) return '';
  var n = parseFloat(val);
  if (isNaN(n)) return val;
  if (n >= 1000000) return '$' + (n / 1000000).toFixed(1) + 'M';
  if (n >= 1000) return '$' + (n / 1000).toFixed(0) + 'K';
  return '$' + n.toFixed(0);
}

function formatPct(val) {
  if (!val) return '';
  var n = parseFloat(val);
  return isNaN(n) ? val : n.toFixed(2) + '%';
}

// ── SECTION 1: Property Context ────────────────────────────────────────────
$('btnSearchProp').addEventListener('click', searchProperty);
$('propSearch').addEventListener('keydown', function(e) { if (e.key === 'Enter') searchProperty(); });

async function searchProperty() {
  var query = $('propSearch').value.trim();
  if (!query) return;
  $('propResults').innerHTML = '<div class="status-msg"><div class="spinner"></div>Loading property context...</div>';
  $('propActions').style.display = 'none';

  try {
    var data = await lcc.assembleContext('property', { address: query });
    propertyContextData = data;

    var prop = data.property || data.payload?.property || {};
    var ownership = data.ownership || data.payload?.ownership || {};
    var valuation = data.valuation || data.payload?.valuation || {};
    var comps = data.comparable_sales || data.payload?.comparable_sales || [];

    var html = '<div class="prop-card">';
    html += '<div style="font-weight:600;margin-bottom:6px;">' + escHtml(prop.name || prop.address || query) + '</div>';
    var fields = [
      ['Address', prop.address || ''],
      ['Location', prop.city_state || [prop.city, prop.state].filter(Boolean).join(', ')],
      ['Tenant', prop.tenant || ''],
      ['SF', prop.building_sf ? Number(prop.building_sf).toLocaleString() : ''],
      ['Property Type', prop.property_type || ''],
      ['Lease Type', prop.lease_type || ''],
      ['Lease Expiration', prop.lease_expiration || ''],
      ['Annual Rent', formatCurrency(prop.annual_rent)],
      ['Owner', ownership.recorded_owner || ownership.true_owner || ''],
      ['Est. Value', valuation.estimated_value_range || ''],
      ['Cap Rate Range', valuation.implied_cap_rate_range || '']
    ];
    fields.forEach(function(f) {
      if (f[1]) {
        html += '<div class="prop-field"><span class="prop-label">' + f[0] + '</span><span class="prop-value">' + escHtml(String(f[1])) + '</span></div>';
      }
    });
    if (comps.length) {
      html += '<div style="margin-top:6px;font-size:11px;font-weight:600;color:#605e5c;">Comps: ' + comps.length + ' available</div>';
    }
    html += '</div>';

    $('propResults').innerHTML = html;
    $('propActions').style.display = 'block';
  } catch (e) {
    $('propResults').innerHTML = '<div class="status-msg" style="color:#a4262c;">' + escHtml(e.message) + '</div>';
  }
}

// Insert Property Summary paragraph
$('btnInsertSummary').addEventListener('click', async function() {
  if (!propertyContextData) return;
  var prop = propertyContextData.property || propertyContextData.payload?.property || {};
  var ownership = propertyContextData.ownership || propertyContextData.payload?.ownership || {};

  var sf = prop.building_sf ? Number(prop.building_sf).toLocaleString() : '[SF]';
  var assetType = prop.property_type || prop.asset_type || 'net lease';
  var address = prop.address || '[address]';
  var city = prop.city || '[city]';
  var state = prop.state || '[state]';
  var tenant = prop.tenant || '[tenant]';
  var term = prop.remaining_lease_term_years || '[term]';
  var leaseType = prop.lease_type || 'NNN';
  var expiration = prop.lease_expiration || '[expiration]';
  var rent = formatCurrency(prop.annual_rent) || '[rent]';
  var rentPsf = (prop.annual_rent && prop.building_sf)
    ? '$' + (parseFloat(prop.annual_rent) / parseFloat(prop.building_sf)).toFixed(2)
    : '$[rent_psf]';
  var occupancy = prop.occupancy_status === 'vacant' ? 'vacant' : 'leased';

  var text = 'The subject property is a ' + sf + ' SF ' + assetType + ' net lease property located at ' +
    address + ', ' + city + ', ' + state + '. The property is ' + occupancy + ' by ' + tenant +
    ' under a ' + term + '-year ' + leaseType + ' lease expiring ' + expiration +
    '. The current annual rent is ' + rent + ', equating to ' + rentPsf + '/SF.';

  try {
    await Word.run(async function(ctx) {
      var selection = ctx.document.getSelection();
      selection.insertText(text, Word.InsertLocation.replace);
      selection.font.name = 'Calibri';
      selection.font.size = 11;
      await ctx.sync();
    });
    showToast('Property summary inserted', 'success');
  } catch (e) {
    showToast('Insert failed: ' + e.message, 'error');
  }
});

// Insert Tenant Section
$('btnInsertTenant').addEventListener('click', async function() {
  if (!propertyContextData) return;

  try {
    var data = await lcc.call('generate_document', {
      section: 'tenant_background',
      context: propertyContextData
    });

    var text = data.response || data.data?.response || data.text || JSON.stringify(data);

    await Word.run(async function(ctx) {
      var selection = ctx.document.getSelection();
      selection.insertText(text, Word.InsertLocation.replace);
      selection.font.name = 'Calibri';
      selection.font.size = 11;
      await ctx.sync();
    });
    showToast('Tenant section inserted', 'success');
  } catch (e) {
    showToast('Insert failed: ' + e.message, 'error');
  }
});

// Insert Comp Table
$('btnInsertCompTable').addEventListener('click', async function() {
  if (!propertyContextData) return;

  var comps = propertyContextData.comparable_sales || propertyContextData.payload?.comparable_sales || [];
  if (!comps.length) {
    showToast('No comp data available', 'error');
    return;
  }

  try {
    await Word.run(async function(ctx) {
      var selection = ctx.document.getSelection();

      // Build table data: header + rows
      var headers = ['Address', 'City/State', 'Tenant', 'Sale Price', 'Cap Rate', 'Term at Sale', 'SF', 'Price/SF'];
      var rows = comps.map(function(c) {
        return [
          c.address || '',
          c.city_state || '',
          c.tenant || '',
          formatCurrency(c.sale_price),
          formatPct(c.cap_rate),
          c.remaining_term_at_sale ? c.remaining_term_at_sale + ' yrs' : '',
          c.sf ? Number(c.sf).toLocaleString() : '',
          formatCurrency(c.price_per_sf)
        ];
      });

      var tableData = [headers].concat(rows);
      var table = selection.insertTable(tableData.length, headers.length, Word.InsertLocation.after, tableData);
      table.styleBuiltIn = Word.Style.gridTable4Accent1;

      // Format header row
      var headerRow = table.rows.getFirst();
      headerRow.shadingColor = '#0078d4';
      headerRow.font.color = '#ffffff';
      headerRow.font.bold = true;
      headerRow.font.name = 'Calibri';
      headerRow.font.size = 10;

      // Format body rows with alternating colors
      for (var i = 1; i < tableData.length; i++) {
        var row = table.rows.items ? table.rows.items[i] : null;
        if (row && i % 2 === 0) {
          row.shadingColor = '#f3f2f1';
        }
      }

      table.font.name = 'Calibri';
      table.font.size = 10;

      await ctx.sync();
    });
    showToast(comps.length + ' comps inserted as table', 'success');
  } catch (e) {
    showToast('Insert failed: ' + e.message, 'error');
  }
});

// ── SECTION 2: AI Draft Assist ─────────────────────────────────────────────
$('btnGenerate').addEventListener('click', async function() {
  var section = $('draftType').value;
  $('draftStatus').innerHTML = '<div class="status-msg"><div class="spinner"></div>Generating ' + section.replace(/_/g, ' ') + '...</div>';
  $('draftPreview').style.display = 'none';

  try {
    var contextPayload = propertyContextData || {};
    var data = await lcc.call('generate_document', {
      section: section,
      context: contextPayload
    });

    generatedDraftText = data.response || data.data?.response || data.text || '';
    if (!generatedDraftText && typeof data === 'string') generatedDraftText = data;

    if (!generatedDraftText) {
      $('draftStatus').innerHTML = '<div class="status-msg" style="color:#a4262c;">No text generated. Try loading property context first.</div>';
      return;
    }

    $('draftText').textContent = generatedDraftText;
    $('draftPreview').style.display = 'block';
    $('draftStatus').innerHTML = '';
  } catch (e) {
    $('draftStatus').innerHTML = '<div class="status-msg" style="color:#a4262c;">' + escHtml(e.message) + '</div>';
  }
});

$('btnInsertAtCursor').addEventListener('click', async function() {
  if (!generatedDraftText) return;
  try {
    await Word.run(async function(ctx) {
      var selection = ctx.document.getSelection();
      selection.insertText(generatedDraftText, Word.InsertLocation.end);
      selection.font.name = 'Calibri';
      selection.font.size = 11;
      await ctx.sync();
    });
    showToast('Text inserted at cursor', 'success');
  } catch (e) {
    showToast('Insert failed: ' + e.message, 'error');
  }
});

$('btnReplaceSelection').addEventListener('click', async function() {
  if (!generatedDraftText) return;
  try {
    await Word.run(async function(ctx) {
      var selection = ctx.document.getSelection();
      selection.insertText(generatedDraftText, Word.InsertLocation.replace);
      selection.font.name = 'Calibri';
      selection.font.size = 11;
      await ctx.sync();
    });
    showToast('Selection replaced', 'success');
  } catch (e) {
    showToast('Replace failed: ' + e.message, 'error');
  }
});

// ── Settings ───────────────────────────────────────────────────────────────
$('btnSettings').addEventListener('click', function() {
  var panel = $('settingsPanel');
  var visible = panel.classList.contains('visible');
  if (!visible) {
    $('settingsUrl').value = lcc.baseUrl || '';
    $('settingsKey').value = lcc.apiKey || '';
  }
  panel.classList.toggle('visible');
});

$('btnSaveSettings').addEventListener('click', function() {
  var url = $('settingsUrl').value.trim();
  var key = $('settingsKey').value.trim();
  if (!url || !key) { $('settingsStatus').textContent = 'URL and API key required'; return; }
  lcc.saveConfig(url, key);
  $('settingsStatus').textContent = 'Saved!';
  $('settingsPanel').classList.remove('visible');
  showToast('Settings saved', 'success');
});

$('btnTestConnection').addEventListener('click', async function() {
  var url = $('settingsUrl').value.trim();
  var key = $('settingsKey').value.trim();
  if (!url || !key) { $('settingsStatus').textContent = 'Enter URL and key first'; return; }
  $('settingsStatus').textContent = 'Testing...';
  var controller = new AbortController();
  var timeout = setTimeout(function() { controller.abort(); }, 10000);
  try {
    var res = await fetch(url.replace(/\/+$/, '') + '/api/config', { signal: controller.signal });
    $('settingsStatus').innerHTML = res.ok
      ? '<span style="color:#107c10;">&#10003; Connected</span>'
      : '<span style="color:#a4262c;">&#10007; HTTP ' + res.status + '</span>';
  } catch (e) {
    $('settingsStatus').innerHTML = '<span style="color:#a4262c;">&#10007; ' + escHtml(e.message) + '</span>';
  } finally { clearTimeout(timeout); }
});

// ── Office Initialization ──────────────────────────────────────────────────
Office.onReady(function(info) {
  if (!lcc.isConfigured()) {
    $('settingsPanel').classList.add('visible');
  }
});
</script>

</body>
</html>
