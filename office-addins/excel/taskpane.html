<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LCC Comp Data</title>
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 13px;
      color: #323130;
      background: #faf9f8;
      padding: 12px;
      line-height: 1.4;
    }
    h2 {
      font-size: 16px;
      font-weight: 600;
      color: #201f1e;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .section {
      background: #fff;
      border: 1px solid #edebe9;
      border-radius: 6px;
      padding: 14px;
      margin-bottom: 12px;
    }
    .section-title {
      font-size: 11px;
      font-weight: 600;
      color: #605e5c;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .section-title .arrow { font-size: 10px; transition: transform 0.2s; }
    .section-title .arrow.open { transform: rotate(90deg); }
    .section-body { display: block; }
    .section-body.collapsed { display: none; }
    .search-row {
      display: flex;
      gap: 6px;
      margin-bottom: 8px;
    }
    .search-row input {
      flex: 1;
      padding: 7px 10px;
      border: 1px solid #8a8886;
      border-radius: 4px;
      font-size: 12px;
      font-family: inherit;
    }
    .search-row input:focus { outline: none; border-color: #0078d4; box-shadow: 0 0 0 1px #0078d4; }
    select {
      padding: 6px 8px;
      border: 1px solid #8a8886;
      border-radius: 4px;
      font-size: 12px;
      font-family: inherit;
      background: #fff;
    }
    .filter-row {
      display: flex;
      gap: 6px;
      margin-bottom: 8px;
      flex-wrap: wrap;
    }
    .btn {
      padding: 6px 14px;
      border: 1px solid #8a8886;
      border-radius: 4px;
      background: #fff;
      color: #323130;
      font-size: 12px;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s;
      white-space: nowrap;
    }
    .btn:hover { background: #f3f2f1; }
    .btn-primary { background: #0078d4; color: #fff; border-color: #0078d4; }
    .btn-primary:hover { background: #106ebe; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Comp results table */
    .comp-results {
      max-height: 250px;
      overflow-y: auto;
      margin-top: 8px;
    }
    .comp-row {
      display: flex;
      align-items: center;
      padding: 6px 4px;
      border-bottom: 1px solid #f3f2f1;
      font-size: 11px;
      gap: 6px;
    }
    .comp-row:hover { background: #f3f2f1; }
    .comp-row input[type="checkbox"] { flex-shrink: 0; }
    .comp-info { flex: 1; min-width: 0; }
    .comp-info .addr { font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .comp-info .details { color: #605e5c; font-size: 10px; }
    .comp-count { font-size: 11px; color: #605e5c; margin-top: 4px; }

    /* Property context */
    .prop-card {
      background: #f3f2f1;
      border-radius: 4px;
      padding: 10px;
      margin-top: 8px;
      font-size: 12px;
    }
    .prop-card .prop-field {
      display: flex;
      justify-content: space-between;
      padding: 2px 0;
    }
    .prop-card .prop-label { color: #605e5c; }
    .prop-card .prop-value { font-weight: 600; }

    .status-msg {
      text-align: center;
      padding: 20px;
      color: #605e5c;
      font-size: 12px;
    }
    .spinner {
      width: 20px;
      height: 20px;
      border: 2px solid #edebe9;
      border-top: 2px solid #0078d4;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .toast {
      position: fixed;
      bottom: 50px;
      left: 12px;
      right: 12px;
      padding: 8px 12px;
      border-radius: 4px;
      font-size: 12px;
      color: #fff;
      z-index: 20;
      display: none;
    }
    .toast.success { background: #107c10; }
    .toast.error { background: #a4262c; }
    .toast.visible { display: block; }

    /* Settings */
    .settings-toggle {
      position: fixed;
      bottom: 12px;
      right: 12px;
      width: 32px; height: 32px;
      border-radius: 50%;
      border: 1px solid #8a8886;
      background: #fff;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; color: #605e5c; z-index: 10;
    }
    .settings-toggle:hover { background: #f3f2f1; }
    .settings-panel {
      display: none; background: #fff;
      border: 1px solid #edebe9; border-radius: 6px;
      padding: 14px; margin-bottom: 10px;
    }
    .settings-panel.visible { display: block; }
    .settings-panel label {
      display: block; font-size: 12px; font-weight: 600;
      color: #323130; margin-bottom: 4px; margin-top: 10px;
    }
    .settings-panel label:first-child { margin-top: 0; }
    .settings-panel input[type="url"],
    .settings-panel input[type="password"] {
      width: 100%; padding: 6px 8px;
      border: 1px solid #8a8886; border-radius: 4px;
      font-size: 12px; font-family: inherit;
    }
  </style>
</head>
<body>

<h2>&#128202; LCC Comp Data</h2>

<div id="settingsPanel" class="settings-panel">
  <label for="settingsUrl">LCC Railway URL</label>
  <input type="url" id="settingsUrl" placeholder="https://your-lcc.railway.app"/>
  <label for="settingsKey">LCC API Key</label>
  <input type="password" id="settingsKey" placeholder="Enter API key"/>
  <div style="margin-top:10px;display:flex;gap:6px;">
    <button class="btn btn-primary" id="btnSaveSettings">Save</button>
    <button class="btn" id="btnTestConnection">Test Connection</button>
  </div>
  <div id="settingsStatus" style="margin-top:6px;font-size:11px;"></div>
</div>

<!-- SECTION 1: Search Comps -->
<div class="section">
  <div class="section-title" onclick="toggleSection('compSection')">
    Search Comps <span class="arrow open" id="compSectionArrow">&#9654;</span>
  </div>
  <div class="section-body" id="compSection">
    <div class="search-row">
      <input type="text" id="compSearch" placeholder="Search by address, city, state, or tenant..."/>
      <button class="btn btn-primary" id="btnSearchComps">Search</button>
    </div>
    <div class="filter-row">
      <select id="filterDomain">
        <option value="">All Domains</option>
        <option value="government">Government</option>
        <option value="dialysis">Dialysis</option>
      </select>
      <select id="filterType">
        <option value="">Sale &amp; Lease</option>
        <option value="sale">Sale Only</option>
        <option value="lease">Lease Only</option>
      </select>
    </div>
    <div id="compResults"></div>
    <div id="compActions" style="display:none;margin-top:8px;">
      <button class="btn btn-primary" id="btnInsertComps">Insert Selected Comps</button>
      <span class="comp-count" id="selectedCount">0 selected</span>
    </div>
  </div>
</div>

<!-- SECTION 2: Property Context -->
<div class="section">
  <div class="section-title" onclick="toggleSection('propSection')">
    Property Context <span class="arrow" id="propSectionArrow">&#9654;</span>
  </div>
  <div class="section-body collapsed" id="propSection">
    <div class="search-row">
      <input type="text" id="propSearch" placeholder="Enter address for full context..."/>
      <button class="btn btn-primary" id="btnSearchProp">Search</button>
    </div>
    <div id="propResults"></div>
    <div id="propActions" style="display:none;margin-top:8px;">
      <button class="btn btn-primary" id="btnInsertPropSheet">Insert to Sheet</button>
    </div>
  </div>
</div>

<!-- SECTION 3: Daily Briefing -->
<div class="section">
  <div class="section-title" onclick="toggleSection('briefSection')">
    Daily Briefing Insert <span class="arrow" id="briefSectionArrow">&#9654;</span>
  </div>
  <div class="section-body collapsed" id="briefSection">
    <p style="font-size:12px;color:#605e5c;margin-bottom:8px;">
      Fetch today's briefing and insert as a formatted table into your workbook.
    </p>
    <button class="btn btn-primary" id="btnInsertBriefing">Insert Today's Briefing</button>
    <div id="briefStatus"></div>
  </div>
</div>

<div id="toast" class="toast"></div>
<button class="settings-toggle" id="btnSettings" title="Settings">&#9881;</button>

<script>
// ── LCC API Client (inlined) ──────────────────────────────────────────────
class LCCApi {
  constructor() {
    this.baseUrl = localStorage.getItem('lcc_railway_url') || '';
    this.apiKey = localStorage.getItem('lcc_api_key') || '';
  }
  async call(action, params) {
    if (!this.baseUrl || !this.apiKey) throw new Error('LCC not configured — click the gear icon to set up.');
    var p = params || {};
    var controller = new AbortController();
    var timeout = setTimeout(function() { controller.abort(); }, 10000);
    try {
      var res = await fetch(this.baseUrl + '/api/chat', {
        method: 'POST',
        headers: {
          'Authorization': 'Bearer ' + this.apiKey,
          'Content-Type': 'application/json',
          'X-LCC-Surface': 'office_addin'
        },
        body: JSON.stringify({ copilot_action: action, params: p, surface: 'office_addin' }),
        signal: controller.signal
      });
      if (!res.ok) throw new Error('LCC API error ' + res.status);
      return res.json();
    } finally { clearTimeout(timeout); }
  }
  async assembleContext(packetType, params) {
    if (!this.baseUrl || !this.apiKey) throw new Error('LCC not configured');
    var p = params || {};
    var controller = new AbortController();
    var timeout = setTimeout(function() { controller.abort(); }, 10000);
    try {
      var res = await fetch(this.baseUrl + '/api/context', {
        method: 'POST',
        headers: {
          'Authorization': 'Bearer ' + this.apiKey,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify(Object.assign({ action: 'assemble', packet_type: packetType, surface_hint: 'office_addin' }, p)),
        signal: controller.signal
      });
      if (!res.ok) throw new Error('Context error ' + res.status);
      return res.json();
    } finally { clearTimeout(timeout); }
  }
  isConfigured() { return !!(this.baseUrl && this.apiKey); }
  saveConfig(url, key) {
    localStorage.setItem('lcc_railway_url', url.replace(/\/+$/, ''));
    localStorage.setItem('lcc_api_key', key);
    this.baseUrl = url.replace(/\/+$/, '');
    this.apiKey = key;
  }
}

// ── Globals ────────────────────────────────────────────────────────────────
var lcc = new LCCApi();
var compResultsData = [];
var propertyContextData = null;

function $(id) { return document.getElementById(id); }
function escHtml(s) { var d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }

function showToast(msg, type) {
  var t = $('toast');
  t.textContent = msg;
  t.className = 'toast ' + type + ' visible';
  setTimeout(function() { t.className = 'toast'; }, 3000);
}

function toggleSection(id) {
  var body = $(id);
  var arrow = $(id + 'Arrow');
  body.classList.toggle('collapsed');
  arrow.classList.toggle('open');
}

function formatCurrency(val) {
  if (!val) return '—';
  var n = parseFloat(val);
  if (isNaN(n)) return val;
  if (n >= 1000000) return '$' + (n / 1000000).toFixed(1) + 'M';
  if (n >= 1000) return '$' + (n / 1000).toFixed(0) + 'K';
  return '$' + n.toFixed(0);
}

function formatPct(val) {
  if (!val) return '—';
  var n = parseFloat(val);
  return isNaN(n) ? val : n.toFixed(2) + '%';
}

// ── SECTION 1: Comp Search ─────────────────────────────────────────────────
$('btnSearchComps').addEventListener('click', searchComps);
$('compSearch').addEventListener('keydown', function(e) { if (e.key === 'Enter') searchComps(); });

async function searchComps() {
  var query = $('compSearch').value.trim();
  if (!query) return;
  $('compResults').innerHTML = '<div class="status-msg"><div class="spinner"></div>Searching...</div>';
  $('compActions').style.display = 'none';

  try {
    var domain = $('filterDomain').value;
    var params = { query: query, entity_type: 'asset' };
    if (domain) params.domain = domain;

    var data = await lcc.call('search_entity_targets', params);
    var entities = data.entities || data.results || [];
    if (!entities.length && data.data) entities = data.data.entities || data.data.results || [];

    compResultsData = entities;
    if (!entities.length) {
      $('compResults').innerHTML = '<div class="status-msg">No comps found matching "' + escHtml(query) + '"</div>';
      return;
    }

    var html = '';
    entities.forEach(function(ent, i) {
      var addr = ent.address || ent.name || 'Unknown';
      var city = ent.city || '';
      var state = ent.state || '';
      var tenant = ent.tenant || ent.occupant || '';
      var price = formatCurrency(ent.sale_price || ent.price);
      var cap = formatPct(ent.cap_rate);
      var year = ent.sale_year || ent.year || '';
      var loc = [city, state].filter(Boolean).join(', ');
      var details = [tenant, price, cap, year].filter(function(v) { return v && v !== '—'; }).join(' — ');

      html += '<div class="comp-row">';
      html += '<input type="checkbox" data-idx="' + i + '" class="comp-check"/>';
      html += '<div class="comp-info">';
      html += '<div class="addr">' + escHtml(addr) + (loc ? ', ' + escHtml(loc) : '') + '</div>';
      html += '<div class="details">' + escHtml(details) + '</div>';
      html += '</div></div>';
    });
    $('compResults').innerHTML = html;
    $('compActions').style.display = 'flex';
    updateSelectedCount();

    // Wire checkbox listeners
    document.querySelectorAll('.comp-check').forEach(function(cb) {
      cb.addEventListener('change', updateSelectedCount);
    });
  } catch (e) {
    $('compResults').innerHTML = '<div class="status-msg" style="color:#a4262c;">' + escHtml(e.message) + '</div>';
  }
}

function updateSelectedCount() {
  var count = document.querySelectorAll('.comp-check:checked').length;
  $('selectedCount').textContent = count + ' selected';
}

$('btnInsertComps').addEventListener('click', async function() {
  var checked = document.querySelectorAll('.comp-check:checked');
  if (!checked.length) { showToast('Select at least one comp', 'error'); return; }

  try {
    await Excel.run(async function(ctx) {
      var sheet = ctx.workbook.worksheets.getActiveWorksheet();
      var range = ctx.workbook.getSelectedRange();
      range.load('rowIndex,columnIndex');
      await ctx.sync();

      var startRow = range.rowIndex;
      var startCol = range.columnIndex;

      // Write header row
      var headers = ['Address', 'City', 'State', 'Tenant', 'Sale Price', 'Cap Rate', 'Year', 'Lease Term', 'SF', 'Price/SF'];
      var headerRange = sheet.getRangeByIndexes(startRow, startCol, 1, headers.length);
      headerRange.values = [headers];
      headerRange.format.font.bold = true;
      headerRange.format.fill.color = '#0078d4';
      headerRange.format.font.color = '#ffffff';

      // Write comp data rows
      var rowOffset = 1;
      checked.forEach(function(cb) {
        var ent = compResultsData[parseInt(cb.dataset.idx)];
        if (!ent) return;
        var row = [
          ent.address || ent.name || '',
          ent.city || '',
          ent.state || '',
          ent.tenant || ent.occupant || '',
          ent.sale_price || ent.price || '',
          ent.cap_rate || '',
          ent.sale_year || ent.year || '',
          ent.lease_term || ent.remaining_lease_term_years || '',
          ent.building_sf || ent.sf || '',
          ent.price_per_sf || ''
        ];
        var dataRange = sheet.getRangeByIndexes(startRow + rowOffset, startCol, 1, row.length);
        dataRange.values = [row];
        if (rowOffset % 2 === 0) {
          dataRange.format.fill.color = '#f3f2f1';
        }
        rowOffset++;
      });

      // Auto-fit columns
      var fullRange = sheet.getRangeByIndexes(startRow, startCol, rowOffset, headers.length);
      fullRange.format.autofitColumns();

      await ctx.sync();
    });
    showToast(checked.length + ' comp(s) inserted', 'success');
  } catch (e) {
    showToast('Insert failed: ' + e.message, 'error');
  }
});

// ── SECTION 2: Property Context ────────────────────────────────────────────
$('btnSearchProp').addEventListener('click', searchProperty);
$('propSearch').addEventListener('keydown', function(e) { if (e.key === 'Enter') searchProperty(); });

async function searchProperty() {
  var query = $('propSearch').value.trim();
  if (!query) return;
  $('propResults').innerHTML = '<div class="status-msg"><div class="spinner"></div>Loading property context...</div>';
  $('propActions').style.display = 'none';

  try {
    var data = await lcc.assembleContext('property', { address: query });
    propertyContextData = data;

    var prop = data.property || data.payload?.property || {};
    var ownership = data.ownership || data.payload?.ownership || {};
    var valuation = data.valuation || data.payload?.valuation || {};
    var domain = data.domain_specifics || data.payload?.domain_specifics || {};

    var html = '<div class="prop-card">';
    html += '<div style="font-weight:600;margin-bottom:6px;">' + escHtml(prop.name || prop.address || query) + '</div>';
    var fields = [
      ['Address', prop.address || ''],
      ['Location', (prop.city_state || [prop.city, prop.state].filter(Boolean).join(', '))],
      ['Tenant', prop.tenant || ''],
      ['SF', prop.building_sf ? prop.building_sf.toLocaleString() : ''],
      ['Lease Type', prop.lease_type || ''],
      ['Lease Expiration', prop.lease_expiration || ''],
      ['Annual Rent', formatCurrency(prop.annual_rent)],
      ['Owner', ownership.recorded_owner || ownership.true_owner || ''],
      ['Est. Value', valuation.estimated_value_range || ''],
      ['Cap Rate Range', valuation.implied_cap_rate_range || '']
    ];
    fields.forEach(function(f) {
      if (f[1]) {
        html += '<div class="prop-field"><span class="prop-label">' + f[0] + '</span><span class="prop-value">' + escHtml(String(f[1])) + '</span></div>';
      }
    });
    html += '</div>';

    // Comp sales summary
    var comps = data.comparable_sales || data.payload?.comparable_sales || [];
    if (comps.length) {
      html += '<div style="margin-top:8px;font-size:11px;font-weight:600;color:#605e5c;text-transform:uppercase;">Comparable Sales (' + comps.length + ')</div>';
      comps.slice(0, 5).forEach(function(c) {
        html += '<div style="font-size:11px;padding:3px 0;border-bottom:1px solid #f3f2f1;">';
        html += escHtml(c.address || '') + ' — ' + formatCurrency(c.sale_price) + ' — ' + formatPct(c.cap_rate);
        html += '</div>';
      });
    }

    $('propResults').innerHTML = html;
    $('propActions').style.display = 'block';
  } catch (e) {
    $('propResults').innerHTML = '<div class="status-msg" style="color:#a4262c;">' + escHtml(e.message) + '</div>';
  }
}

$('btnInsertPropSheet').addEventListener('click', async function() {
  if (!propertyContextData) return;
  try {
    await Excel.run(async function(ctx) {
      var prop = propertyContextData.property || propertyContextData.payload?.property || {};
      var sheetName = (prop.address || prop.name || 'Property').substring(0, 28) + ' Ctx';

      var sheet = ctx.workbook.worksheets.add(sheetName);
      sheet.activate();

      // Header
      var titleRange = sheet.getRange('A1:E1');
      titleRange.merge(true);
      titleRange.values = [[prop.name || prop.address || 'Property Context']];
      titleRange.format.font.bold = true;
      titleRange.format.font.size = 14;
      titleRange.format.fill.color = '#0078d4';
      titleRange.format.font.color = '#ffffff';
      titleRange.format.font.name = 'Calibri';

      // Write all context data as key-value pairs
      var flat = flattenObject(propertyContextData);
      var keys = Object.keys(flat);
      var row = 3;
      keys.forEach(function(key) {
        var keyCell = sheet.getRangeByIndexes(row - 1, 0, 1, 1);
        var valCell = sheet.getRangeByIndexes(row - 1, 1, 1, 1);
        keyCell.values = [[key]];
        keyCell.format.font.bold = true;
        keyCell.format.font.name = 'Calibri';
        valCell.values = [[String(flat[key] || '')]];
        valCell.format.font.name = 'Calibri';
        if (row % 2 === 0) {
          var rowRange = sheet.getRangeByIndexes(row - 1, 0, 1, 2);
          rowRange.format.fill.color = '#f3f2f1';
        }
        row++;
      });

      sheet.getRange('A:B').format.autofitColumns();
      await ctx.sync();
    });
    showToast('Property context inserted to new sheet', 'success');
  } catch (e) {
    showToast('Insert failed: ' + e.message, 'error');
  }
});

function flattenObject(obj, prefix) {
  var result = {};
  prefix = prefix || '';
  for (var k in obj) {
    if (!obj.hasOwnProperty(k)) continue;
    var val = obj[k];
    var key = prefix ? prefix + '.' + k : k;
    if (val && typeof val === 'object' && !Array.isArray(val)) {
      var nested = flattenObject(val, key);
      for (var nk in nested) result[nk] = nested[nk];
    } else if (Array.isArray(val)) {
      result[key] = val.length ? JSON.stringify(val) : '(empty)';
    } else {
      result[key] = val;
    }
  }
  return result;
}

// ── SECTION 3: Daily Briefing ──────────────────────────────────────────────
$('btnInsertBriefing').addEventListener('click', async function() {
  $('briefStatus').innerHTML = '<div class="status-msg"><div class="spinner"></div>Fetching briefing...</div>';

  try {
    var data = await lcc.call('get_daily_briefing_snapshot', {});
    var briefing = data.briefing || data;
    var strategic = briefing.strategic_items || briefing.strategic || [];
    var important = briefing.important_items || briefing.important || [];
    var urgent = briefing.urgent_items || briefing.urgent || [];

    await Excel.run(async function(ctx) {
      var sheet = ctx.workbook.worksheets.getItem('Sheet1');
      sheet.activate();

      var row = 0;
      var col = 0;

      // Title
      var titleRange = sheet.getRangeByIndexes(row, col, 1, 4);
      titleRange.merge(true);
      titleRange.values = [['Daily Briefing — ' + new Date().toLocaleDateString()]];
      titleRange.format.font.bold = true;
      titleRange.format.font.size = 14;
      titleRange.format.font.name = 'Calibri';
      row += 2;

      function writeSection(items, sectionName, color) {
        if (!items.length) return;
        // Section header
        var hdr = sheet.getRangeByIndexes(row, col, 1, 4);
        hdr.merge(true);
        hdr.values = [[sectionName.toUpperCase() + ' (' + items.length + ')']];
        hdr.format.font.bold = true;
        hdr.format.font.color = '#ffffff';
        hdr.format.fill.color = color;
        hdr.format.font.name = 'Calibri';
        row++;

        // Column headers
        var colHdr = sheet.getRangeByIndexes(row, col, 1, 4);
        colHdr.values = [['#', 'Title', 'Context', 'Action']];
        colHdr.format.font.bold = true;
        colHdr.format.font.name = 'Calibri';
        row++;

        items.forEach(function(item, i) {
          var r = sheet.getRangeByIndexes(row, col, 1, 4);
          r.values = [[
            i + 1,
            item.title || '',
            item.context || '',
            (item.suggested_actions || []).join('; ') || ''
          ]];
          r.format.font.name = 'Calibri';
          row++;
        });
        row++; // spacer
      }

      writeSection(strategic, 'Strategic', '#a4262c');
      writeSection(important, 'Important', '#c19c00');
      writeSection(urgent, 'Urgent', '#605e5c');

      sheet.getRange('A:D').format.autofitColumns();
      await ctx.sync();
    });

    $('briefStatus').innerHTML = '';
    showToast('Briefing inserted to Sheet1', 'success');
  } catch (e) {
    $('briefStatus').innerHTML = '<div class="status-msg" style="color:#a4262c;">' + escHtml(e.message) + '</div>';
  }
});

// ── Settings ───────────────────────────────────────────────────────────────
$('btnSettings').addEventListener('click', function() {
  var panel = $('settingsPanel');
  var visible = panel.classList.contains('visible');
  if (!visible) {
    $('settingsUrl').value = lcc.baseUrl || '';
    $('settingsKey').value = lcc.apiKey || '';
  }
  panel.classList.toggle('visible');
});

$('btnSaveSettings').addEventListener('click', function() {
  var url = $('settingsUrl').value.trim();
  var key = $('settingsKey').value.trim();
  if (!url || !key) { $('settingsStatus').textContent = 'URL and API key required'; return; }
  lcc.saveConfig(url, key);
  $('settingsStatus').textContent = 'Saved!';
  $('settingsPanel').classList.remove('visible');
  showToast('Settings saved', 'success');
});

$('btnTestConnection').addEventListener('click', async function() {
  var url = $('settingsUrl').value.trim();
  var key = $('settingsKey').value.trim();
  if (!url || !key) { $('settingsStatus').textContent = 'Enter URL and key first'; return; }
  $('settingsStatus').textContent = 'Testing...';
  var controller = new AbortController();
  var timeout = setTimeout(function() { controller.abort(); }, 10000);
  try {
    var res = await fetch(url.replace(/\/+$/, '') + '/api/config', { signal: controller.signal });
    $('settingsStatus').innerHTML = res.ok
      ? '<span style="color:#107c10;">&#10003; Connected</span>'
      : '<span style="color:#a4262c;">&#10007; HTTP ' + res.status + '</span>';
  } catch (e) {
    $('settingsStatus').innerHTML = '<span style="color:#a4262c;">&#10007; ' + escHtml(e.message) + '</span>';
  } finally { clearTimeout(timeout); }
});

// ── Office Initialization ──────────────────────────────────────────────────
Office.onReady(function(info) {
  if (!lcc.isConfigured()) {
    $('settingsPanel').classList.add('visible');
  }
});
</script>
