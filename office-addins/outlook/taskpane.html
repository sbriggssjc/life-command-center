<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LCC Contact Context</title>
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 13px;
      color: #323130;
      background: #faf9f8;
      padding: 12px;
      line-height: 1.4;
    }
    .card {
      background: #fff;
      border: 1px solid #edebe9;
      border-radius: 6px;
      overflow: hidden;
      margin-bottom: 10px;
    }
    .card-header {
      padding: 14px 14px 10px;
      border-bottom: 1px solid #edebe9;
    }
    .sender-name {
      font-size: 16px;
      font-weight: 600;
      color: #201f1e;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .sender-meta {
      font-size: 12px;
      color: #605e5c;
      margin-top: 2px;
    }
    .card-section {
      padding: 10px 14px;
      border-bottom: 1px solid #f3f2f1;
    }
    .card-section:last-child { border-bottom: none; }
    .section-title {
      font-size: 11px;
      font-weight: 600;
      color: #605e5c;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }
    .stat-row {
      display: flex;
      justify-content: space-between;
      padding: 3px 0;
      font-size: 12px;
    }
    .stat-label { color: #605e5c; }
    .stat-value { font-weight: 600; color: #323130; }
    .engagement-bar {
      display: inline-flex;
      gap: 2px;
      margin-left: 6px;
    }
    .engagement-bar .block {
      width: 10px;
      height: 10px;
      border-radius: 2px;
      background: #edebe9;
    }
    .engagement-bar .block.filled { background: #0078d4; }
    .deal-item {
      padding: 4px 0;
      font-size: 12px;
    }
    .deal-item .deal-name { font-weight: 600; }
    .deal-item .deal-stage { color: #605e5c; font-size: 11px; }
    .recommendation {
      background: #f0f6ff;
      border-left: 3px solid #0078d4;
      padding: 8px 10px;
      font-size: 12px;
      color: #323130;
      font-style: italic;
      line-height: 1.5;
    }
    .actions {
      display: flex;
      gap: 6px;
      padding: 10px 14px;
      flex-wrap: wrap;
    }
    .btn {
      padding: 6px 14px;
      border: 1px solid #8a8886;
      border-radius: 4px;
      background: #fff;
      color: #323130;
      font-size: 12px;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s;
    }
    .btn:hover { background: #f3f2f1; }
    .btn-primary {
      background: #0078d4;
      color: #fff;
      border-color: #0078d4;
    }
    .btn-primary:hover { background: #106ebe; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Settings panel */
    .settings-toggle {
      position: fixed;
      bottom: 12px;
      right: 12px;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: 1px solid #8a8886;
      background: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      color: #605e5c;
      z-index: 10;
    }
    .settings-toggle:hover { background: #f3f2f1; }
    .settings-panel {
      display: none;
      background: #fff;
      border: 1px solid #edebe9;
      border-radius: 6px;
      padding: 14px;
      margin-bottom: 10px;
    }
    .settings-panel.visible { display: block; }
    .settings-panel label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #323130;
      margin-bottom: 4px;
      margin-top: 10px;
    }
    .settings-panel label:first-child { margin-top: 0; }
    .settings-panel input {
      width: 100%;
      padding: 6px 8px;
      border: 1px solid #8a8886;
      border-radius: 4px;
      font-size: 12px;
      font-family: inherit;
    }
    .settings-panel input:focus {
      outline: none;
      border-color: #0078d4;
      box-shadow: 0 0 0 1px #0078d4;
    }

    /* Status messages */
    .status {
      text-align: center;
      padding: 40px 20px;
      color: #605e5c;
    }
    .status .icon { font-size: 32px; margin-bottom: 8px; }
    .status .title { font-size: 14px; font-weight: 600; color: #323130; margin-bottom: 4px; }
    .status .message { font-size: 12px; line-height: 1.5; }
    .spinner {
      width: 24px;
      height: 24px;
      border: 3px solid #edebe9;
      border-top: 3px solid #0078d4;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .toast {
      position: fixed;
      bottom: 50px;
      left: 12px;
      right: 12px;
      padding: 8px 12px;
      border-radius: 4px;
      font-size: 12px;
      color: #fff;
      z-index: 20;
      display: none;
    }
    .toast.success { background: #107c10; }
    .toast.error { background: #a4262c; }
    .toast.visible { display: block; }
  </style>
</head>
<body>

<div id="settingsPanel" class="settings-panel">
  <label for="settingsUrl">LCC Railway URL</label>
  <input type="url" id="settingsUrl" placeholder="https://your-lcc.railway.app"/>
  <label for="settingsKey">LCC API Key</label>
  <input type="password" id="settingsKey" placeholder="Enter API key"/>
  <div style="margin-top:10px;display:flex;gap:6px;">
    <button class="btn btn-primary" id="btnSaveSettings">Save</button>
    <button class="btn" id="btnTestConnection">Test Connection</button>
  </div>
  <div id="settingsStatus" style="margin-top:6px;font-size:11px;"></div>
</div>

<div id="content">
  <div class="status" id="loadingState">
    <div class="spinner"></div>
    <div class="title">Loading contact context...</div>
    <div class="message">Reading email sender information</div>
  </div>
</div>

<div id="toast" class="toast"></div>
<button class="settings-toggle" id="btnSettings" title="Settings">&#9881;</button>

<script>
// ── LCC API Client (inlined) ──────────────────────────────────────────────
class LCCApi {
  constructor() {
    this.baseUrl = localStorage.getItem('lcc_railway_url') || '';
    this.apiKey = localStorage.getItem('lcc_api_key') || '';
  }
  async call(action, params = {}) {
    if (!this.baseUrl || !this.apiKey) throw new Error('LCC not configured');
    const controller = new AbortController();
    const timeout = setTimeout(function() { controller.abort(); }, 10000);
    try {
      const res = await fetch(this.baseUrl + '/api/chat', {
        method: 'POST',
        headers: {
          'Authorization': 'Bearer ' + this.apiKey,
          'Content-Type': 'application/json',
          'X-LCC-Surface': 'office_addin'
        },
        body: JSON.stringify({ copilot_action: action, params: params, surface: 'office_addin' }),
        signal: controller.signal
      });
      if (!res.ok) throw new Error('LCC API error ' + res.status);
      return res.json();
    } finally { clearTimeout(timeout); }
  }
  async assembleContext(packetType, params) {
    if (!this.baseUrl || !this.apiKey) throw new Error('LCC not configured');
    var p = params || {};
    var controller = new AbortController();
    var timeout = setTimeout(function() { controller.abort(); }, 10000);
    try {
      var res = await fetch(this.baseUrl + '/api/context', {
        method: 'POST',
        headers: {
          'Authorization': 'Bearer ' + this.apiKey,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify(Object.assign({ action: 'assemble', packet_type: packetType, surface_hint: 'office_addin' }, p)),
        signal: controller.signal
      });
      if (!res.ok) throw new Error('Context error ' + res.status);
      return res.json();
    } finally { clearTimeout(timeout); }
  }
  isConfigured() { return !!(this.baseUrl && this.apiKey); }
  saveConfig(url, key) {
    localStorage.setItem('lcc_railway_url', url.replace(/\/+$/, ''));
    localStorage.setItem('lcc_api_key', key);
    this.baseUrl = url.replace(/\/+$/, '');
    this.apiKey = key;
  }
}

// ── Globals ────────────────────────────────────────────────────────────────
var lcc = new LCCApi();
var senderContext = null;

// ── UI Helpers ─────────────────────────────────────────────────────────────
function $(id) { return document.getElementById(id); }

function showToast(msg, type) {
  var t = $('toast');
  t.textContent = msg;
  t.className = 'toast ' + type + ' visible';
  setTimeout(function() { t.className = 'toast'; }, 3000);
}

function escHtml(str) {
  var d = document.createElement('div');
  d.textContent = str || '';
  return d.innerHTML;
}

function daysAgoText(dateStr) {
  if (!dateStr) return 'Unknown';
  var d = Math.floor((Date.now() - new Date(dateStr).getTime()) / 86400000);
  if (d === 0) return 'Today';
  if (d === 1) return '1 day ago';
  return d + ' days ago';
}

function engagementLevel(score) {
  if (score >= 70) return { text: 'High', filled: 4 };
  if (score >= 40) return { text: 'Medium', filled: 3 };
  if (score >= 15) return { text: 'Low', filled: 2 };
  return { text: 'Minimal', filled: 1 };
}

function engagementHtml(score) {
  var eng = engagementLevel(score || 0);
  var bars = '';
  for (var i = 0; i < 5; i++) {
    bars += '<span class="block' + (i < eng.filled ? ' filled' : '') + '"></span>';
  }
  return '<span class="engagement-bar">' + bars + '</span> ' + eng.text;
}

// ── Render Contact Card ────────────────────────────────────────────────────
function renderContactCard(data) {
  var entity = data.entity || {};
  var name = entity.name || senderContext.name || 'Unknown Contact';
  var title = entity.title || '';
  var firm = entity.firm || entity.org_type || '';
  var meta = [title, firm].filter(Boolean).join(' | ');

  var lastTouch = data.last_touch_date;
  var touchpoints = data.touchpoint_count || 0;
  var engScore = (data.entity && data.entity.engagement_score) || 0;
  if (data.relationship) {
    engScore = data.relationship.engagement_score || engScore;
  }

  var deals = data.active_deals || [];
  var rec = data.recommended_next_action || data.suggested_outreach?.suggested_angle || '';

  var html = '<div class="card">';
  // Header
  html += '<div class="card-header">';
  html += '<div class="sender-name">&#128100; ' + escHtml(name) + '</div>';
  if (meta) html += '<div class="sender-meta">' + escHtml(meta) + '</div>';
  html += '</div>';

  // Stats
  html += '<div class="card-section">';
  html += '<div class="stat-row"><span class="stat-label">Last Touch</span><span class="stat-value">' + escHtml(daysAgoText(lastTouch)) + '</span></div>';
  html += '<div class="stat-row"><span class="stat-label">Touchpoints</span><span class="stat-value">' + touchpoints + ' total</span></div>';
  html += '<div class="stat-row"><span class="stat-label">Engagement</span><span class="stat-value">' + engagementHtml(engScore) + '</span></div>';
  html += '</div>';

  // Active Deals
  if (deals.length > 0) {
    html += '<div class="card-section">';
    html += '<div class="section-title">Active Deals (' + deals.length + ')</div>';
    deals.forEach(function(deal) {
      html += '<div class="deal-item">';
      html += '<div class="deal-name">' + escHtml(deal.title || deal.deal_name || 'Untitled') + '</div>';
      html += '<div class="deal-stage">' + escHtml(deal.status || deal.stage || '') + '</div>';
      html += '</div>';
    });
    html += '</div>';
  }

  // Recommendation
  if (rec) {
    html += '<div class="card-section">';
    html += '<div class="section-title">Recommended Action</div>';
    html += '<div class="recommendation">' + escHtml(rec) + '</div>';
    html += '</div>';
  }

  // Action buttons
  html += '<div class="actions">';
  html += '<button class="btn" onclick="logCall()">Log Call</button>';
  html += '<button class="btn" onclick="draftReply()">Draft Reply</button>';
  html += '<button class="btn btn-primary" onclick="openInLCC()">Open in LCC</button>';
  html += '</div>';
  html += '</div>';

  $('content').innerHTML = html;
}

// ── Error / Empty States ───────────────────────────────────────────────────
function showNotConfigured() {
  $('content').innerHTML =
    '<div class="status">' +
    '<div class="icon">&#9881;</div>' +
    '<div class="title">LCC Not Configured</div>' +
    '<div class="message">Click the gear icon below to enter your LCC Railway URL and API key.</div>' +
    '</div>';
}

function showNoEmail() {
  $('content').innerHTML =
    '<div class="status">' +
    '<div class="icon">&#9993;</div>' +
    '<div class="title">No Email Selected</div>' +
    '<div class="message">Open an email message to see the sender\'s LCC relationship context.</div>' +
    '</div>';
}

function showContactNotFound(email) {
  $('content').innerHTML =
    '<div class="status">' +
    '<div class="icon">&#128269;</div>' +
    '<div class="title">Contact Not Found in LCC</div>' +
    '<div class="message">' + escHtml(email) + ' was not found in LCC.</div>' +
    '<div style="margin-top:12px;">' +
    '<button class="btn btn-primary" onclick="addContact()">Add Contact</button>' +
    '</div>' +
    '</div>';
}

function showError(msg) {
  $('content').innerHTML =
    '<div class="status">' +
    '<div class="icon">&#9888;</div>' +
    '<div class="title">LCC Unreachable</div>' +
    '<div class="message">' + escHtml(msg) + '</div>' +
    '<div style="margin-top:12px;">' +
    '<button class="btn" onclick="openInLCC()">Open LCC</button>' +
    '<button class="btn" style="margin-left:6px;" onclick="loadSenderContext()">Retry</button>' +
    '</div>' +
    '</div>';
}

// ── Actions ────────────────────────────────────────────────────────────────
async function logCall() {
  if (!senderContext) return;
  try {
    await lcc.call('log_activity', {
      activity_type: 'call',
      entity_name: senderContext.name,
      entity_email: senderContext.email
    });
    showToast('Call logged successfully', 'success');
  } catch (e) {
    showToast('Failed to log call: ' + e.message, 'error');
  }
}

async function draftReply() {
  if (!senderContext) return;
  try {
    var result = await lcc.call('draft_outreach_email', {
      email: senderContext.email,
      name: senderContext.name,
      subject_hint: senderContext.subject
    });
    var draftHtml = '<html><head><style>body{font-family:Segoe UI,sans-serif;padding:20px;font-size:13px;line-height:1.6;color:#323130;max-width:600px;}</style></head><body>' +
      '<h3>Draft Reply</h3>' +
      '<p style="white-space:pre-wrap;">' + escHtml(result.response || result.data?.response || JSON.stringify(result)) + '</p>' +
      '<p style="font-size:11px;color:#605e5c;margin-top:20px;">Copy this text into your reply. Review and edit before sending.</p>' +
      '</body></html>';
    Office.context.ui.displayDialogAsync(
      'data:text/html,' + encodeURIComponent(draftHtml),
      { height: 60, width: 50 },
      function() {}
    );
  } catch (e) {
    showToast('Failed to generate draft: ' + e.message, 'error');
  }
}

function openInLCC() {
  var url = lcc.baseUrl || '';
  if (senderContext && senderContext.email) {
    url += '/contacts?search=' + encodeURIComponent(senderContext.email);
  }
  if (url) window.open(url, '_blank');
}

async function addContact() {
  if (!senderContext) return;
  try {
    await lcc.call('create_entity', {
      entity_type: 'person',
      name: senderContext.name,
      email: senderContext.email
    });
    showToast('Contact created — reloading...', 'success');
    setTimeout(loadSenderContext, 1000);
  } catch (e) {
    showToast('Failed to add contact: ' + e.message, 'error');
  }
}

// ── Main Load Logic ────────────────────────────────────────────────────────
async function loadSenderContext() {
  $('content').innerHTML =
    '<div class="status"><div class="spinner"></div>' +
    '<div class="title">Loading contact context...</div>' +
    '<div class="message">Querying LCC for relationship data</div></div>';

  if (!lcc.isConfigured()) {
    showNotConfigured();
    return;
  }

  try {
    var item = Office.context.mailbox.item;
    if (!item) {
      showNoEmail();
      return;
    }

    var email = item.from ? item.from.emailAddress : (item.sender ? item.sender.emailAddress : '');
    var name = item.from ? item.from.displayName : (item.sender ? item.sender.displayName : '');
    var subject = item.subject || '';

    if (!email) {
      showNoEmail();
      return;
    }

    senderContext = { email: email, name: name, subject: subject };

    var data = await lcc.call('get_relationship_context', {
      email: email,
      name: name,
      subject_hint: subject
    });

    if (data.error && /not found/i.test(data.error)) {
      showContactNotFound(email);
      return;
    }

    renderContactCard(data);
  } catch (e) {
    if (e.name === 'AbortError') {
      showError('Request timed out. Check your network connection and LCC URL.');
    } else {
      showError(e.message || 'Unknown error');
    }
  }
}

// ── Settings ───────────────────────────────────────────────────────────────
$('btnSettings').addEventListener('click', function() {
  var panel = $('settingsPanel');
  var visible = panel.classList.contains('visible');
  if (!visible) {
    $('settingsUrl').value = lcc.baseUrl || '';
    $('settingsKey').value = lcc.apiKey || '';
  }
  panel.classList.toggle('visible');
});

$('btnSaveSettings').addEventListener('click', function() {
  var url = $('settingsUrl').value.trim();
  var key = $('settingsKey').value.trim();
  if (!url) { $('settingsStatus').textContent = 'URL is required'; return; }
  if (!key) { $('settingsStatus').textContent = 'API key is required'; return; }
  lcc.saveConfig(url, key);
  $('settingsStatus').textContent = 'Saved!';
  $('settingsPanel').classList.remove('visible');
  showToast('Settings saved', 'success');
  loadSenderContext();
});

$('btnTestConnection').addEventListener('click', async function() {
  var url = $('settingsUrl').value.trim();
  var key = $('settingsKey').value.trim();
  if (!url || !key) { $('settingsStatus').textContent = 'Enter URL and key first'; return; }
  $('settingsStatus').textContent = 'Testing...';
  var controller = new AbortController();
  var timeout = setTimeout(function() { controller.abort(); }, 10000);
  try {
    var res = await fetch(url.replace(/\/+$/, '') + '/api/config', {
      signal: controller.signal
    });
    if (res.ok) {
      $('settingsStatus').innerHTML = '<span style="color:#107c10;">&#10003; Connected successfully</span>';
    } else {
      $('settingsStatus').innerHTML = '<span style="color:#a4262c;">&#10007; HTTP ' + res.status + '</span>';
    }
  } catch (e) {
    $('settingsStatus').innerHTML = '<span style="color:#a4262c;">&#10007; ' + escHtml(e.message) + '</span>';
  } finally {
    clearTimeout(timeout);
  }
});

// ── Office Initialization ──────────────────────────────────────────────────
Office.onReady(function(info) {
  if (info.host === Office.HostType.Outlook) {
    loadSenderContext();

    // Re-load when a different email is selected
    if (Office.context.mailbox && Office.context.mailbox.addHandlerAsync) {
      Office.context.mailbox.addHandlerAsync(
        Office.EventType.ItemChanged,
        function() { loadSenderContext(); }
      );
    }
  } else {
    showNoEmail();
  }
});
</script>

</body>
</html>
